<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 窍某论坛</title>
    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com 'unsafe-inline'; img-src 'self' data: https://ui-avatars.com https://bkvsceiezbyexzqpvblj.supabase.co; style-src 'self' 'unsafe-inline';">
    
    <!-- 直接加载 Supabase 库（稳定） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ===== 样式（与原版相同） ===== */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0b0e1a;color:#e8edf5;font-family:'Segoe UI',sans-serif;padding:12px;line-height:1.6;}
        .container{max-width:1200px;margin:0 auto;}
        h1{background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px;}
        .stats{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap;}
        .stat-card{background:rgba(255,255,255,0.04);padding:16px 24px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);flex:1 1 140px;}
        .stat-card .num{font-size:2rem;font-weight:700;color:#a5b4fc;}
        .stat-card .label{color:rgba(255,255,255,0.4);font-size:0.9rem;}
        .tab-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
        .tab-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);padding:8px 20px;border-radius:30px;cursor:pointer;transition:0.3s;}
        .tab-btn.active{background:#6d5bff;color:#fff;border-color:#6d5bff;}
        .tab-btn:hover{background:rgba(255,255,255,0.08);}
        .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
        .filter-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);padding:6px 18px;border-radius:30px;cursor:pointer;transition:0.3s;}
        .filter-btn.active{background:#6d5bff;color:#fff;border-color:#6d5bff;}
        table{width:100%;border-collapse:collapse;font-size:0.9rem;}
        th,td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06);}
        th{color:rgba(255,255,255,0.4);font-weight:500;font-size:0.8rem;text-transform:uppercase;}
        td{color:rgba(255,255,255,0.8);}
        .badge{display:inline-block;padding:2px 10px;border-radius:30px;font-size:0.7rem;font-weight:600;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);}
        .badge.tech{background:rgba(96,165,250,0.15);color:#93bbfc;}
        .badge.life{background:rgba(52,211,153,0.12);color:#6ee7b7;}
        .badge.career{background:rgba(251,191,36,0.12);color:#fcd34d;}
        .badge.topic{background:rgba(251,191,36,0.15);color:#fcd34d;}
        .btn-danger{background:#ef4444;color:#fff;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.75rem;transition:0.3s;}
        .btn-danger:hover{background:#dc2626;transform:scale(1.04);}
        .btn-edit{background:#6d5bff;color:#fff;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.75rem;margin-right:6px;}
        .btn-edit:hover{transform:scale(1.04);}
        .btn-view{background:#3b82f6;color:#fff;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.75rem;margin-right:6px;text-decoration:none;display:inline-block;}
        .btn-view:hover{transform:scale(1.04);}
        .btn-success{background:#22c55e;color:#fff;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.75rem;transition:0.3s;margin-right:6px;}
        .btn-success:hover{background:#16a34a;transform:scale(1.04);}
        .login-required{text-align:center;padding:60px 20px;}
        .login-required h2{font-size:2rem;margin-bottom:12px;}
        .login-required p{color:rgba(255,255,255,0.4);}
        .btn{background:#6d5bff;color:#fff;border:none;padding:8px 24px;border-radius:30px;cursor:pointer;font-size:0.9rem;transition:0.3s;text-decoration:none;display:inline-block;}
        .btn:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(109,91,255,0.3);}
        .empty-state{text-align:center;padding:30px;color:rgba(255,255,255,0.3);}
        .avatar-sm{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.1);}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:999;}
        .modal-overlay.active{display:flex;}
        .modal-box{background:#1a1a2e;padding:30px;border-radius:20px;max-width:400px;width:100%;position:relative;}
        .modal-box .close{position:absolute;top:12px;right:20px;font-size:1.8rem;cursor:pointer;color:rgba(255,255,255,0.4);}
        .modal-box .close:hover{color:#fff;}
        .modal-box input{width:100%;padding:10px 14px;border-radius:12px;border:1px solid #444;background:rgba(255,255,255,0.05);color:#e8edf5;font-size:0.95rem;margin:8px 0;}
        .modal-box input:focus{outline:none;border-color:#6d5bff;}
        .modal-box label{color:rgba(255,255,255,0.6);display:block;margin-top:8px;}
        .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
        .btn-sm{background:#6d5bff;color:#fff;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.75rem;transition:0.3s;margin-right:6px;}
        .btn-sm:hover{transform:scale(1.04);}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;padding:12px 24px;border-radius:8px;border:1px solid #444;z-index:1000;display:none;max-width:90%;}
        .toast.show{display:block;animation:fadeIn 0.3s;}
        .toast.error{border-color:#ef4444;}
        @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}
        .checkbox-col{width:36px;text-align:center;}
        .checkbox-col input[type="checkbox"]{width:18px;height:18px;cursor:pointer;accent-color:#6d5bff;}
        .level-badge{background:#fbbf24;color:#1a1a2e;padding:0 6px;border-radius:12px;font-size:0.65rem;font-weight:bold;}
        @media (max-width:640px){table,thead,tbody,th,td,tr{display:block;}th{display:none;}tr{margin-bottom:16px;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;}td{border:none;padding:4px 0;display:flex;justify-content:space-between;align-items:center;}td::before{content:attr(data-label);font-weight:600;color:rgba(255,255,255,0.4);margin-right:12px;}.stats{flex-direction:column;}}

        /* ===== 密码锁遮罩层 ===== */
        #passwordOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }
        #passwordOverlay.hidden {
            display: none;
        }
        #passwordOverlay .pwd-box {
            background: #1a1a2e;
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
            min-width: 320px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        #passwordOverlay .pwd-box h2 {
            color: #e8edf5;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        #passwordOverlay .pwd-box .sub {
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        #passwordOverlay .pwd-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #444;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
            font-family: monospace;
        }
        #passwordOverlay .pwd-box input:focus {
            outline: none;
            border-color: #6d5bff;
        }
        #passwordOverlay .pwd-box .btn {
            margin-top: 16px;
            width: 100%;
        }
        #passwordOverlay .pwd-box .error {
            color: #ef4444;
            margin-top: 8px;
            font-size: 0.9rem;
            min-height: 1.5em;
        }
        #passwordOverlay .pwd-box .hint {
            color: rgba(255,255,255,0.2);
            font-size: 0.75rem;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<!-- ===== 密码锁遮罩 ===== -->
<div id="passwordOverlay">
    <div class="pwd-box">
        <h2>🔐 管理后台</h2>
        <div class="sub">请输入访问密码</div>
        <input type="password" id="pwdInput" placeholder="请输入密码" autofocus>
        <button class="btn" id="pwdSubmit">确认</button>
        <div id="pwdError" class="error"></div>
        <div class="hint">仅限管理员访问</div>
    </div>
</div>

<!-- ===== 后台内容 ===== -->
<div class="container" id="adminContent" style="display:none;">
    <h1>📊 管理后台</h1>
    <div id="loginCheck"></div>
    <div id="adminBody">
        <!-- 统计 -->
        <div class="stats" id="statsArea">
            <div class="stat-card"><div class="num" id="postCount">0</div><div class="label">📄 帖子</div></div>
            <div class="stat-card"><div class="num" id="commentCount">0</div><div class="label">💬 回复</div></div>
            <div class="stat-card"><div class="num" id="topicCount">0</div><div class="label">🏷️ 版块</div></div>
            <div class="stat-card"><div class="num" id="userCount">0</div><div class="label">👤 用户</div></div>
            <div class="stat-card"><div class="num" id="likeCount">0</div><div class="label">❤️ 总点赞</div></div>
        </div>

        <!-- Tab -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('posts')">📄 帖子管理</button>
            <button class="tab-btn" onclick="switchTab('comments')">💬 回复管理</button>
            <button class="tab-btn" onclick="switchTab('topics')">🏷️ 版块管理</button>
            <button class="tab-btn" onclick="switchTab('users')">👤 用户管理</button>
        </div>

        <!-- 帖子管理 -->
        <div id="tabPosts" class="panel">
            <div class="filter-bar">
                <button class="filter-btn active" data-cat="all" onclick="filterPosts('all')">📋 全部</button>
                <button class="filter-btn" data-cat="tech" onclick="filterPosts('tech')">💻 科技</button>
                <button class="filter-btn" data-cat="life" onclick="filterPosts('life')">🌿 生活</button>
                <button class="filter-btn" data-cat="career" onclick="filterPosts('career')">💼 职场</button>
                <button class="filter-btn" data-cat="topic" onclick="filterPosts('topic')">💬 话题</button>
            </div>
            <div id="postsList"><p class="empty-state">加载中...</p></div>
        </div>

        <!-- 回复管理 -->
        <div id="tabComments" class="panel" style="display:none;">
            <div id="commentsList"><p class="empty-state">加载中...</p></div>
        </div>

        <!-- 版块管理 -->
        <div id="tabTopics" class="panel" style="display:none;">
            <div id="topicsList"><p class="empty-state">加载中...</p></div>
        </div>

        <!-- 用户管理 -->
        <div id="tabUsers" class="panel" style="display:none;">
            <div class="toolbar">
                <button class="btn-sm" onclick="openAddUserModal()">➕ 添加用户</button>
                <button class="btn-sm" onclick="selectAllUsers(true)">☑ 全选</button>
                <button class="btn-sm" onclick="selectAllUsers(false)">☐ 取消全选</button>
                <button class="btn-sm btn-success" onclick="batchSetAdmin(true)">⬆ 设为管理员</button>
                <button class="btn-sm btn-edit" onclick="batchSetAdmin(false)">⬇ 取消管理员</button>
                <button class="btn-sm btn-danger" onclick="batchDeleteUsers()">🗑️ 批量删除</button>
                <span style="color:rgba(255,255,255,0.3);font-size:0.8rem;margin-left:8px;" id="selectedCount">已选 0 人</span>
            </div>
            <div id="usersList"><p class="empty-state">加载中...</p></div>
        </div>
    </div>
</div>

<!-- ===== 模态框 ===== -->
<div class="modal-overlay" id="addUserModal">
    <div class="modal-box">
        <span class="close" onclick="closeAddUserModal()">&times;</span>
        <h2>➕ 添加用户</h2>
        <label>邮箱</label>
        <input type="email" id="addUserEmail" placeholder="user@example.com" />
        <label>密码</label>
        <input type="text" id="addUserPassword" placeholder="至少6位" />
        <label>昵称</label>
        <input type="text" id="addUserName" placeholder="用户昵称（可选）" />
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:12px;">
            <input type="checkbox" id="addUserAdmin" style="width:18px;height:18px;margin:0;" /> 设为管理员
        </label>
        <button class="btn" onclick="addUser()" style="width:100%;margin-top:16px;">添加用户</button>
        <div id="addUserMsg" style="margin-top:8px;"></div>
    </div>
</div>

<div class="modal-overlay" id="editUserModal">
    <div class="modal-box">
        <span class="close" onclick="closeEditUserModal()">&times;</span>
        <h2>✏️ 编辑用户</h2>
        <label>昵称</label>
        <input type="text" id="editUserName" placeholder="输入新昵称" maxlength="30" />
        <button class="btn" onclick="saveUserEdit()" style="width:100%;margin-top:12px;">保存</button>
        <div id="editUserMsg" style="margin-top:8px;"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // =============================================================
    // ===== 密码验证（密码：IlIlIl） =====
    // =============================================================
    (function() {
        const OVERLAY = document.getElementById('passwordOverlay');
        const PWD_INPUT = document.getElementById('pwdInput');
        const PWD_SUBMIT = document.getElementById('pwdSubmit');
        const ERROR = document.getElementById('pwdError');
        const ADMIN_CONTENT = document.getElementById('adminContent');
        const CORRECT_PASSWORD = 'IlIlIl';  // 密码区分大小写

        // 检查 sessionStorage 是否已通过验证
        if (sessionStorage.getItem('adminAuth') === 'true') {
            OVERLAY.classList.add('hidden');
            ADMIN_CONTENT.style.display = 'block';
            // 如果 Supabase 已加载，直接启动后台
            if (typeof supabase !== 'undefined' && typeof startAdminApp === 'function') {
                startAdminApp();
            }
            return;
        }

        function verify() {
            const input = PWD_INPUT.value.trim();
            if (input === CORRECT_PASSWORD) {
                sessionStorage.setItem('adminAuth', 'true');
                OVERLAY.classList.add('hidden');
                ADMIN_CONTENT.style.display = 'block';
                // 启动后台
                if (typeof startAdminApp === 'function') {
                    startAdminApp();
                } else {
                    // 等待 Supabase 加载
                    const checkLib = setInterval(() => {
                        if (typeof supabase !== 'undefined' && typeof startAdminApp === 'function') {
                            clearInterval(checkLib);
                            startAdminApp();
                        }
                    }, 200);
                }
            } else {
                ERROR.textContent = '❌ 密码错误，请重试';
                PWD_INPUT.value = '';
                PWD_INPUT.focus();
            }
        }

        PWD_SUBMIT.addEventListener('click', verify);
        PWD_INPUT.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') verify();
        });
        PWD_INPUT.focus();
    })();

    // =============================================================
    // ===== 后台主程序（完整版） =====
    // =============================================================
    function startAdminApp() {
        const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrdnNjZWllemJ5ZXh6cXB2YmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDk1MzIsImV4cCI6MjA5OTI4NTUzMn0.1h4Yp8YaJdMMOQW8N2zqvJi6QrxHPncBFMK9LjdmZ6E';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let userProfile = null;
        let accessToken = null;
        let refreshToken = null;
        let postsCache = [];
        let commentsCache = [];
        let topicsCache = [];
        let usersCache = [];
        let currentCategory = 'all';
        let totalLikes = 0;
        let isAdmin = false;
        let editingUserId = null;
        let selectedUsers = new Set();

        // ---- 工具 ----
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            clearTimeout(t._hide);
            t._hide = setTimeout(() => { t.className = 'toast'; }, 4000);
        }

        // ---- 网络请求 ----
        async function fetchWithAuth(url, options) {
            const headers = options.headers || {};
            if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
            headers['apikey'] = SUPABASE_ANON_KEY;
            headers['Content-Type'] = headers['Content-Type'] || 'application/json';
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401 && refreshToken) {
                try {
                    const resp = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refresh_token: refreshToken })
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        accessToken = data.access_token;
                        refreshToken = data.refresh_token;
                        localStorage.setItem('sb_token', accessToken);
                        localStorage.setItem('sb_refresh_token', refreshToken);
                        const retryHeaders = { ...headers, 'Authorization': 'Bearer ' + accessToken };
                        const retry = await fetch(url, { ...options, headers: retryHeaders });
                        return retry;
                    }
                } catch (e) { console.warn('刷新失败', e); }
            }
            return response;
        }
        async function authFetch(url, options) {
            const resp = await fetchWithAuth(url, options);
            if (resp.status === 401) { showToast('登录已过期，请重新登录', true); logout(); throw new Error('Unauthorized'); }
            return resp;
        }
        async function handleResponse(res) {
            const text = await res.text();
            let json = null;
            try { json = JSON.parse(text); } catch (e) {}
            if (!res.ok) {
                console.error('HTTP Error:', res.status, res.statusText);
                console.error('Response body:', text);
                const msg = json?.error_description || json?.message || json?.error || text || '请求失败';
                throw new Error(msg);
            }
            return json || text;
        }

        // ---- API 调用 ----
        async function getProfile(userId) {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId, { method: 'GET' });
            if (resp.status === 404) return null;
            const data = await handleResponse(resp);
            return data && data.length > 0 ? data[0] : null;
        }
        async function fetchPosts() {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/posts?order=created_at.desc', { method: 'GET' });
            return await handleResponse(resp);
        }
        async function deletePost(postId) {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/posts?id=eq.' + postId, { method: 'DELETE' });
            return await handleResponse(resp);
        }
        async function fetchComments() {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/comments?order=created_at.desc', { method: 'GET' });
            return await handleResponse(resp);
        }
        async function deleteComment(commentId) {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/comments?id=eq.' + commentId, { method: 'DELETE' });
            return await handleResponse(resp);
        }
        async function fetchTopics() {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/topics?order=name.asc', { method: 'GET' });
            return await handleResponse(resp);
        }
        async function deleteTopic(topicId) {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/topics?id=eq.' + topicId, { method: 'DELETE' });
            return await handleResponse(resp);
        }
        async function fetchUsers() {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/profiles?order=created_at.desc', { method: 'GET' });
            return await handleResponse(resp);
        }
        async function updateUser(userId, updates) {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId, {
                method: 'PATCH',
                body: JSON.stringify(updates)
            });
            return await handleResponse(resp);
        }
        async function deleteUser(userId) {
            const resp = await authFetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId, { method: 'DELETE' });
            return await handleResponse(resp);
        }

        // ---- 批量操作 ----
        async function batchUpdateUsers(userIds, updates) {
            if (!userIds.length) return;
            const promises = userIds.map(id => updateUser(id, updates));
            await Promise.all(promises);
        }
        async function batchDeleteUsers(userIds) {
            if (!userIds.length) return;
            const promises = userIds.map(id => deleteUser(id).catch(e => console.warn('删除失败:', id, e)));
            await Promise.all(promises);
        }

        // ---- 权限检查 ----
        async function checkAuth() {
            const token = localStorage.getItem('sb_token');
            const refresh = localStorage.getItem('sb_refresh_token');
            const userStr = localStorage.getItem('sb_user');
            if (token && userStr) {
                accessToken = token;
                refreshToken = refresh || null;
                try { currentUser = JSON.parse(userStr); } catch (e) {}
            }
            if (!currentUser || !accessToken) {
                document.getElementById('loginCheck').innerHTML = `
                    <div class="login-required">
                        <h2>🔐 请先登录</h2>
                        <p>你需要登录后才能管理</p>
                        <a href="index.html" class="btn" style="display:inline-block;margin-top:16px;text-decoration:none;">返回首页登录</a>
                    </div>
                `;
                document.getElementById('adminBody').style.display = 'none';
                return false;
            }
            try {
                const profile = await getProfile(currentUser.id);
                if (profile && profile.is_admin === true) {
                    isAdmin = true;
                    userProfile = profile;
                    document.getElementById('loginCheck').innerHTML =
                        `<p style="color:rgba(255,255,255,0.5);">👤 管理员：<strong style="color:#a5b4fc;">${escapeHtml(currentUser.email)}</strong></p>`;
                    document.getElementById('adminBody').style.display = 'block';
                    return true;
                } else {
                    document.getElementById('loginCheck').innerHTML = `
                        <div class="login-required">
                            <h2>⛔ 权限不足</h2>
                            <p>你没有管理权限</p>
                            <a href="index.html" class="btn" style="display:inline-block;margin-top:16px;text-decoration:none;">返回首页</a>
                        </div>
                    `;
                    document.getElementById('adminBody').style.display = 'none';
                    return false;
                }
            } catch (err) {
                showToast('权限检查失败：' + err.message, true);
                return false;
            }
        }

        // ---- 加载数据 ----
        async function loadAllData() {
            if (!isAdmin) return;
            try {
                await loadPosts();
                await loadComments();
                await loadTopics();
                await loadUsers();
                updateStats();
            } catch (err) {
                showToast('加载数据失败：' + err.message, true);
            }
        }

        async function loadPosts() {
            const data = await fetchPosts();
            postsCache = data || [];
            totalLikes = postsCache.reduce((sum, p) => sum + (p.likes || 0), 0);
            renderPosts(currentCategory);
        }

        async function loadComments() {
            const data = await fetchComments();
            commentsCache = data || [];
            renderComments();
        }

        async function loadTopics() {
            const data = await fetchTopics();
            topicsCache = data || [];
            renderTopics();
        }

        async function loadUsers() {
            const data = await fetchUsers();
            usersCache = data || [];
            renderUsers();
        }

        function updateStats() {
            document.getElementById('postCount').textContent = postsCache.length;
            document.getElementById('commentCount').textContent = commentsCache.length;
            document.getElementById('topicCount').textContent = topicsCache.length;
            document.getElementById('userCount').textContent = usersCache.length;
            document.getElementById('likeCount').textContent = totalLikes;
        }

        // ---- Tab 切换 ----
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick*="${tab}"]`)?.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            const id = 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1);
            document.getElementById(id).style.display = 'block';
        }

        // ---- 帖子管理 ----
        function filterPosts(category) {
            currentCategory = category;
            document.querySelectorAll('#tabPosts .filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.cat === category);
            });
            renderPosts(category);
        }

        function renderPosts(category) {
            const list = document.getElementById('postsList');
            let filtered = postsCache;
            if (category !== 'all') filtered = filtered.filter(p => p.category === category);
            if (!filtered.length) {
                list.innerHTML = '<p class="empty-state">暂无帖子</p>';
                return;
            }
            const catMap = { tech: '科技', life: '生活', career: '职场', topic: '💬 话题' };
            let html = `<table><thead><tr><th>标题</th><th>分类</th><th>作者</th><th>日期</th><th>❤️</th><th>👁️</th><th>操作</th></tr></thead><tbody>`;
            filtered.forEach(p => {
                const badgeClass = p.category === 'topic' ? 'badge topic' : `badge ${p.category}`;
                const badgeText = catMap[p.category] || p.category;
                const dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString('zh-CN') : '';
                html += `<tr>
                    <td data-label="标题">${escapeHtml(p.title)}</td>
                    <td data-label="分类"><span class="${badgeClass}">${escapeHtml(badgeText)}</span></td>
                    <td data-label="作者">${escapeHtml(p.author_name || '匿名')}</td>
                    <td data-label="日期">${escapeHtml(dateStr)}</td>
                    <td data-label="❤️">${p.likes || 0}</td>
                    <td data-label="👁️">${p.views || 0}</td>
                    <td data-label="操作">
                        <a href="index.html" class="btn-view" target="_blank">🔗</a>
                        <button class="btn-danger" onclick="deletePostHandler('${p.id}')">🗑️</button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            list.innerHTML = html;
        }

        async function deletePostHandler(postId) {
            if (!confirm('确定删除这篇帖子（将同时删除所有回复）？')) return;
            try {
                await deletePost(postId);
                showToast('删除成功！');
                loadAllData();
            } catch (e) { showToast('删除失败：' + e.message, true); }
        }

        // ---- 回复管理 ----
        function renderComments() {
            const list = document.getElementById('commentsList');
            if (!commentsCache.length) {
                list.innerHTML = '<p class="empty-state">暂无回复</p>';
                return;
            }
            let html = `<table><thead><tr><th>回复</th><th>用户</th><th>帖子</th><th>时间</th><th>操作</th></tr></thead><tbody>`;
            commentsCache.forEach(c => {
                const dateStr = c.created_at ? new Date(c.created_at).toLocaleString('zh-CN') : '';
                const post = postsCache.find(p => p.id === c.post_id);
                const postTitle = post ? post.title : '已删除';
                html += `<tr>
                    <td data-label="回复">${escapeHtml(c.content.length > 50 ? c.content.slice(0,50)+'...' : c.content)}</td>
                    <td data-label="用户">${escapeHtml(c.username || '匿名')}</td>
                    <td data-label="帖子">${escapeHtml(postTitle)}</td>
                    <td data-label="时间">${escapeHtml(dateStr)}</td>
                    <td data-label="操作">
                        <button class="btn-danger" onclick="deleteCommentHandler('${c.id}')">🗑️</button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            list.innerHTML = html;
        }

        async function deleteCommentHandler(commentId) {
            if (!confirm('确定删除这条回复吗？')) return;
            try {
                await deleteComment(commentId);
                showToast('删除成功！');
                loadAllData();
            } catch (e) { showToast('删除失败：' + e.message, true); }
        }

        // ---- 版块管理 ----
        function renderTopics() {
            const list = document.getElementById('topicsList');
            if (!topicsCache.length) {
                list.innerHTML = '<p class="empty-state">暂无版块</p>';
                return;
            }
            let html = `<table><thead><tr><th>版块名称</th><th>创建时间</th><th>操作</th></tr></thead><tbody>`;
            topicsCache.forEach(t => {
                const dateStr = t.created_at ? new Date(t.created_at).toLocaleDateString('zh-CN') : '';
                html += `<tr>
                    <td data-label="版块名称">🏷️ ${escapeHtml(t.name)}</td>
                    <td data-label="创建时间">${escapeHtml(dateStr)}</td>
                    <td data-label="操作">
                        <button class="btn-danger" onclick="deleteTopicHandler('${t.id}')">🗑️</button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            list.innerHTML = html;
        }

        async function deleteTopicHandler(topicId) {
            if (!confirm('确定删除这个版块吗？')) return;
            try {
                await deleteTopic(topicId);
                showToast('删除成功！');
                loadAllData();
            } catch (e) { showToast('删除失败：' + e.message, true); }
        }

        // ---- 用户管理 ----
        function renderUsers() {
            const list = document.getElementById('usersList');
            if (!usersCache.length) {
                list.innerHTML = '<p class="empty-state">暂无用户</p>';
                return;
            }
            let html = `<table><thead><tr>
                <th class="checkbox-col"><input type="checkbox" onchange="toggleAllCheckbox(this.checked)" /></th>
                <th>用户</th><th>昵称</th><th>邮箱</th><th>注册时间</th><th>⭐ 积分</th><th>等级</th><th>角色</th><th>操作</th>
            </tr></thead><tbody>`;
            usersCache.forEach(u => {
                const avatarUrl = u.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.username||'U')}&background=6d5bff&color=fff&size=30`;
                const dateStr = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '';
                const isAdminUser = u.is_admin || false;
                const checked = selectedUsers.has(u.id) ? 'checked' : '';
                const level = u.level || 1;
                const points = u.points || 0;
                html += `<tr>
                    <td class="checkbox-col" data-label="选择">
                        <input type="checkbox" class="user-checkbox" data-id="${u.id}" ${checked} onchange="updateSelectedCount()" />
                    </td>
                    <td data-label="用户"><img class="avatar-sm" src="${avatarUrl}" alt="${escapeHtml(u.username)}" /></td>
                    <td data-label="昵称">${escapeHtml(u.username)}</td>
                    <td data-label="邮箱">${escapeHtml(u.email || '未提供')}</td>
                    <td data-label="注册时间">${escapeHtml(dateStr)}</td>
                    <td data-label="⭐ 积分">${points}</td>
                    <td data-label="等级"><span class="level-badge">Lv.${level}</span></td>
                    <td data-label="角色">${isAdminUser ? '<span style="color:#6d5bff;">管理员</span>' : '普通用户'}</td>
                    <td data-label="操作">
                        ${isAdminUser ? `<span style="color:#6d5bff;font-size:0.75rem;">管理员</span>` : `
                            <button class="btn-edit" onclick="openEditUser('${u.id}')">✏️</button>
                            <button class="btn-success" onclick="setUserAdmin('${u.id}', true)">⬆</button>
                            <button class="btn-danger" onclick="deleteUserHandler('${u.id}')">🗑️</button>
                        `}
                        ${isAdminUser ? `<button class="btn-edit" onclick="setUserAdmin('${u.id}', false)" style="background:#fbbf24;">⬇</button>` : ''}
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            list.innerHTML = html;
            updateSelectedCount();
        }

        // ---- 批量操作 ----
        function selectAllUsers(select) {
            document.querySelectorAll('.user-checkbox').forEach(cb => {
                cb.checked = select;
                const id = cb.dataset.id;
                if (select) selectedUsers.add(id);
                else selectedUsers.delete(id);
            });
            updateSelectedCount();
        }

        function toggleAllCheckbox(checked) {
            document.querySelectorAll('.user-checkbox').forEach(cb => {
                cb.checked = checked;
                const id = cb.dataset.id;
                if (checked) selectedUsers.add(id);
                else selectedUsers.delete(id);
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            selectedUsers.clear();
            document.querySelectorAll('.user-checkbox:checked').forEach(cb => {
                selectedUsers.add(cb.dataset.id);
            });
            document.getElementById('selectedCount').textContent = `已选 ${selectedUsers.size} 人`;
        }

        async function batchSetAdmin(makeAdmin) {
            const ids = Array.from(selectedUsers);
            if (!ids.length) { showToast('请先选择用户', true); return; }
            if (!confirm(`确定${makeAdmin?'设为管理员':'取消管理员'}选中的 ${ids.length} 位用户吗？`)) return;
            try {
                await batchUpdateUsers(ids, { is_admin: makeAdmin });
                showToast(`✅ 已${makeAdmin?'设为管理员':'取消管理员'} ${ids.length} 位用户`);
                await loadAllData();
                selectedUsers.clear();
                updateSelectedCount();
            } catch (e) { showToast('操作失败：' + e.message, true); }
        }

        async function batchDeleteUsers() {
            const ids = Array.from(selectedUsers);
            if (!ids.length) { showToast('请先选择用户', true); return; }
            if (ids.includes(currentUser?.id)) {
                if (!confirm('⚠️ 选中包含你自己！确定要删除当前登录的管理员账号吗？')) return;
            }
            if (!confirm(`确定删除选中的 ${ids.length} 位用户吗？此操作不可恢复！`)) return;
            try {
                // 对每个用户先删除其关联数据，再删除 profile
                for (const userId of ids) {
                    await sb.from('comments').delete().eq('user_id', userId);
                    await sb.from('posts').delete().eq('author_id', userId);
                    await deleteUser(userId);
                }
                showToast(`✅ 已删除 ${ids.length} 位用户`);
                selectedUsers.clear();
                updateSelectedCount();
                await loadAllData();
            } catch (e) { showToast('删除失败：' + e.message, true); }
        }

        // ---- 单个用户操作 ----
        function openEditUser(userId) {
            const user = usersCache.find(u => u.id === userId);
            if (!user) return;
            editingUserId = userId;
            document.getElementById('editUserName').value = user.username || '';
            document.getElementById('editUserModal').classList.add('active');
            document.getElementById('editUserMsg').innerHTML = '';
        }
        function closeEditUserModal() {
            document.getElementById('editUserModal').classList.remove('active');
            editingUserId = null;
        }
        document.getElementById('editUserModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditUserModal();
        });

        async function saveUserEdit() {
            const newName = document.getElementById('editUserName').value.trim();
            const msg = document.getElementById('editUserMsg');
            if (!newName) { msg.innerHTML = '<p style="color:#ef4444;">昵称不能为空</p>'; return; }
            if (newName.length > 30) { msg.innerHTML = '<p style="color:#ef4444;">昵称不能超过30字符</p>'; return; }
            if (!editingUserId) return;
            try {
                await updateUser(editingUserId, { username: newName });
                msg.innerHTML = '<p style="color:#6ee7b7;">✅ 昵称修改成功！</p>';
                setTimeout(() => { closeEditUserModal(); loadAllData(); }, 1000);
            } catch (e) { msg.innerHTML = '<p style="color:#ef4444;">修改失败：' + e.message + '</p>'; }
        }

        async function setUserAdmin(userId, makeAdmin) {
            try {
                await updateUser(userId, { is_admin: makeAdmin });
                showToast(`✅ 用户${makeAdmin?'已设为管理员':'已取消管理员'}`);
                await loadAllData();
            } catch (e) { showToast('操作失败：' + e.message, true); }
        }

        // ---- 删除用户（先删关联数据） ----
        async function deleteUserHandler(userId) {
            if (!confirm('确定删除该用户吗？（将删除其所有帖子和回复）')) return;
            if (userId === currentUser?.id) {
                if (!confirm('⚠️ 你要删除自己的账号吗？')) return;
            }
            try {
                await sb.from('comments').delete().eq('user_id', userId);
                await sb.from('posts').delete().eq('author_id', userId);
                await deleteUser(userId);
                showToast('✅ 用户及其所有内容已删除！');
                selectedUsers.delete(userId);
                await loadAllData();
            } catch (e) {
                showToast('删除失败：' + e.message, true);
                console.error(e);
            }
        }

        // ---- 添加用户 ----
        function openAddUserModal() {
            document.getElementById('addUserModal').classList.add('active');
            document.getElementById('addUserEmail').value = '';
            document.getElementById('addUserPassword').value = '';
            document.getElementById('addUserName').value = '';
            document.getElementById('addUserAdmin').checked = false;
            document.getElementById('addUserMsg').innerHTML = '';
        }
        function closeAddUserModal() {
            document.getElementById('addUserModal').classList.remove('active');
        }
        document.getElementById('addUserModal').addEventListener('click', function(e) {
            if (e.target === this) closeAddUserModal();
        });

        async function addUser() {
            const email = document.getElementById('addUserEmail').value.trim();
            const password = document.getElementById('addUserPassword').value.trim();
            const username = document.getElementById('addUserName').value.trim() || email.split('@')[0];
            const makeAdmin = document.getElementById('addUserAdmin').checked;
            const msg = document.getElementById('addUserMsg');
            if (!email || !password) {
                msg.innerHTML = '<p style="color:#ef4444;">请填写邮箱和密码</p>';
                return;
            }
            if (password.length < 6) {
                msg.innerHTML = '<p style="color:#ef4444;">密码至少6位</p>';
                return;
            }
            msg.innerHTML = '<p style="color:rgba(255,255,255,0.5);">⏳ 创建中...</p>';
            try {
                const authRes = await fetch(SUPABASE_URL + '/auth/v1/signup', {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, data: { username } })
                });
                const authData = await authRes.json();
                if (!authRes.ok) {
                    if (authRes.status === 429) {
                        msg.innerHTML = '<p style="color:#ef4444;">❌ 注册限流，请稍后重试或配置 SMTP</p>';
                    } else {
                        msg.innerHTML = '<p style="color:#ef4444;">❌ 创建失败：' + (authData.error_description || authData.message || '未知错误') + '</p>';
                    }
                    return;
                }
                const profileRes = await fetch(SUPABASE_URL + '/rest/v1/profiles', {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': 'Bearer ' + accessToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: authData.user.id,
                        username: username,
                        email: email,
                        is_admin: makeAdmin,
                        points: 0,
                        level: 1
                    })
                });
                if (!profileRes.ok) {
                    const profileErr = await profileRes.text();
                    console.warn('创建 profiles 失败:', profileErr);
                    msg.innerHTML = '<p style="color:#ef4444;">⚠️ 用户已创建，但 profiles 同步失败</p>';
                    return;
                }
                msg.innerHTML = '<p style="color:#6ee7b7;">✅ 用户创建成功！</p>';
                setTimeout(() => {
                    closeAddUserModal();
                    loadAllData();
                }, 1500);
            } catch (err) {
                msg.innerHTML = '<p style="color:#ef4444;">❌ 添加失败：' + err.message + '</p>';
            }
        }

        // ---- 暴露全局 ----
        window.switchTab = switchTab;
        window.filterPosts = filterPosts;
        window.deletePostHandler = deletePostHandler;
        window.deleteCommentHandler = deleteCommentHandler;
        window.deleteTopicHandler = deleteTopicHandler;
        window.deleteUserHandler = deleteUserHandler;
        window.openEditUser = openEditUser;
        window.closeEditUserModal = closeEditUserModal;
        window.saveUserEdit = saveUserEdit;
        window.openAddUserModal = openAddUserModal;
        window.closeAddUserModal = closeAddUserModal;
        window.addUser = addUser;
        window.selectAllUsers = selectAllUsers;
        window.toggleAllCheckbox = toggleAllCheckbox;
        window.updateSelectedCount = updateSelectedCount;
        window.batchSetAdmin = batchSetAdmin;
        window.batchDeleteUsers = batchDeleteUsers;
        window.setUserAdmin = setUserAdmin;

        // ---- 初始化 ----
        async function init() {
            const ok = await checkAuth();
            if (ok) {
                await loadAllData();
            }
        }
        init();
    }
</script>
</body>
</html>
