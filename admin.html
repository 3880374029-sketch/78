<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窍某论坛 - 后台管理</title>
    <!-- CSP（与前台保持一致） -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: https://ui-avatars.com https://bkvsceiezbyexzqpvblj.supabase.co; style-src 'self' 'unsafe-inline';">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e1a;
            color: #e8edf5;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        h1 { font-size: 2rem; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .btn {
            background: linear-gradient(135deg, #6d5bff, #8b5cf6);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-danger:hover { background: #b91c1c; }
        .btn-outline { background: transparent; border: 1px solid #444; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: #a5b4fc; }
        .stat-card .label { color: rgba(255,255,255,0.4); font-size: 0.8rem; }

        .section {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .section h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #e8edf5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid #333;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            vertical-align: middle;
        }
        td .content-preview {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .action-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            background: #ef4444;
            color: #fff;
            transition: 0.3s;
        }
        .action-btn:hover { background: #b91c1c; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 1000;
            display: none;
            max-width: 90%;
        }
        .toast.show { display: block; animation: fadeIn 0.3s; }
        .toast.error { border-color: #ef4444; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .empty-state { text-align: center; padding: 30px; color: rgba(255,255,255,0.3); }
        .loading { color: rgba(255,255,255,0.5); font-style: italic; }
        .badge-admin { background: #fbbf24; color: #1a1a2e; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
        .badge-user { background: #3b82f6; color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔐 后台管理</h1>
        <div class="user-info">
            <span id="adminName">管理员</span>
            <button class="btn btn-outline" onclick="logout()">退出</button>
            <a href="index.html" class="btn btn-outline" style="text-decoration:none;">← 返回论坛</a>
        </div>
    </header>

    <!-- 统计卡片 -->
    <div class="stats" id="statsContainer">
        <div class="stat-card"><div class="num" id="totalPosts">-</div><div class="label">总帖子</div></div>
        <div class="stat-card"><div class="num" id="totalUsers">-</div><div class="label">总用户</div></div>
        <div class="stat-card"><div class="num" id="totalComments">-</div><div class="label">总评论</div></div>
    </div>

    <!-- 帖子管理 -->
    <div class="section">
        <h2>
            <span>📄 帖子管理</span>
            <button class="btn btn-outline" onclick="loadPosts()">刷新</button>
        </h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>作者</th>
                        <th>内容预览</th>
                        <th>时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="postsTableBody">
                    <tr><td colspan="6" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 用户管理 -->
    <div class="section">
        <h2>
            <span>👥 用户管理</span>
            <button class="btn btn-outline" onclick="loadUsers()">刷新</button>
        </h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>角色</th>
                        <th>积分</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="6" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 评论管理 -->
    <div class="section">
        <h2>
            <span>💬 评论管理</span>
            <button class="btn btn-outline" onclick="loadComments()">刷新</button>
        </h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>帖子ID</th>
                        <th>用户</th>
                        <th>评论内容</th>
                        <th>时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="commentsTableBody">
                    <tr><td colspan="6" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ===== Supabase 加载器 ===== -->
<script>
    (function loadSupabase() {
        const cdnList = [
            'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
            'https://unpkg.com/@supabase/supabase-js@2',
            'https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.39.0/umd/supabase.min.js'
        ];
        let index = 0;
        function tryLoad() {
            if (index >= cdnList.length) {
                document.body.innerHTML = `<div style="text-align:center;padding:50px;color:#ef4444;">加载失败，请刷新。</div>`;
                return;
            }
            const script = document.createElement('script');
            script.src = cdnList[index];
            script.onload = function() {
                const lib = window.supabase || window.supabaseJs;
                if (!lib) { index++; tryLoad(); return; }
                let wait = 0;
                const interval = setInterval(() => {
                    if (typeof startAdmin === 'function') {
                        clearInterval(interval);
                        startAdmin(lib);
                    } else if (wait > 20) {
                        clearInterval(interval);
                        document.body.innerHTML = `<div style="text-align:center;padding:50px;color:#ef4444;">启动超时，请刷新。</div>`;
                    }
                    wait++;
                }, 500);
            };
            script.onerror = function() { index++; tryLoad(); };
            document.head.appendChild(script);
        }
        tryLoad();
    })();
</script>

<!-- ============================================================= -->
<!-- 后台主程序脚本 -->
<!-- ============================================================= -->
<script>
    function startAdmin(supabase) {
        const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrdnNjZWllemJ5ZXh6cXB2YmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDk1MzIsImV4cCI6MjA5OTI4NTUzMn0.1h4Yp8YaJdMMOQW8N2zqvJi6QrxHPncBFMK9LjdmZ6E';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---- 状态 ----
        let currentUser = null;
        let accessToken = null;
        let refreshToken = null;

        // ---- 工具 ----
        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            clearTimeout(t._hide);
            t._hide = setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(d) {
            if (!d) return '';
            return new Date(d).toLocaleString('zh-CN');
        }

        // ---- 认证检查 ----
        async function checkAdmin() {
            const token = localStorage.getItem('sb_token');
            const refresh = localStorage.getItem('sb_refresh_token');
            const userStr = localStorage.getItem('sb_user');
            if (!token || !userStr) {
                window.location.href = 'index.html'; // 未登录，跳转回论坛
                return false;
            }
            accessToken = token;
            refreshToken = refresh || null;
            try { currentUser = JSON.parse(userStr); } catch (e) { window.location.href = 'index.html'; return false; }

            // 获取profile，检查is_admin
            try {
                const resp = await fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + currentUser.id, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + accessToken }
                });
                if (!resp.ok) throw new Error('获取资料失败');
                const data = await resp.json();
                if (data && data.length > 0 && data[0].is_admin === true) {
                    // 管理员
                    document.getElementById('adminName').textContent = data[0].username || '管理员';
                    return true;
                } else {
                    showToast('你不是管理员，无权访问后台', true);
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                    return false;
                }
            } catch (err) {
                showToast('权限验证失败', true);
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                return false;
            }
        }

        // ---- 加载数据 ----
        async function loadStats() {
            try {
                const [postsRes, usersRes, commentsRes] = await Promise.all([
                    fetch(SUPABASE_URL + '/rest/v1/posts?select=id', { headers: { 'apikey': SUPABASE_ANON_KEY } }),
                    fetch(SUPABASE_URL + '/rest/v1/profiles?select=id', { headers: { 'apikey': SUPABASE_ANON_KEY } }),
                    fetch(SUPABASE_URL + '/rest/v1/comments?select=id', { headers: { 'apikey': SUPABASE_ANON_KEY } })
                ]);
                const posts = await postsRes.json();
                const users = await usersRes.json();
                const comments = await commentsRes.json();
                document.getElementById('totalPosts').textContent = posts.length || 0;
                document.getElementById('totalUsers').textContent = users.length || 0;
                document.getElementById('totalComments').textContent = comments.length || 0;
            } catch (e) { console.error('统计加载失败', e); }
        }

        async function loadPosts() {
            const tbody = document.getElementById('postsTableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
            try {
                const resp = await fetch(SUPABASE_URL + '/rest/v1/posts?order=created_at.desc', {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + accessToken }
                });
                const data = await resp.json();
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无帖子</td></tr>';
                    return;
                }
                // 获取作者名字
                const authorIds = data.map(p => p.author_id).filter(Boolean);
                let userMap = {};
                if (authorIds.length) {
                    const { data: profiles } = await sb.from('profiles').select('id, username').in('id', authorIds);
                    if (profiles) userMap = Object.fromEntries(profiles.map(u => [u.id, u.username]));
                }
                tbody.innerHTML = data.map(p => {
                    const author = userMap[p.author_id] || '匿名';
                    return `<tr>
                        <td>${p.id.substring(0, 8)}</td>
                        <td>${escapeHtml(p.title)}</td>
                        <td>${escapeHtml(author)}</td>
                        <td><div class="content-preview">${escapeHtml(p.content ? p.content.substring(0, 60) : '')}</div></td>
                        <td>${formatTime(p.created_at)}</td>
                        <td><button class="action-btn" onclick="deletePost('${p.id}')">删除</button></td>
                    </tr>`;
                }).join('');
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6" style="color:#ef4444;">加载失败</td></tr>';
            }
        }

        async function loadUsers() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
            try {
                const resp = await fetch(SUPABASE_URL + '/rest/v1/profiles', {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + accessToken }
                });
                const data = await resp.json();
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无用户</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(u => `
                    <tr>
                        <td>${u.id.substring(0, 8)}</td>
                        <td>${escapeHtml(u.username || '未命名')}</td>
                        <td>${escapeHtml(u.email || '')}</td>
                        <td>${u.is_admin ? '<span class="badge-admin">管理员</span>' : '<span class="badge-user">普通用户</span>'}</td>
                        <td>${u.points || 0}</td>
                        <td>${!u.is_admin ? `<button class="action-btn" onclick="deleteUser('${u.id}')">删除</button>` : '—'}</td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6" style="color:#ef4444;">加载失败</td></tr>';
            }
        }

        async function loadComments() {
            const tbody = document.getElementById('commentsTableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
            try {
                const resp = await fetch(SUPABASE_URL + '/rest/v1/comments?order=created_at.desc', {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + accessToken }
                });
                const data = await resp.json();
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无评论</td></tr>';
                    return;
                }
                // 获取用户名
                const userIds = data.map(c => c.user_id).filter(Boolean);
                let userMap = {};
                if (userIds.length) {
                    const { data: profiles } = await sb.from('profiles').select('id, username').in('id', userIds);
                    if (profiles) userMap = Object.fromEntries(profiles.map(u => [u.id, u.username]));
                }
                tbody.innerHTML = data.map(c => {
                    const author = userMap[c.user_id] || '匿名';
                    return `<tr>
                        <td>${c.id.substring(0, 8)}</td>
                        <td>${c.post_id ? c.post_id.substring(0, 8) : '—'}</td>
                        <td>${escapeHtml(author)}</td>
                        <td><div class="content-preview">${escapeHtml(c.content ? c.content.substring(0, 60) : '')}</div></td>
                        <td>${formatTime(c.created_at)}</td>
                        <td><button class="action-btn" onclick="deleteComment('${c.id}')">删除</button></td>
                    </tr>`;
                }).join('');
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6" style="color:#ef4444;">加载失败</td></tr>';
            }
        }

        // ---- 删除操作 ----
        window.deletePost = async function(postId) {
            if (!confirm('确定删除该帖子及其所有评论吗？')) return;
            try {
                // 先删除关联评论（级联删除需要数据库支持，若没级联，需要手动删评论）
                // 简单起见，先删除评论再删帖子
                const { error: comErr } = await sb.from('comments').delete().eq('post_id', postId);
                if (comErr) console.warn('删除评论失败（可能没有）', comErr);
                const { error } = await sb.from('posts').delete().eq('id', postId);
                if (error) throw error;
                showToast('帖子删除成功');
                loadPosts();
                loadStats();
            } catch (err) {
                showToast('删除失败：' + err.message, true);
            }
        };

        window.deleteUser = async function(userId) {
            if (!confirm('确定删除该用户及其所有内容吗？')) return;
            try {
                // 删除该用户的所有帖子、评论（需先删关联）
                await sb.from('comments').delete().eq('user_id', userId);
                await sb.from('posts').delete().eq('author_id', userId);
                // 删除 profile（可连同 auth 用户，但这里仅删除 profile）
                const { error } = await sb.from('profiles').delete().eq('id', userId);
                if (error) throw error;
                showToast('用户已删除');
                loadUsers();
                loadStats();
            } catch (err) {
                showToast('删除失败：' + err.message, true);
            }
        };

        window.deleteComment = async function(commentId) {
            if (!confirm('确定删除该评论吗？')) return;
            try {
                const { error } = await sb.from('comments').delete().eq('id', commentId);
                if (error) throw error;
                showToast('评论删除成功');
                loadComments();
                loadStats();
            } catch (err) {
                showToast('删除失败：' + err.message, true);
            }
        };

        // ---- 登出 ----
        window.logout = function() {
            localStorage.removeItem('sb_token');
            localStorage.removeItem('sb_refresh_token');
            localStorage.removeItem('sb_user');
            window.location.href = 'index.html';
        };

        // ---- 初始化 ----
        async function init() {
            const ok = await checkAdmin();
            if (!ok) return;
            await loadStats();
            await loadPosts();
            await loadUsers();
            await loadComments();
        }

        // 暴露全局以供 onclick 调用
        window.deletePost = window.deletePost;
        window.deleteUser = window.deleteUser;
        window.deleteComment = window.deleteComment;
        window.logout = window.logout;
        window.loadPosts = loadPosts;
        window.loadUsers = loadUsers;
        window.loadComments = loadComments;

        init();
    }
</script>
</body>
</html>
