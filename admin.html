<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理后台 - 窍某博客网</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e1a;
            color: #e8edf5;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            background: linear-gradient(135deg, #c4b5fd, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex: 1 1 150px;
        }
        .stat-card .num {
            font-size: 2rem;
            font-weight: 700;
            color: #a5b4fc;
        }
        .stat-card .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: #6d5bff;
            color: #fff;
            border-color: #6d5bff;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-btn.active {
            background: #6d5bff;
            color: #fff;
            border-color: #6d5bff;
        }
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th,
        td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        th {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        td {
            color: rgba(255, 255, 255, 0.8);
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
        }
        .badge.tech {
            background: rgba(96, 165, 250, 0.15);
            color: #93bbfc;
        }
        .badge.life {
            background: rgba(52, 211, 153, 0.12);
            color: #6ee7b7;
        }
        .badge.career {
            background: rgba(251, 191, 36, 0.12);
            color: #fcd34d;
        }
        .badge.topic {
            background: rgba(251, 191, 36, 0.15);
            color: #fcd34d;
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: scale(1.04);
        }
        .btn-edit {
            background: #6d5bff;
            color: #fff;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
            margin-right: 6px;
        }
        .btn-edit:hover {
            transform: scale(1.04);
        }
        .btn-view {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
            margin-right: 6px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-view:hover {
            transform: scale(1.04);
        }
        .login-required {
            text-align: center;
            padding: 60px 20px;
        }
        .login-required h2 {
            font-size: 2rem;
            margin-bottom: 12px;
        }
        .login-required p {
            color: rgba(255, 255, 255, 0.4);
        }
        .btn {
            background: #6d5bff;
            color: #fff;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 16px rgba(109, 91, 255, 0.3);
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: rgba(255, 255, 255, 0.3);
        }
        @media (max-width: 640px) {
            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }
            th {
                display: none;
            }
            tr {
                margin-bottom: 16px;
                border: 1px solid rgba(255, 255, 255, 0.06);
                border-radius: 12px;
                padding: 12px;
            }
            td {
                border: none;
                padding: 4px 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            td::before {
                content: attr(data-label);
                font-weight: 600;
                color: rgba(255, 255, 255, 0.4);
                margin-right: 12px;
            }
            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 管理后台</h1>
        <div id="loginCheck"></div>

        <div id="adminContent" style="display:none;">
            <div class="stats" id="statsArea">
                <div class="stat-card"><div class="num" id="postCount">0</div><div class="label">📄 文章</div></div>
                <div class="stat-card"><div class="num" id="commentCount">0</div><div class="label">💬 评论</div></div>
                <div class="stat-card"><div class="num" id="userCount">0</div><div class="label">👤 用户</div></div>
                <div class="stat-card"><div class="num" id="likeCount">0</div><div class="label">❤️ 总点赞</div></div>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('posts')">📄 文章管理</button>
                <button class="tab-btn" onclick="switchTab('comments')">💬 评论管理</button>
                <button class="tab-btn" onclick="switchTab('users')">👤 用户管理</button>
            </div>

            <div id="tabPosts" class="panel">
                <div class="filter-bar">
                    <button class="filter-btn active" data-cat="all" onclick="filterPosts('all')">📋 全部</button>
                    <button class="filter-btn" data-cat="tech" onclick="filterPosts('tech')">💻 科技</button>
                    <button class="filter-btn" data-cat="life" onclick="filterPosts('life')">🌿 生活</button>
                    <button class="filter-btn" data-cat="career" onclick="filterPosts('career')">💼 职场</button>
                    <button class="filter-btn" data-cat="topic" onclick="filterPosts('topic')">💬 话题</button>
                </div>
                <div id="postsList"><p class="empty-state">加载中...</p></div>
            </div>

            <div id="tabComments" class="panel" style="display:none;">
                <div id="commentsList"><p class="empty-state">加载中...</p></div>
            </div>

            <div id="tabUsers" class="panel" style="display:none;">
                <div id="usersList"><p class="empty-state">加载中...</p></div>
            </div>
        </div>
    </div>

    <script>
        // =============================================================
        // ⚠️ 管理员 UID（替换成你自己的）
        // =============================================================
        const ADMIN_UID = "FEQmE2qlzwQqmIgKqU3VFuaYh602";

        const firebaseConfig = {
            apiKey: "AIzaSyB8ZalWGiP8at0EUIfKN46CbwQ3eH4iM8E",
            authDomain: "project-170416828695178494.firebaseapp.com",
            projectId: "project-170416828695178494",
            storageBucket: "project-170416828695178494.firebasestorage.app",
            messagingSenderId: "1096326612519",
            appId: "1:1096326612519:web:8208916652738ce870f002",
            measurementId: "G-3K0YDFV3J5"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let postsCache = [];
        let commentsCache = [];
        let usersCache = [];
        let currentCategory = 'all';
        let totalLikes = 0;

        // =============================================================
        // 认证 + 权限检查
        // =============================================================
        auth.onAuthStateChanged(user => {
            currentUser = user;
            const checkDiv = document.getElementById('loginCheck');
            const content = document.getElementById('adminContent');

            if (user) {
                if (user.uid === ADMIN_UID) {
                    checkDiv.innerHTML =
                        `<p style="color:rgba(255,255,255,0.5);">👤 管理员：<strong style="color:#a5b4fc;">${user.displayName || user.email}</strong></p>`;
                    content.style.display = 'block';
                    loadAllData();
                } else {
                    checkDiv.innerHTML = `
                        <div class="login-required">
                            <h2>⛔ 权限不足</h2>
                            <p>你没有管理权限，请联系站长</p>
                            <a href="index.html" class="btn" style="display:inline-block;margin-top:16px;text-decoration:none;">返回首页</a>
                        </div>
                    `;
                    content.style.display = 'none';
                }
            } else {
                checkDiv.innerHTML = `
                    <div class="login-required">
                        <h2>🔐 请先登录</h2>
                        <p>你需要登录后才能管理博客内容</p>
                        <a href="index.html" class="btn" style="display:inline-block;margin-top:16px;text-decoration:none;">返回首页登录</a>
                    </div>
                `;
                content.style.display = 'none';
            }
        });

        // =============================================================
        // 加载数据
        // =============================================================
        async function loadAllData() {
            await loadPosts();
            await loadComments();
            await loadUsers();
            updateStats();
        }

        async function loadPosts() {
            try {
                const snapshot = await db.collection('posts').orderBy('created_at', 'desc').get();
                postsCache = [];
                totalLikes = 0;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    postsCache.push(data);
                    totalLikes += (data.likes || 0);
                });
                renderPosts(currentCategory);
            } catch (e) { console.error(e); }
        }

        async function loadComments() {
            try {
                const snapshot = await db.collection('comments').orderBy('created_at', 'desc').get();
                commentsCache = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    commentsCache.push(data);
                });
                renderComments();
            } catch (e) { console.error(e); }
        }

        async function loadUsers() {
            try {
                const snapshot = await db.collection('users').get();
                usersCache = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    usersCache.push(data);
                });
                renderUsers();
            } catch (e) { console.error(e); }
        }

        function updateStats() {
            document.getElementById('postCount').textContent = postsCache.length;
            document.getElementById('commentCount').textContent = commentsCache.length;
            document.getElementById('userCount').textContent = usersCache.length;
            document.getElementById('likeCount').textContent = totalLikes;
        }

        // =============================================================
        // 切换 Tab
        // =============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick*="${tab}"]`)?.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).style.display = 'block';
        }

        // =============================================================
        // 文章管理
        // =============================================================
        function filterPosts(category) {
            currentCategory = category;
            document.querySelectorAll('#tabPosts .filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.cat === category);
            });
            renderPosts(category);
        }

        function renderPosts(category) {
            const list = document.getElementById('postsList');
            let filtered = postsCache;
            if (category !== 'all') {
                filtered = filtered.filter(p => p.category === category);
            }
            if (!filtered.length) {
                list.innerHTML = '<p class="empty-state">📭 暂无文章</p>';
                return;
            }
            const catMap = { tech: '科技', life: '生活', career: '职场', topic: '💬 话题' };
            let html = `
                <table>
                    <thead><tr><th>标题</th><th>分类</th><th>作者</th><th>日期</th><th>❤️</th><th>👁️</th><th>操作</th></tr></thead>
                    <tbody>
            `;
            filtered.forEach(p => {
                const badgeClass = p.category === 'topic' ? 'badge topic' : `badge ${p.category}`;
                const badgeText = catMap[p.category] || p.category;
                const dateStr = p.created_at ? new Date(p.created_at.seconds * 1000).toLocaleDateString('zh-CN') : '';
                html += `
                    <tr>
                        <td data-label="标题">${p.title}</td>
                        <td data-label="分类"><span class="${badgeClass}">${badgeText}</span></td>
                        <td data-label="作者">${p.author_name || '匿名'}</td>
                        <td data-label="日期">${dateStr}</td>
                        <td data-label="❤️">${p.likes || 0}</td>
                        <td data-label="👁️">${p.views || 0}</td>
                        <td data-label="操作">
                            <a href="index.html" class="btn-view" target="_blank">🔗</a>
                            <button class="btn-danger" onclick="deletePost('${p.id}')">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            html += `</tbody></table>`;
            list.innerHTML = html;
        }

        async function deletePost(postId) {
            if (!confirm('确定要删除这篇文章吗？（会同时删除所有评论）')) return;
            try {
                const commentsSnap = await db.collection('comments').where('post_id', '==', postId).get();
                const batch = db.batch();
                commentsSnap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                await db.collection('posts').doc(postId).delete();
                alert('删除成功！');
                loadAllData();
            } catch (err) {
                alert('删除失败：' + err.message);
            }
        }

        // =============================================================
        // 评论管理
        // =============================================================
        function renderComments() {
            const list = document.getElementById('commentsList');
            if (!commentsCache.length) {
                list.innerHTML = '<p class="empty-state">💬 暂无评论</p>';
                return;
            }
            let html = `
                <table>
                    <thead><tr><th>评论内容</th><th>用户</th><th>文章</th><th>时间</th><th>操作</th></tr></thead>
                    <tbody>
            `;
            commentsCache.forEach(c => {
                const dateStr = c.created_at ? new Date(c.created_at.seconds * 1000).toLocaleString('zh-CN') : '';
                // 尝试找到对应的文章标题
                const post = postsCache.find(p => p.id === c.post_id);
                const postTitle = post ? post.title : c.post_id || '已删除';
                html += `
                    <tr>
                        <td data-label="评论">${c.content.length > 50 ? c.content.slice(0,50)+'...' : c.content}</td>
                        <td data-label="用户">${c.username || '匿名'}</td>
                        <td data-label="文章">${postTitle}</td>
                        <td data-label="时间">${dateStr}</td>
                        <td data-label="操作">
                            <button class="btn-danger" onclick="deleteComment('${c.id}')">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            html += `</tbody></table>`;
            list.innerHTML = html;
        }

        async function deleteComment(commentId) {
            if (!confirm('确定要删除这条评论吗？')) return;
            try {
                await db.collection('comments').doc(commentId).delete();
                alert('删除成功！');
                loadAllData();
            } catch (err) {
                alert('删除失败：' + err.message);
            }
        }

        // =============================================================
        // 用户管理
        // =============================================================
        function renderUsers() {
            const list = document.getElementById('usersList');
            if (!usersCache.length) {
                list.innerHTML = '<p class="empty-state">👤 暂无用户</p>';
                return;
            }
            let html = `
                <table>
                    <thead><tr><th>昵称</th><th>邮箱</th><th>注册时间</th><th>操作</th></tr></thead>
                    <tbody>
            `;
            usersCache.forEach(u => {
                const dateStr = u.created_at ? new Date(u.created_at.seconds * 1000).toLocaleDateString('zh-CN') : '';
                html += `
                    <tr>
                        <td data-label="昵称">${u.username || '用户'}</td>
                        <td data-label="邮箱">${u.email || '未提供'}</td>
                        <td data-label="注册时间">${dateStr}</td>
                        <td data-label="操作">
                            ${u.id !== ADMIN_UID ? `<button class="btn-danger" onclick="deleteUser('${u.id}')">🗑️</button>` : '<span style="color:#6d5bff;">管理员</span>'}
                        </td>
                    </tr>
                `;
            });
            html += `</tbody></table>`;
            list.innerHTML = html;
        }

        async function deleteUser(userId) {
            if (userId === ADMIN_UID) {
                alert('不能删除管理员自己');
                return;
            }
            if (!confirm('确定要删除这个用户吗？这会同时删除该用户的所有评论。')) return;
            try {
                // 删除该用户的所有评论
                const commentsSnap = await db.collection('comments').where('user_id', '==', userId).get();
                const batch = db.batch();
                commentsSnap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                // 删除该用户的所有文章
                const postsSnap = await db.collection('posts').where('author_id', '==', userId).get();
                postsSnap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                // 删除用户资料
                await db.collection('users').doc(userId).delete();
                alert('删除成功！');
                loadAllData();
            } catch (err) {
                alert('删除失败：' + err.message);
            }
        }

        // =============================================================
        // 暴露全局函数
        // =============================================================
        window.switchTab = switchTab;
        window.filterPosts = filterPosts;
        window.deletePost = deletePost;
        window.deleteComment = deleteComment;
        window.deleteUser = deleteUser;
    </script>
</body>
</html>
