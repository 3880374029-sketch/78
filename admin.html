<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理后台 - 窍某博客网</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e1a;
            color: #e8edf5;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .login-screen {
            max-width: 400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.04);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
        }
        .login-screen h2 {
            margin-bottom: 8px;
        }
        .login-screen p {
            color: rgba(255,255,255,0.4);
            margin-bottom: 20px;
        }
        .login-screen input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            color: #e8edf5;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
        }
        .login-screen input:focus {
            border-color: #6d5bff;
        }
        .btn {
            background: #6d5bff;
            color: #fff;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            width: 100%;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(109,91,255,0.3);
        }
        .error-msg {
            color: #ef4444;
            margin-bottom: 12px;
            display: none;
        }
        h1 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #c4b5fd, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.04); padding: 16px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: #a5b4fc; }
        .stat-card .label { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); padding: 8px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #6d5bff; color: #fff; border-color: #6d5bff; }
        .tab-btn:hover { background: rgba(255,255,255,0.08); }
        .panel { display: none; }
        .panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); }
        th { color: rgba(255,255,255,0.4); font-weight: 500; font-size: 0.85rem; }
        td { color: rgba(255,255,255,0.7); }
        .btn-danger { background: #ef4444; color: #fff; border: none; padding: 4px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .btn-danger:hover { background: #dc2626; transform: scale(1.04); }
        .btn-edit { background: #6d5bff; color: #fff; border: none; padding: 4px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; margin-right: 6px; transition: 0.3s; }
        .btn-edit:hover { transform: scale(1.04); }
        .admin-content { display: none; }
        @media (max-width: 640px) { table { font-size: 0.8rem; } th, td { padding: 8px 10px; } .stats { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- 密码验证界面 -->
        <div id="loginScreen" class="login-screen">
            <h2>🔐 管理后台</h2>
            <p>请输入访问密码</p>
            <div id="errorMsg" class="error-msg">❌ 密码错误，请重试</div>
            <input type="password" id="passwordInput" placeholder="请输入密码" />
            <button class="btn" onclick="verifyPassword()">确认</button>
        </div>

        <!-- 管理界面（验证成功后显示） -->
        <div id="adminContent" class="admin-content">
            <h1>📊 管理后台</h1>
            <div id="loginCheck"></div>

            <div class="stats" id="statsArea">
                <div class="stat-card"><div class="num" id="postCount">0</div><div class="label">📄 文章</div></div>
                <div class="stat-card"><div class="num" id="commentCount">0</div><div class="label">💬 评论</div></div>
                <div class="stat-card"><div class="num" id="userCount">0</div><div class="label">👤 用户</div></div>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" data-tab="posts" onclick="switchTab('posts')">📄 文章管理</button>
                <button class="tab-btn" data-tab="comments" onclick="switchTab('comments')">💬 评论管理</button>
                <button class="tab-btn" data-tab="users" onclick="switchTab('users')">👤 用户管理</button>
            </div>

            <div id="tabPosts" class="panel active">
                <div id="postsList"><p style="color:rgba(255,255,255,0.3);">加载中...</p></div>
            </div>
            <div id="tabComments" class="panel">
                <div id="commentsList"><p style="color:rgba(255,255,255,0.3);">加载中...</p></div>
            </div>
            <div id="tabUsers" class="panel">
                <div id="usersList"><p style="color:rgba(255,255,255,0.3);">加载中...</p></div>
            </div>
        </div>
    </div>

    <script>
        // =============================================================
        // 密码验证
        // =============================================================
        const ADMIN_PASSWORD = "3880374029@qq.com";  // 设置你的密码

        function verifyPassword() {
            const input = document.getElementById('passwordInput').value.trim();
            const error = document.getElementById('errorMsg');
            if (input === ADMIN_PASSWORD) {
                // 密码正确，显示管理界面
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                // 初始化 Firebase 并加载数据
                initFirebaseAndLoad();
            } else {
                error.style.display = 'block';
                setTimeout(() => error.style.display = 'none', 3000);
            }
        }

        // 回车键触发验证
        document.getElementById('passwordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') verifyPassword();
        });

        // =============================================================
        // Firebase 初始化及数据加载（与之前相同）
        // =============================================================
        function initFirebaseAndLoad() {
            const firebaseConfig = {
                apiKey: "AIzaSyB8ZalWGiP8at0EUIfKN46CbwQ3eH4iM8E",
                authDomain: "project-170416828695178494.firebaseapp.com",
                projectId: "project-170416828695178494",
                storageBucket: "project-170416828695178494.firebasestorage.app",
                messagingSenderId: "1096326612519",
                appId: "1:1096326612519:web:8208916652738ce870f002",
                measurementId: "G-3K0YDFV3J5"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            let currentUser = null;
            let postsCache = [];
            let commentsCache = [];
            let usersCache = [];

            // 监听登录状态，用于显示用户信息
            auth.onAuthStateChanged(user => {
                currentUser = user;
                const checkDiv = document.getElementById('loginCheck');
                if (user) {
                    checkDiv.innerHTML =
                        `<p style="color:rgba(255,255,255,0.5);">👤 当前登录：<strong style="color:#a5b4fc;">${user.displayName || user.email}</strong></p>`;
                } else {
                    checkDiv.innerHTML =
                        `<p style="color:rgba(255,255,255,0.5);">⚠️ 未登录，数据可能不完整</p>`;
                }
            });

            // 加载所有数据
            async function loadAllData() {
                await loadPosts();
                await loadComments();
                await loadUsers();
                updateStats();
            }

            async function loadPosts() {
                try {
                    const snapshot = await db.collection('posts').orderBy('created_at', 'desc').get();
                    postsCache = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        data.id = doc.id;
                        postsCache.push(data);
                    });
                    renderPosts();
                } catch (e) { console.error(e); }
            }

            async function loadComments() {
                try {
                    const snapshot = await db.collection('comments').orderBy('created_at', 'desc').get();
                    commentsCache = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        data.id = doc.id;
                        commentsCache.push(data);
                    });
                    renderComments();
                } catch (e) { console.error(e); }
            }

            async function loadUsers() {
                try {
                    const snapshot = await db.collection('users').get();
                    usersCache = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        data.id = doc.id;
                        usersCache.push(data);
                    });
                    renderUsers();
                } catch (e) { console.error(e); }
            }

            function updateStats() {
                document.getElementById('postCount').textContent = postsCache.length;
                document.getElementById('commentCount').textContent = commentsCache.length;
                document.getElementById('userCount').textContent = usersCache.length;
            }

            function renderPosts() {
                const list = document.getElementById('postsList');
                if (!postsCache.length) {
                    list.innerHTML = '<p style="color:rgba(255,255,255,0.3);">暂无文章</p>';
                    return;
                }
                list.innerHTML = `
                    <table>
                        <thead><tr><th>标题</th><th>作者</th><th>日期</th><th>操作</th></tr></thead>
                        <tbody>
                            ${postsCache.map(p => `
                                <tr>
                                    <td>${p.title}</td>
                                    <td>${p.author_name || '匿名'}</td>
                                    <td>${p.created_at ? new Date(p.created_at.seconds * 1000).toLocaleDateString() : ''}</td>
                                    <td>
                                        <button class="btn-edit" onclick="editPost('${p.id}')">✏️</button>
                                        <button class="btn-danger" onclick="deletePost('${p.id}')">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            function renderComments() {
                const list = document.getElementById('commentsList');
                if (!commentsCache.length) {
                    list.innerHTML = '<p style="color:rgba(255,255,255,0.3);">暂无评论</p>';
                    return;
                }
                list.innerHTML = `
                    <table>
                        <thead><tr><th>评论</th><th>用户</th><th>文章ID</th><th>操作</th></tr></thead>
                        <tbody>
                            ${commentsCache.map(c => `
                                <tr>
                                    <td>${c.content}</td>
                                    <td>${c.username || '匿名'}</td>
                                    <td>${c.post_id || '未知'}</td>
                                    <td><button class="btn-danger" onclick="deleteComment('${c.id}')">🗑️</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            function renderUsers() {
                const list = document.getElementById('usersList');
                if (!usersCache.length) {
                    list.innerHTML = '<p style="color:rgba(255,255,255,0.3);">暂无用户</p>';
                    return;
                }
                list.innerHTML = `
                    <table>
                        <thead><tr><th>昵称</th><th>邮箱</th><th>注册时间</th></tr></thead>
                        <tbody>
                            ${usersCache.map(u => `
                                <tr>
                                    <td>${u.username || '用户'}</td>
                                    <td>${u.email || '无'}</td>
                                    <td>${u.created_at ? new Date(u.created_at.seconds * 1000).toLocaleDateString() : ''}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            // 操作函数
            window.deletePost = async function(postId) {
                if (!confirm('确定要删除这篇文章吗？')) return;
                try {
                    await db.collection('posts').doc(postId).delete();
                    alert('删除成功！');
                    loadAllData();
                } catch (err) {
                    alert('删除失败：' + err.message);
                }
            };

            window.deleteComment = async function(commentId) {
                if (!confirm('确定要删除这条评论吗？')) return;
                try {
                    await db.collection('comments').doc(commentId).delete();
                    alert('删除成功！');
                    loadAllData();
                } catch (err) {
                    alert('删除失败：' + err.message);
                }
            };

            window.editPost = function(postId) {
                window.location.href = `index.html?edit=${postId}`;
            };

            window.switchTab = function(tab) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            };

            // 初始加载
            loadAllData();
        }
    </script>
</body>
</html>
