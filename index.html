        let postsCache = [...builtInPosts];
        let currentCategory = 'all';
        let currentUser = null;
        let isPopupOpen = false;

        function renderPosts(posts) {
            const list = document.getElementById('postList');
            if (!posts || !posts.length) {
                list.innerHTML = '<p style="color:rgba(255,255,255,0.4);">暂无文章</p>';
                return;
            }
            const catMap = { tech: '科技', life: '生活', career: '职场' };
            list.innerHTML = posts.map(p => {
                const dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString() : '';
                const badge = catMap[p.category] || p.category;
                return `
                    <div class="post-card">
                        <h3>${p.title}</h3>
                        <div class="meta">${dateStr} · <span class="badge ${p.category}">${badge}</span></div>
                        <p>${p.excerpt || (p.content ? p.content.replace(/<[^>]+>/g,'').slice(0,80)+'...' : '')}</p>
                        <button class="btn-read" onclick="showDetail('${p.id}')">阅读全文 →</button>
                    </div>
                `;
            }).join('');
        }

        async function loadPosts() {
            renderPosts(postsCache);
            try {
                const snapshot = await db.collection('posts').orderBy('created_at', 'desc').get();
                if (!snapshot.empty) {
                    const fbPosts = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        data.id = doc.id;
                        if (data.created_at && data.created_at.toDate) {
                            data.created_at = data.created_at.toDate();
                        }
                        fbPosts.push(data);
                    });
                    postsCache = fbPosts;
                    filterAndRender();
                }
            } catch (e) {
                console.warn('Firebase 加载失败，使用缓存');
            }
        }

        function filterAndRender() {
            let filtered = postsCache;
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            const keyword = document.getElementById('searchInput').value.trim();
            if (keyword) {
                const kw = keyword.toLowerCase();
                filtered = filtered.filter(p =>
                    p.title.toLowerCase().includes(kw) ||
                    (p.excerpt && p.excerpt.toLowerCase().includes(kw)) ||
                    (p.content && p.content.toLowerCase().includes(kw))
                );
            }
            renderPosts(filtered);
        }

        function searchPosts() {
            filterAndRender();
        }

        // =============================================================
        // ✅ 关键修复：评论加载不需要索引（去掉了 .orderBy）
        // =============================================================
        async function showDetail(postId) {
            const post = postsCache.find(p => p.id === postId) || builtInPosts.find(p => p.id === postId);
            if (!post) {
                alert('文章不存在');
                return;
            }

            document.getElementById('postList').style.display = 'none';
            const area = document.getElementById('detailArea');
            area.classList.remove('hidden');

            const dateStr = post.created_at ? new Date(post.created_at).toLocaleDateString() : '';

            area.innerHTML = `
                <div class="post-content">
                    <button class="back-btn" onclick="backToList()">← 返回列表</button>
                    <h1>${post.title}</h1>
                    <p style="color:rgba(255,255,255,0.4);font-size:0.9rem;">${dateStr} · 作者：${post.author_name || '匿名'} · 阅读 ${post.views || 0}</p>
                    <div>${post.content}</div>
                    <hr style="border-color:#333;margin:20px 0;">
                    <h3>💬 评论</h3>
                    <div id="commentsArea"><p style="color:rgba(255,255,255,0.3);">⏳ 加载中...</p></div>
                    ${currentUser ? `
                        <textarea id="commentInput" rows="3" placeholder="写下你的评论..." style="margin-top:12px;"></textarea>
                        <button class="btn" onclick="postComment('${postId}')" style="margin-top:6px;">发表评论</button>
                    ` : '<p style="color:rgba(255,255,255,0.3);margin-top:12px;">登录后即可评论</p>'}
                </div>
            `;

            // ✅ 关键修复：去掉了 .orderBy('created_at', 'asc')
            await loadComments(postId);
            if (!post.id.startsWith('builtin-')) {
                try {
                    await db.collection('posts').doc(postId).update({ views: firebase.firestore.FieldValue.increment(1) });
                } catch (e) {}
            }
            window.scrollTo({ top: 0 });
        }

        // ✅ 关键修复：去掉了 .orderBy('created_at', 'asc')
        async function loadComments(postId) {
            const area = document.getElementById('commentsArea');
            if (!area) return;

            try {
                const snapshot = await db.collection('comments')
                    .where('post_id', '==', postId)
                    .get();

                if (snapshot.empty) {
                    area.innerHTML = '<p style="color:rgba(255,255,255,0.3);">💬 暂无评论，来抢沙发吧！</p>';
                    return;
                }

                let html = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const date = data.created_at && data.created_at.toDate ?
                        data.created_at.toDate().toLocaleString() :
                        '';
                    html += `
                        <div class="comment-item">
                            <strong>${data.username || '用户'}</strong>
                            <span class="c-time">${date}</span>
                            <p>${data.content}</p>
                        </div>
                    `;
                });
                area.innerHTML = html;
            } catch (err) {
                console.error('加载评论失败:', err);
                area.innerHTML = `<p style="color:#ef4444;">❌ 加载评论失败：${err.message}</p>
                                 <button class="btn btn-outline" onclick="loadComments('${postId}')" style="margin-top:8px;">重新加载</button>`;
            }
        }

        async function postComment(postId) {
            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            if (!content) {
                alert('请输入评论内容');
                return;
            }
            if (!currentUser) {
                alert('请先登录');
                return;
            }

            try {
                await db.collection('comments').add({
                    post_id: postId,
                    user_id: currentUser.uid,
                    username: currentUser.displayName || currentUser.email,
                    content: content,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = '';
                await loadComments(postId);
                alert('评论成功！');
            } catch (err) {
                alert('评论失败：' + err.message);
            }
        }

        function backToList() {
            document.getElementById('postList').style.display = 'block';
            document.getElementById('detailArea').classList.add('hidden');
            document.getElementById('detailArea').innerHTML = '';
            filterAndRender();
        }

        function togglePublish() {
            const form = document.getElementById('publishForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function publishPost() {
            if (!currentUser) {
                alert('请先登录');
                return;
            }
            const title = document.getElementById('newTitle').value.trim();
            const content = document.getElementById('newContent').value.trim();
            const excerpt = document.getElementById('newExcerpt').value.trim();
            const category = document.getElementById('newCategory').value;

            if (!title || !content) {
                alert('标题和内容不能为空');
                return;
            }

            try {
                await db.collection('posts').add({
                    title,
                    content,
                    excerpt,
                    category,
                    cover_image: 'https://picsum.photos/seed/' + Date.now() + '/800/400',
                    author_name: currentUser.displayName || currentUser.email,
                    views: 0,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('文章发布成功！🎉');
                document.getElementById('newTitle').value = '';
                document.getElementById('newContent').value = '';
                document.getElementById('newExcerpt').value = '';
                loadPosts();
            } catch (err) {
                alert('发布失败：' + err.message);
            }
        }

        // 分类切换
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                filterAndRender();
            });
        });

        // 认证
        function openModal() {
            document.getElementById('authModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('authModal').classList.remove('active');
        }

        function switchTab(tab) {
            document.querySelectorAll('.modal-tabs button').forEach(b => {
                b.classList.toggle('active', b.dataset.tab === tab);
            });
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.getElementById('modalTitle').textContent = tab === 'login' ? '欢迎回来' : '创建账号';
            document.getElementById('modalSub').textContent = tab === 'login' ? '登录你的账号' : '加入窍某博客网社区';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            if (!email || !pass) { alert('请填写完整'); return; }
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                closeModal();
            } catch (err) { alert(err.message); }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (!name || !email || !pass || !confirm) { alert('请填写完整'); return; }
            if (pass !== confirm) { alert('密码不一致'); return; }
            if (pass.length < 6) { alert('密码至少6位'); return; }
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                await cred.user.updateProfile({ displayName: name });
                closeModal();
            } catch (err) { alert(err.message); }
        }

        async function handleSocialLogin(provider) {
            if (isPopupOpen) return;
            isPopupOpen = true;
            let prov;
            if (provider === 'google') prov = new firebase.auth.GoogleAuthProvider();
            else if (provider === 'github') prov = new firebase.auth.GithubAuthProvider();
            else return;

            try {
                const result = await auth.signInWithPopup(prov);
                const user = result.user;
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists) {
                    await userRef.set({
                        username: user.displayName || (provider === 'google' ? 'Google用户' : 'GitHub用户'),
                        email: user.email,
                        avatar_url: user.photoURL || null,
                        created_at: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                closeModal();
            } catch (err) {
                if (err.code !== 'auth/cancelled-popup-request' && err.code !== 'auth/popup-closed-by-user') {
                    alert('登录失败：' + err.message);
                }
            } finally {
                isPopupOpen = false;
            }
        }

        async function logout() {
            await auth.signOut();
        }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            const loginBtn = document.getElementById('loginBtn');
            const avatar = document.getElementById('userAvatar');
            const nameEl = document.getElementById('userName');
            const logoutBtn = document.getElementById('logoutBtn');

            if (user) {
                loginBtn.style.display = 'none';
                avatar.classList.remove('hidden');
                avatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || user
                    .email) + '&background=6d5bff&color=fff&size=36';
                nameEl.classList.remove('hidden');
                nameEl.textContent = user.displayName || user.email;
                logoutBtn.classList.remove('hidden');
            } else {
                loginBtn.style.display = 'inline-block';
                avatar.classList.add('hidden');
                nameEl.classList.add('hidden');
                logoutBtn.classList.add('hidden');
            }
        });

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggle');
            const isLight = body.style.background === '#f0f2f8';
            if (isLight) {
                body.style.background = '#0b0e1a';
                body.style.color = '#e8edf5';
                btn.textContent = '🌙';
            } else {
                body.style.background = '#f0f2f8';
                body.style.color = '#1a1a2e';
                btn.textContent = '☀️';
            }
            document.querySelectorAll('.post-card, .publish-form, .post-content, .modal-box').forEach(el => {
                el.style.background = isLight ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.7)';
                el.style.color = isLight ? '#e8edf5' : '#1a1a2e';
            });
        }

        window.onload = function() {
            loadPosts();
        };

        // 暴露全局
        window.searchPosts = searchPosts;
        window.showDetail = showDetail;
        window.backToList = backToList;
        window.postComment = postComment;
        window.publishPost = publishPost;
        window.togglePublish = togglePublish;
        window.toggleTheme = toggleTheme;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.handleSocialLogin = handleSocialLogin;
        window.logout = logout;
        window.loadComments = loadComments;
    </script>
