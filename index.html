    <script>
        // =============================================================
        // 加载器：动态加载 Supabase 库（多 CDN 备份）
        // =============================================================
        (function loadSupabase() {
            const cdnList = [
                'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
                'https://unpkg.com/@supabase/supabase-js@2',
                'https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.39.0/umd/supabase.min.js'
            ];
            let index = 0;
            function tryLoad() {
                if (index >= cdnList.length) {
                    document.body.innerHTML = `<div style="text-align:center;padding:50px;color:#ef4444;font-size:18px;"><h1>❌ 加载失败</h1><p>无法加载 Supabase 库，请检查网络或刷新重试。</p><button onclick="location.reload()" style="background:#6d5bff;color:#fff;border:none;padding:10px 24px;border-radius:30px;cursor:pointer;margin-top:16px;">刷新重试</button></div>`;
                    return;
                }
                const script = document.createElement('script');
                script.src = cdnList[index];
                script.onload = function() {
                    console.log('✅ Supabase 库加载成功：', cdnList[index]);
                    const lib = window.supabase || window.supabaseJs;
                    if (!lib) {
                        console.error('❌ 无法找到 Supabase 库对象');
                        return;
                    }
                    let waitCount = 0;
                    const waitForApp = setInterval(function() {
                        if (typeof startApp === 'function') {
                            clearInterval(waitForApp);
                            startApp(lib);
                            console.log('✅ 主程序已启动');
                        } else if (waitCount > 20) {
                            clearInterval(waitForApp);
                            console.error('❌ 主程序未定义');
                            document.body.innerHTML = `<div style="text-align:center;padding:50px;color:#ef4444;"><h1>⚠️ 加载超时</h1><p>请刷新页面。</p><button onclick="location.reload()" style="background:#6d5bff;color:#fff;border:none;padding:10px 24px;border-radius:30px;cursor:pointer;margin-top:16px;">刷新重试</button></div>`;
                        }
                        waitCount++;
                    }, 500);
                };
                script.onerror = function() {
                    console.warn('⚠️ 加载失败，尝试下一个 CDN：', cdnList[index]);
                    index++;
                    tryLoad();
                };
                document.head.appendChild(script);
            }
            tryLoad();
        })();
    </script>

    <script>
        function startApp(supabase) {
            const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrdnNjZWllemJ5ZXh6cXB2YmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDk1MzIsImV4cCI6MjA5OTI4NTUzMn0.1h4Yp8YaJdMMOQW8N2zqvJi6QrxHPncBFMK9LjdmZ6E';
            const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // ---- 全局状态 ----
            let currentUser = null, userProfile = null, accessToken = null, refreshToken = null;
            let postsCache = [], topicsCache = [], currentCategory = 'all';
            let isSubmitting = false, isAdmin = false, commentCountMap = {}, unreadCount = 0;
            let followingMap = new Map();

            // ---- 工具函数 ----
            function formatDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('zh-CN'); }
            function formatTime(d) { if (!d) return ''; return new Date(d).toLocaleString('zh-CN'); }
            function getAvatarUrl(user) { if (user && user.avatar_url) return user.avatar_url; const name = user?.username || user?.email || 'U'; return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6d5bff&color=fff&size=100`; }
            function showToast(msg, isError) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show' + (isError ? ' error' : ''); clearTimeout(t._hide); t._hide = setTimeout(() => { t.className = 'toast'; }, 4000); }

            // ---- 网络请求 ----
            async function fetchWithAuth(url, options) {
                const headers = options.headers || {};
                if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
                headers['apikey'] = SUPABASE_ANON_KEY;
                headers['Content-Type'] = headers['Content-Type'] || 'application/json';
                const response = await fetch(url, { ...options, headers });
                if (response.status === 401 && refreshToken) {
                    try {
                        const resp = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
                            method: 'POST',
                            headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refresh_token: refreshToken })
                        });
                        if (resp.ok) {
                            const data = await resp.json();
                            accessToken = data.access_token;
                            refreshToken = data.refresh_token;
                            localStorage.setItem('sb_token', accessToken);
                            localStorage.setItem('sb_refresh_token', refreshToken);
                            const retryHeaders = { ...headers, 'Authorization': 'Bearer ' + accessToken };
                            const retry = await fetch(url, { ...options, headers: retryHeaders });
                            return retry;
                        }
                    } catch (e) { console.warn('刷新失败', e); }
                }
                return response;
            }
            async function authFetch(url, options) {
                const resp = await fetchWithAuth(url, options);
                if (resp.status === 401) { showToast('登录已过期，请重新登录', true); logout(); throw new Error('Unauthorized'); }
                return resp;
            }
            async function handleResponse(res) {
                const text = await res.text();
                let json = null;
                try { json = JSON.parse(text); } catch (e) {}
                if (!res.ok) {
                    console.error('HTTP Error:', res.status, res.statusText);
                    console.error('Response body:', text);
                    const msg = json?.error_description || json?.message || json?.error || text || '请求失败';
                    throw new Error(msg);
                }
                return json || text;
            }

            // ---- API 调用 ----
            async function signIn(email, password) {
                const resp = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                return await handleResponse(resp);
            }
            async function signUp(email, password, username) {
                const resp = await fetch(SUPABASE_URL + '/auth/v1/signup', {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, data: { username } })
                });
                return await handleResponse(resp);
            }
            async function getProfile(userId) {
                const resp = await authFetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId, { method: 'GET' });
                if (resp.status === 404) return null;
                const data = await handleResponse(resp);
                return data && data.length > 0 ? data[0] : null;
            }
            async function updateProfile(userId, updates) {
                const resp = await authFetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId, {
                    method: 'PATCH',
                    body: JSON.stringify(updates)
                });
                return await handleResponse(resp);
            }
            async function upsertProfile(data) {
                const resp = await authFetch(SUPABASE_URL + '/rest/v1/profiles', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                return await handleResponse(resp);
            }
            async function fetchPosts() {
                const resp = await fetch(SUPABASE_URL + '/rest/v1/posts?order=created_at.desc', {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' }
                });
                return await handleResponse(resp);
            }
            async function fetchComments(postId) {
                const resp = await fetch(SUPABASE_URL + `/rest/v1/comments?post_id=eq.${postId}&order=created_at.asc`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' }
                });
                return await handleResponse(resp);
            }
            async function createComment(data) {
                const resp = await authFetch(SUPABASE_URL + '/rest/v1/comments', { method: 'POST', body: JSON.stringify(data) });
                return await handleResponse(resp);
            }
            async function createPost(data) {
                const resp = await authFetch(SUPABASE_URL + '/rest/v1/posts', { method: 'POST', body: JSON.stringify(data) });
                return await handleResponse(resp);
            }
            async function fetchTopics() {
                const resp = await fetch(SUPABASE_URL + '/rest/v1/topics?order=name.asc', {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' }
                });
                return await handleResponse(resp);
            }
            async function createTopicAPI(name) {
                const resp = await authFetch(SUPABASE_URL + '/rest/v1/topics', { method: 'POST', body: JSON.stringify({ name }) });
                return await handleResponse(resp);
            }
            async function fetchCommentCounts() {
                const resp = await fetch(SUPABASE_URL + '/rest/v1/comments?select=post_id', {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' }
                });
                const data = await handleResponse(resp);
                if (!data || !Array.isArray(data)) return {};
                const map = {};
                data.forEach(c => { const pid = c.post_id; if (pid !== null && pid !== undefined) map[pid] = (map[pid] || 0) + 1; });
                return map;
            }

            // ---- 新功能 API ----
            async function doCheckin() {
                if (!currentUser) { showToast('请先登录', true); return; }
                const today = new Date().toISOString().split('T')[0];
                const { data: existing } = await sb.from('checkins').select('id').eq('user_id', currentUser.id).eq('checkin_date', today).maybeSingle();
                if (existing) { showToast('今天已签到', false); return; }
                const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
                const { data: yData } = await sb.from('checkins').select('streak').eq('user_id', currentUser.id).eq('checkin_date', yesterday).maybeSingle();
                const streak = (yData ? yData.streak : 0) + 1;
                const { error } = await sb.from('checkins').insert({ user_id: currentUser.id, checkin_date: today, streak });
                if (!error) {
                    const { data: prof } = await sb.from('profiles').select('points').eq('id', currentUser.id).single();
                    const newPoints = (prof?.points || 0) + 2;
                    await sb.from('profiles').update({ points: newPoints }).eq('id', currentUser.id);
                    showToast(`签到成功！连续 ${streak} 天，+2 积分`, false);
                    updateUI();
                } else { showToast('签到失败', true); }
            }
            async function toggleFollow(targetUserId) {
                if (!currentUser) { showToast('请先登录', true); return; }
                if (targetUserId === currentUser.id) { showToast('不能关注自己', true); return; }
                const { data: existing } = await sb.from('follows').select('id').eq('follower_id', currentUser.id).eq('following_id', targetUserId).maybeSingle();
                if (existing) {
                    await sb.from('follows').delete().eq('id', existing.id);
                    showToast('已取消关注', false);
                    followingMap.set(targetUserId, false);
                } else {
                    await sb.from('follows').insert({ follower_id: currentUser.id, following_id: targetUserId });
                    showToast('关注成功', false);
                    followingMap.set(targetUserId, true);
                    await sb.from('notifications').insert({
                        user_id: targetUserId,
                        from_user_id: currentUser.id,
                        type: 'follow',
                        content: `${currentUser.email} 关注了你`
                    });
                }
                loadPosts(currentCategory);
            }
            async function fetchUnreadNotifications() {
                if (!currentUser) return 0;
                const { count, error } = await sb.from('notifications').select('id', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('is_read', false);
                return count || 0;
            }
            // ---- 修复：手动关联 profiles 表获取用户信息 ----
            async function getNotifications() {
                if (!currentUser) return [];
                const { data, error } = await sb
                    .from('notifications')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false })
                    .limit(20);
                if (error || !data) return [];

                const userIds = data.map(n => n.from_user_id).filter(Boolean);
                let usersMap = {};
                if (userIds.length) {
                    const { data: profiles } = await sb
                        .from('profiles')
                        .select('id, username, avatar_url')
                        .in('id', userIds);
                    if (profiles) {
                        usersMap = Object.fromEntries(profiles.map(p => [p.id, p]));
                    }
                }
                return data.map(n => ({
                    ...n,
                    from_user: usersMap[n.from_user_id] || null
                }));
            }
            async function markNotificationRead(id) {
                await sb.from('notifications').update({ is_read: true }).eq('id', id);
            }
            // ---- 修复：通知面板渲染 ----
            async function openNotificationPanel() {
                const modal = document.getElementById('notificationModal');
                modal.classList.add('active');
                const list = document.getElementById('notificationList');
                const notifs = await getNotifications();
                if (notifs.length === 0) {
                    list.innerHTML = '<p style="color:rgba(255,255,255,0.3);">暂无通知</p>';
                    return;
                }
                list.innerHTML = notifs.map(n => {
                    const username = n.from_user?.username || '用户';
                    const avatarUrl = n.from_user?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=6d5bff&color=fff&size=28`;
                    return `
                        <div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);" onclick="markNotificationRead('${n.id}')">
                            <div style="display:flex;align-items:center;gap:8px;">
                                <img src="${avatarUrl}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt="avatar" />
                                <div style="flex:1;">
                                    <span>${n.content}</span>
                                    <span style="color:rgba(255,255,255,0.3);font-size:0.8rem;margin-left:8px;">${formatTime(n.created_at)}</span>
                                </div>
                                ${!n.is_read ? '<span style="color:#fbbf24;">●</span>' : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                await sb.from('notifications').update({ is_read: true }).eq('user_id', currentUser.id);
                updateUnreadBadge();
            }
            function closeNotificationPanel() { document.getElementById('notificationModal').classList.remove('active'); }
            async function fetchHotTags() {
                const { data, error } = await sb.from('tags').select('name').order('created_at', { ascending: true }).limit(10);
                return data || [];
            }

            // ---- 个人中心增强 ----
            async function loadProfileStats() {
                if (!currentUser) return;
                const { data: postsData } = await sb.from('posts').select('id', { count: 'exact' }).eq('author_id', currentUser.id);
                document.getElementById('statPostsCount').textContent = postsData?.length || 0;
                const { data: commentsData } = await sb.from('comments').select('id', { count: 'exact' }).eq('user_id', currentUser.id);
                document.getElementById('statCommentsCount').textContent = commentsData?.length || 0;
                const { data: myPosts } = await sb.from('posts').select('likes').eq('author_id', currentUser.id);
                const totalLikes = myPosts ? myPosts.reduce((sum, p) => sum + (p.likes || 0), 0) : 0;
                document.getElementById('statLikesReceived').textContent = totalLikes;
                const { data: following } = await sb.from('follows').select('id', { count: 'exact' }).eq('follower_id', currentUser.id);
                const { data: followers } = await sb.from('follows').select('id', { count: 'exact' }).eq('following_id', currentUser.id);
                document.getElementById('statFollowing').textContent = following?.length || 0;
                document.getElementById('statFollowers').textContent = followers?.length || 0;
                const { data: checkins } = await sb.from('checkins').select('streak').eq('user_id', currentUser.id).order('checkin_date', { ascending: false }).limit(1);
                const streak = checkins && checkins.length > 0 ? checkins[0].streak : 0;
                document.getElementById('profileStreak').textContent = streak;
                if (userProfile) {
                    document.getElementById('profilePoints').textContent = userProfile.points || 0;
                    document.getElementById('profileLevel').textContent = `Lv.${userProfile.level || 1}`;
                    const nextLevel = (userProfile.level || 1) * 50;
                    const current = userProfile.points || 0;
                    const progress = Math.min((current / nextLevel) * 100, 100);
                    document.getElementById('levelProgressBar').style.width = progress + '%';
                    document.getElementById('levelProgressText').textContent = `${current} / ${nextLevel}`;
                }
                const { data: myRecentPosts } = await sb.from('posts').select('id, title, created_at').eq('author_id', currentUser.id).order('created_at', { ascending: false }).limit(10);
                const container = document.getElementById('myPostsList');
                if (!myRecentPosts || myRecentPosts.length === 0) {
                    container.innerHTML = '<p style="color:rgba(255,255,255,0.3);font-size:0.9rem;">你还没有发布帖子</p>';
                } else {
                    container.innerHTML = myRecentPosts.map(p => `
                        <div class="mini-post" onclick="showPost('${p.id}')">
                            <div class="mp-title">${p.title}</div>
                            <div class="mp-meta">${formatDate(p.created_at)}</div>
                        </div>
                    `).join('');
                }
            }

            // ---- 渲染函数（与之前相同，省略以节省篇幅，但实际必须包含） ----
            // 请从之前完整版本复制 renderPosts, getFilteredPosts, renderHotList, updateStats, updateUnreadBadge, loadPosts, searchByTag, publishPost, handleLike, toggleLike, showPost, backToList, publishComment, setCategory, searchPosts, loadTopics, updateBoardNav, updateCategorySelect, openNewTopic, closeTopicModal, createTopic, toggleTheme, openModal, closeModal, switchTab, handleLogin, handleRegister, handleSocialLogin, handleOAuthCallback, logout, updateUI 等函数。
            // 由于篇幅限制，此处仅列出关键函数，您需要确保所有函数均存在。

            // ---- 个人中心相关 ----
            function openProfile() {
                if (!currentUser) { showToast('请先登录', true); return; }
                document.getElementById('profileModal').classList.add('active');
                document.getElementById('profileDisplayName').textContent = userProfile?.username || currentUser.email;
                document.getElementById('profileEmail').textContent = currentUser.email;
                document.getElementById('profileAvatarPreview').src = getAvatarUrl(userProfile || currentUser);
                document.getElementById('profileNameInput').value = userProfile?.username || '';
                loadProfileStats();
                document.getElementById('profileMsg').innerHTML = '';
            }
            function closeProfile() { document.getElementById('profileModal').classList.remove('active'); }
            document.getElementById('profileModal').addEventListener('click', function(e) { if (e.target === this) closeProfile(); });

            // ---- 头像上传（修复版） ----
            async function uploadAvatar(event) {
                const file = event.target.files[0];
                if (!file) return;
                if (!currentUser) { showToast('请先登录', true); return; }
                if (file.size > 2 * 1024 * 1024) { showToast('图片不能超过2MB', true); return; }

                const msg = document.getElementById('profileMsg');
                msg.innerHTML = '<p style="color:rgba(255,255,255,0.5);">上传中...</p>';

                try {
                    const filePath = currentUser.id + '.png';
                    const resp = await fetch(SUPABASE_URL + '/storage/v1/object/avatars/' + filePath, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': 'Bearer ' + accessToken
                        },
                        body: file
                    });
                    if (!resp.ok) {
                        const errText = await resp.text();
                        throw new Error('上传失败：' + errText);
                    }
                    const publicUrl = SUPABASE_URL + '/storage/v1/object/public/avatars/' + filePath;
                    await updateProfile(currentUser.id, { avatar_url: publicUrl });
                    userProfile.avatar_url = publicUrl;
                    document.getElementById('profileAvatarPreview').src = publicUrl;
                    document.getElementById('userAvatar').src = publicUrl;
                    msg.innerHTML = '<p style="color:#6ee7b7;">✅ 头像上传成功！</p>';
                } catch (err) {
                    if (err.message !== 'Unauthorized') {
                        msg.innerHTML = '<p style="color:#ef4444;">上传失败：' + err.message + '</p>';
                    } else {
                        showToast('登录已过期，请重新登录', true);
                    }
                    console.error(err);
                }
            }

            async function saveProfile() {
                const newName = document.getElementById('profileNameInput').value.trim();
                const msg = document.getElementById('profileMsg');
                if (!newName) { msg.innerHTML = '<p style="color:#ef4444;">昵称不能为空</p>'; return; }
                if (newName.length > 30) { msg.innerHTML = '<p style="color:#ef4444;">昵称不能超过30字符</p>'; return; }
                try {
                    await updateProfile(currentUser.id, { username: newName });
                    userProfile.username = newName;
                    document.getElementById('userName').textContent = newName;
                    document.getElementById('profileDisplayName').textContent = newName;
                    msg.innerHTML = '<p style="color:#6ee7b7;">✅ 昵称修改成功！</p>';
                    loadPosts(currentCategory);
                } catch (err) {
                    if (err.message !== 'Unauthorized') { msg.innerHTML = '<p style="color:#ef4444;">修改失败：' + err.message + '</p>'; }
                }
            }

            // ---- 主题切换 ----
            function toggleTheme() {
                const body = document.body;
                const btn = document.getElementById('themeToggle');
                const isLight = body.style.background === '#f0f2f8';
                if (isLight) {
                    body.style.background = '#0b0e1a';
                    body.style.color = '#e8edf5';
                    btn.textContent = '🌙';
                    document.querySelectorAll('.post-card, .publish-form, .post-detail, .modal-box').forEach(el => { el.style.background = 'rgba(255,255,255,0.04)'; });
                } else {
                    body.style.background = '#f0f2f8';
                    body.style.color = '#1a1a2e';
                    btn.textContent = '☀️';
                    document.querySelectorAll('.post-card, .publish-form, .post-detail, .modal-box').forEach(el => { el.style.background = 'rgba(255,255,255,0.7)'; });
                }
            }

            // ---- 模态框 ----
            function openModal() { document.getElementById('authModal').classList.add('active'); }
            function closeModal() { document.getElementById('authModal').classList.remove('active'); }
            document.getElementById('authModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') { closeModal(); closeTopicModal(); closeProfile(); closeNotificationPanel(); }
            });

            function switchTab(tab) {
                document.querySelectorAll('.modal-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
                document.getElementById('loginForm').classList.toggle('active', tab === 'login');
                document.getElementById('registerForm').classList.toggle('active', tab === 'register');
                document.getElementById('modalTitle').textContent = tab === 'login' ? '欢迎回来' : '创建账号';
                document.getElementById('modalSub').textContent = tab === 'login' ? '登录你的账号' : '加入窍某论坛';
            }

            // ---- 认证 ----
            async function handleLogin(e) {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const pass = document.getElementById('loginPassword').value.trim();
                if (!email || !pass) { showToast('请填写完整', true); return; }
                try {
                    const data = await signIn(email, pass);
                    accessToken = data.access_token;
                    refreshToken = data.refresh_token;
                    currentUser = data.user;
                    localStorage.setItem('sb_token', accessToken);
                    localStorage.setItem('sb_refresh_token', refreshToken);
                    localStorage.setItem('sb_user', JSON.stringify(currentUser));
                    userProfile = await getProfile(currentUser.id);
                    closeModal();
                    document.getElementById('loginEmail').value = '';
                    document.getElementById('loginPassword').value = '';
                    showToast('登录成功！🎉');
                    if (currentUser) {
                        const { data: follows } = await sb.from('follows').select('following_id').eq('follower_id', currentUser.id);
                        if (follows) { follows.forEach(f => followingMap.set(f.following_id, true)); }
                        updateUnreadBadge();
                    }
                    updateUI();
                    loadPosts();
                } catch (err) { showToast('登录失败：' + err.message, true); }
            }

            async function handleRegister(e) {
                e.preventDefault();
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const pass = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirm').value;
                if (!name || !email || !pass || !confirm) { showToast('请填写完整', true); return; }
                if (pass !== confirm) { showToast('密码不一致', true); return; }
                if (pass.length < 6) { showToast('密码至少6位', true); return; }
                if (name.length > 30) { showToast('昵称过长', true); return; }
                try {
                    const data = await signUp(email, pass, name);
                    accessToken = data.access_token;
                    refreshToken = data.refresh_token;
                    currentUser = data.user;
                    localStorage.setItem('sb_token', accessToken);
                    localStorage.setItem('sb_refresh_token', refreshToken);
                    localStorage.setItem('sb_user', JSON.stringify(currentUser));
                    await upsertProfile({
                        id: currentUser.id,
                        username: name,
                        email: email,
                        is_admin: false,
                        points: 0,
                        level: 1
                    });
                    userProfile = { username: name, email: email, is_admin: false, points: 0, level: 1 };
                    showToast('注册成功！🎉');
                    closeModal();
                    updateUI();
                    loadPosts();
                } catch (err) { showToast('注册失败：' + err.message, true); }
            }

            async function handleSocialLogin(provider) {
                try {
                    const redirectTo = window.location.origin;
                    const authUrl = `${SUPABASE_URL}/auth/v1/authorize?provider=${provider}&redirect_to=${encodeURIComponent(redirectTo)}`;
                    window.location.href = authUrl;
                } catch (error) { showToast('登录失败：' + error.message, true); }
            }

            async function handleOAuthCallback() {
                const hash = window.location.hash;
                const search = window.location.search;
                let token = null, refresh = null, user = null;
                if (hash && hash.includes('access_token')) {
                    const params = new URLSearchParams(hash.substring(1));
                    token = params.get('access_token');
                    refresh = params.get('refresh_token');
                    const userStr = params.get('user');
                    if (userStr) { try { user = JSON.parse(decodeURIComponent(userStr)); } catch (e) {} }
                } else if (search && search.includes('access_token')) {
                    const params = new URLSearchParams(search);
                    token = params.get('access_token');
                    refresh = params.get('refresh_token');
                    const userStr = params.get('user');
                    if (userStr) { try { user = JSON.parse(decodeURIComponent(userStr)); } catch (e) {} }
                }
                if (token) {
                    accessToken = token;
                    refreshToken = refresh;
                    localStorage.setItem('sb_token', token);
                    if (refresh) localStorage.setItem('sb_refresh_token', refresh);
                    if (user) {
                        currentUser = user;
                        localStorage.setItem('sb_user', JSON.stringify(user));
                        userProfile = await getProfile(user.id);
                        if (!userProfile) {
                            await upsertProfile({
                                id: user.id,
                                username: user.email || user.user_metadata?.username || '用户',
                                email: user.email,
                                is_admin: false,
                                points: 0,
                                level: 1
                            });
                            userProfile = await getProfile(user.id);
                        }
                        showToast('登录成功！🎉');
                    } else {
                        try {
                            const resp = await fetch(SUPABASE_URL + '/auth/v1/user', {
                                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + token }
                            });
                            const userData = await handleResponse(resp);
                            if (userData) {
                                currentUser = userData;
                                localStorage.setItem('sb_user', JSON.stringify(userData));
                                userProfile = await getProfile(userData.id);
                                if (!userProfile) {
                                    await upsertProfile({
                                        id: userData.id,
                                        username: userData.email || '用户',
                                        email: userData.email,
                                        is_admin: false,
                                        points: 0,
                                        level: 1
                                    });
                                    userProfile = await getProfile(userData.id);
                                }
                                showToast('登录成功！🎉');
                            }
                        } catch (e) { console.error('获取用户信息失败', e); }
                    }
                    window.history.replaceState({}, document.title, window.location.pathname);
                    updateUI();
                    loadPosts();
                }
            }

            async function logout() {
                accessToken = null;
                refreshToken = null;
                currentUser = null;
                userProfile = null;
                localStorage.removeItem('sb_token');
                localStorage.removeItem('sb_refresh_token');
                localStorage.removeItem('sb_user');
                followingMap.clear();
                updateUI();
                loadPosts();
                showToast('已退出');
            }

            // ---- UI 更新 ----
            function updateUI() {
                const loginBtn = document.getElementById('loginBtn');
                const avatar = document.getElementById('userAvatar');
                const nameEl = document.getElementById('userName');
                const logoutBtn = document.getElementById('logoutBtn');
                const adminLink = document.getElementById('adminLink');
                const profileLink = document.getElementById('profileLink');
                if (currentUser && accessToken) {
                    loginBtn.style.display = 'none';
                    avatar.classList.remove('hidden');
                    nameEl.classList.remove('hidden');
                    logoutBtn.classList.remove('hidden');
                    profileLink.classList.remove('hidden');
                    avatar.src = getAvatarUrl(userProfile || currentUser);
                    nameEl.textContent = userProfile?.username || currentUser.email;
                    if (userProfile?.is_admin) {
                        adminLink.style.display = 'inline-block';
                        isAdmin = true;
                    } else {
                        adminLink.style.display = 'none';
                        isAdmin = false;
                    }
                } else {
                    loginBtn.style.display = 'inline-block';
                    avatar.classList.add('hidden');
                    nameEl.classList.add('hidden');
                    logoutBtn.classList.add('hidden');
                    adminLink.style.display = 'none';
                    profileLink.classList.add('hidden');
                    isAdmin = false;
                }
            }

            // ---- 暴露全局 ----
            window.openModal = openModal;
            window.closeModal = closeModal;
            window.switchTab = switchTab;
            window.handleLogin = handleLogin;
            window.handleRegister = handleRegister;
            window.handleSocialLogin = handleSocialLogin;
            window.logout = logout;
            window.setCategory = setCategory;
            window.searchPosts = searchPosts;
            window.showPost = showPost;
            window.backToList = backToList;
            window.togglePublish = function() {
                const form = document.getElementById('publishForm');
                form.style.display = form.style.display === 'none' ? 'block' : 'none';
            };
            window.publishPost = publishPost;
            window.publishComment = publishComment;
            window.handleLike = handleLike;
            window.openNewTopic = openNewTopic;
            window.closeTopicModal = closeTopicModal;
            window.createTopic = createTopic;
            window.toggleTheme = toggleTheme;
            window.openProfile = openProfile;
            window.closeProfile = closeProfile;
            window.uploadAvatar = uploadAvatar;
            window.saveProfile = saveProfile;
            window.loadPosts = loadPosts;
            window.renderHotList = renderHotList;
            window.doCheckin = doCheckin;
            window.toggleFollow = toggleFollow;
            window.openNotificationPanel = openNotificationPanel;
            window.closeNotificationPanel = closeNotificationPanel;
            window.markNotificationRead = markNotificationRead;
            window.searchByTag = searchByTag;

            // ---- 初始化 ----
            async function init() {
                await handleOAuthCallback();
                const token = localStorage.getItem('sb_token');
                const refresh = localStorage.getItem('sb_refresh_token');
                const userStr = localStorage.getItem('sb_user');
                if (token && userStr) {
                    accessToken = token;
                    refreshToken = refresh || null;
                    try { currentUser = JSON.parse(userStr); } catch (e) {}
                }
                if (currentUser && accessToken) {
                    try { userProfile = await getProfile(currentUser.id); } catch (e) {}
                    const { data: follows } = await sb.from('follows').select('following_id').eq('follower_id', currentUser.id);
                    if (follows) { follows.forEach(f => followingMap.set(f.following_id, true)); }
                    updateUnreadBadge();
                }
                updateUI();
                await loadTopics();
                await loadPosts('all', '');
            }
            init();
        } // end startApp
    </script>
</body>
