<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>窍某博客网 - 科技·生活·思考</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- Google Translate -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
    </script>

    <style>
        /* ============================================================
                   CSS 变量（深色/浅色主题）
                   ============================================================ */
        :root {
            --bg-primary: #0b0e1a;
            --bg-secondary: #151b30;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --text-primary: #e8edf5;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --text-muted: rgba(255, 255, 255, 0.4);
            --border-light: rgba(255, 255, 255, 0.06);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.35);
            --shadow-card-hover: 0 20px 60px rgba(0, 0, 0, 0.50);
            --gradient-hero: linear-gradient(135deg, #f0f0ff, #a5b4fc, #818cf8);
            --gradient-nav: linear-gradient(135deg, #c4b5fd, #818cf8, #60a5fa);
            --gradient-btn: linear-gradient(135deg, #6d5bff, #8b5cf6);
            --badge-tech: rgba(96, 165, 250, 0.15);
            --badge-tech-color: #93bbfc;
            --badge-life: rgba(52, 211, 153, 0.12);
            --badge-life-color: #6ee7b7;
            --badge-career: rgba(251, 191, 36, 0.12);
            --badge-career-color: #fcd34d;
            --header-bg: rgba(11, 14, 26, 0.65);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.10);
            --input-focus: rgba(130, 100, 255, 0.5);
        }

        body.light {
            --bg-primary: #f0f2f8;
            --bg-secondary: #e6e9f2;
            --bg-card: rgba(255, 255, 255, 0.7);
            --bg-card-hover: rgba(255, 255, 255, 0.9);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(30, 30, 60, 0.8);
            --text-muted: rgba(30, 30, 60, 0.5);
            --border-light: rgba(0, 0, 0, 0.08);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-card-hover: 0 20px 60px rgba(0, 0, 0, 0.12);
            --gradient-hero: linear-gradient(135deg, #4f46e5, #7c3aed);
            --gradient-nav: linear-gradient(135deg, #4f46e5, #7c3aed);
            --gradient-btn: linear-gradient(135deg, #4f46e5, #7c3aed);
            --badge-tech: rgba(37, 99, 235, 0.12);
            --badge-tech-color: #2563eb;
            --badge-life: rgba(5, 150, 105, 0.12);
            --badge-life-color: #059669;
            --badge-career: rgba(217, 119, 6, 0.12);
            --badge-career-color: #d97706;
            --header-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(255, 255, 255, 0.5);
            --input-border: rgba(0, 0, 0, 0.10);
            --input-focus: rgba(79, 70, 229, 0.4);
        }

        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.8;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(88, 50, 200, 0.45) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(30, 80, 220, 0.40) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(180, 60, 220, 0.25) 0%, transparent 50%),
                linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 40%, #1a1040 100%);
            transition: background 0.6s;
        }
        body.light .bg-layer {
            background:
                radial-gradient(ellipse at 20% 50%, rgba(79, 70, 229, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(236, 72, 153, 0.06) 0%, transparent 50%),
                linear-gradient(145deg, #f0f2f8 0%, #e6e9f2 40%, #d5d9e8 100%);
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        body.light .bg-grid {
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== 头部 ===== */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-light);
            padding: 0.9rem 0;
            transition: background 0.3s, border-color 0.3s;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }
        nav h1 {
            margin: 0;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: var(--gradient-nav);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-box {
            padding: 10px 22px;
            border: 1px solid var(--input-border);
            border-radius: 40px;
            width: 200px;
            font-size: 0.9rem;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.35s;
        }
        .search-box::placeholder {
            color: var(--text-muted);
        }
        .search-box:focus {
            border-color: var(--input-focus);
            background: rgba(255, 255, 255, 0.10);
        }
        #google_translate_element .goog-te-combo {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            max-width: 140px;
        }
        body.light #google_translate_element .goog-te-combo {
            background: rgba(255, 255, 255, 0.7);
            color: #1a1a2e;
        }
        .goog-te-banner-frame {
            display: none !important;
        }
        body {
            top: 0 !important;
        }
        .skiptranslate {
            display: none !important;
        }
        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .auth-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auth-btn {
            background: var(--gradient-btn);
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(109, 91, 255, 0.20);
        }
        .auth-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(109, 91, 255, 0.35);
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            display: none;
        }
        .user-name {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: none;
            cursor: pointer;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
            display: none;
        }
        .logout-btn:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.3);
            color: #ef4444;
        }

        .categories {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cat-btn {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            border: 1px solid var(--border-light);
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        .cat-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }
        .cat-btn.active {
            background: var(--gradient-btn);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(109, 91, 255, 0.30);
        }

        #hero {
            text-align: center;
            padding: 4.5rem 1.5rem 3.5rem;
        }
        #hero h2 {
            font-size: 3rem;
            font-weight: 800;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        #hero p {
            font-size: 1.15rem;
            color: var(--text-muted);
            max-width: 580px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 2.4rem 0 2rem;
            color: var(--text-primary);
        }
        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            margin: 10px auto 0;
            background: var(--gradient-btn);
            border-radius: 10px;
        }

        .post-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }
        .post-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
        }
        .post-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: var(--shadow-card-hover);
        }
        .post-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.5s ease;
            border-bottom: 1px solid var(--border-light);
        }
        .post-card:hover img {
            transform: scale(1.03);
        }
        .post-info {
            padding: 1.6rem 1.8rem 1.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .post-info h3 {
            margin: 0 0 0.3rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
        }
        .post-info .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .post-info .meta .badge {
            padding: 0 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            border: 1px solid var(--border-light);
        }
        .post-info .meta .badge.tech {
            background: var(--badge-tech);
            color: var(--badge-tech-color);
            border-color: var(--badge-tech);
        }
        .post-info .meta .badge.life {
            background: var(--badge-life);
            color: var(--badge-life-color);
            border-color: var(--badge-life);
        }
        .post-info .meta .badge.career {
            background: var(--badge-career);
            color: var(--badge-career-color);
            border-color: var(--badge-career);
        }
        .post-info p {
            margin: 0.4rem 0 1rem;
            color: var(--text-secondary);
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .post-info .btn-read {
            background: var(--gradient-btn);
            color: #fff;
            border: none;
            padding: 0.65rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.35s;
            align-self: flex-start;
            margin-top: 6px;
            box-shadow: 0 4px 16px rgba(109, 91, 255, 0.20);
        }
        .post-info .btn-read:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(109, 91, 255, 0.35);
        }

        #post-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 24px;
        }
        .post-content {
            display: none;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.8rem 3rem;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
        }
        .post-content.active {
            display: block;
            animation: fadeSlide 0.5s ease;
        }
        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .post-content h1 {
            font-size: 2.2rem;
            margin-top: 0;
            color: var(--text-primary);
        }
        .post-content h2 {
            font-size: 1.4rem;
            margin: 1.8rem 0 0.8rem;
            color: #c4b5fd;
            border-left: 4px solid #818cf8;
            padding-left: 1rem;
        }
        body.light .post-content h2 {
            color: #4f46e5;
            border-left-color: #4f46e5;
        }
        .post-content p {
            margin: 0.8rem 0;
            color: var(--text-secondary);
            line-height: 1.9;
        }
        .post-content ul,
        .post-content ol {
            margin: 0.6rem 0 1rem 1.8rem;
            color: var(--text-secondary);
        }
        .post-content blockquote {
            border-left: 4px solid #818cf8;
            padding: 0.5rem 1.5rem;
            margin: 1rem 0;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 0 12px 12px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .post-content .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin: 1.8rem 0;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.40);
            background: #000;
        }
        .post-content .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .post-content .back-btn {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            border: 1px solid var(--border-light);
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
        }
        .post-content .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            transform: translateX(-4px);
        }
        .post-content .read-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 1rem 0;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem 2.8rem;
            max-width: 480px;
            width: 100%;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.3s;
            line-height: 1;
        }
        .modal-box .close-modal:hover {
            color: var(--text-primary);
        }
        .modal-box h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .modal-box .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }
        .modal-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 0.8rem;
        }
        .modal-tabs button {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .modal-tabs button.active {
            color: var(--text-primary);
            border-bottom-color: #818cf8;
        }
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .auth-form.active {
            display: flex;
        }
        .auth-form label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .auth-form input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
        }
        .auth-form input:focus {
            border-color: var(--input-focus);
        }
        .auth-form .submit-btn {
            background: var(--gradient-btn);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 4px;
        }
        .auth-form .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(109, 91, 255, 0.35);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 8px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }
        .social-btn {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .social-btn:hover {
            transform: scale(1.02);
        }
        .google-btn {
            background: #ffffff;
            color: #333;
        }
        .google-btn:hover {
            background: #f0f0f0;
        }
        .github-btn {
            background: #24292e;
            color: #fff;
        }
        .github-btn:hover {
            background: #1a1e22;
        }
        .auth-switch {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 8px;
        }
        .auth-switch a {
            color: #818cf8;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-switch a:hover {
            text-decoration: underline;
        }

        .publish-area {
            margin: 1.5rem 0 2rem;
        }
        .publish-toggle {
            background: var(--gradient-btn);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(109, 91, 255, 0.20);
        }
        .publish-toggle:hover {
            transform: scale(1.04);

        // =============================================================
        // 文章缓存与加载
        // =============================================================
        let postsCache = [...builtInPosts];
        let isLoading = false;

        async function loadPosts(category = 'all', keyword = '') {
            renderPostList(filterPosts(postsCache, category, keyword));
            if (isLoading) return;
            isLoading = true;
            try {
                let query = db.collection('posts').orderBy('created_at', 'desc');
                if (category !== 'all') {
                    query = query.where('category', '==', category);
                }
                const snapshot = await query.get();
                const fbPosts = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    if (data.created_at && data.created_at.toDate) {
                        data.created_at = data.created_at.toDate();
                    }
                    fbPosts.push(data);
                });
                if (fbPosts.length > 0) {
                    postsCache = fbPosts;
                } else {
                    postsCache = [...builtInPosts];
                }
                renderPostList(filterPosts(postsCache, category, keyword));
            } catch (err) {
                console.warn('Firebase 加载失败，使用缓存:', err);
            } finally {
                isLoading = false;
            }
        }

        function filterPosts(posts, category, keyword) {
            let filtered = posts;
            if (category !== 'all') {
                filtered = filtered.filter(p => p.category === category);
            }
            if (keyword) {
                const kw = keyword.toLowerCase();
                filtered = filtered.filter(p =>
                    p.title.toLowerCase().includes(kw) ||
                    (p.excerpt && p.excerpt.toLowerCase().includes(kw)) ||
                    (p.content && p.content.toLowerCase().includes(kw))
                );
            }
            return filtered;
        }

        function renderPostList(posts) {
            const list = document.getElementById('post-list');
            if (!posts.length) {
                list.innerHTML = '<div class="no-result">😕 暂无文章</div>';
                return;
            }
            const catMap = { tech: '科技', life: '生活', career: '职场' };
            list.innerHTML = posts.map(post => {
                const dateStr = post.created_at instanceof Date ?
                    post.created_at.toLocaleDateString() :
                    (post.created_at ? new Date(post.created_at).toLocaleDateString() : '');
                return `
                    <div class="post-card">
                        <img src="${post.cover_image || 'https://picsum.photos/seed/'+post.id+'/800/400'}" alt="${post.title}" loading="lazy" />
                        <div class="post-info">
                            <h3>${post.title}</h3>
                            <div class="meta">
                                <span>${dateStr}</span>
                                <span class="badge ${post.category}">${catMap[post.category] || post.category}</span>
                            </div>
                            <p>${post.excerpt || (post.content ? post.content.replace(/<[^>]+>/g, '').slice(0,80)+'...' : '')}</p>
                            <button class="btn-read" onclick="showPost('${post.id}')">阅读全文 →</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // =============================================================
        // 显示文章详情 + 评论（修复版）
        // =============================================================
        async function showPost(postId) {
            let post = postsCache.find(p => p.id === postId);
            if (!post) {
                try {
                    const doc = await db.collection('posts').doc(postId).get();
                    if (doc.exists) {
                        const data = doc.data();
                        data.id = doc.id;
                        if (data.created_at && data.created_at.toDate) {
                            data.created_at = data.created_at.toDate();
                        }
                        post = data;
                    }
                } catch (e) {}
            }
            if (!post) { alert('文章不存在'); return; }

            document.getElementById('home').style.display = 'none';
            const container = document.getElementById('post-container');
            const dateStr = post.created_at instanceof Date ?
                post.created_at.toLocaleDateString() :
                (post.created_at ? new Date(post.created_at).toLocaleDateString() : '');

            container.innerHTML = `
                <div class="post-content active">
                    <button class="back-btn" onclick="backToHome()">← 返回首页</button>
                    <h1>${post.title}</h1>
                    <p class="read-time">${dateStr} · 作者：${post.author_name || '匿名'} · 阅读 ${post.views || 0}</p>
                    ${post.cover_image ? `<img src="${post.cover_image}" style="max-width:100%;border-radius:12px;margin:1rem 0;" />` : ''}
                    <div>${post.content}</div>
                    <hr />
                    <h3>💬 评论</h3>
                    <div id="comments-area"></div>
                    ${auth.currentUser ? `
                        <textarea id="commentInput" placeholder="写下你的评论..." rows="3" style="width:100%;padding:12px;border-radius:8px;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text-primary);"></textarea>
                        <button onclick="publishComment('${postId}')" style="margin-top:8px;background:var(--gradient-btn);color:#fff;border:none;padding:8px 20px;border-radius:30px;cursor:pointer;">发表评论</button>
                    ` : '<p style="color:var(--text-muted);">登录后即可评论</p>'}
                </div>
            `;

            await loadCommentsForPost(postId);
            if (!post.id.startsWith('builtin-')) {
                try {
                    await db.collection('posts').doc(postId).update({ views: firebase.firestore.FieldValue.increment(1) });
                } catch (e) {}
            }
            window.scrollTo({ top: 0 });
        }

        // ====== 加载评论 ======
        async function loadCommentsForPost(postId) {
            const area = document.getElementById('comments-area');
            if (!area) return;
            try {
                const snapshot = await db.collection('comments')
                    .where('post_id', '==', postId)
                    .orderBy('created_at', 'asc')
                    .get();
                if (snapshot.empty) {
                    area.innerHTML = '<p style="color:var(--text-muted);">暂无评论，来抢沙发吧！</p>';
                    return;
                }
                let html = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const date = data.created_at && data.created_at.toDate ?
                        data.created_at.toDate().toLocaleString() :
                        '';
                    html += `
                        <div style="border-bottom:1px solid var(--border-light);padding:0.8rem 0;">
                            <strong>${data.username || '用户'}</strong>
                            <span style="color:var(--text-muted);font-size:0.8rem;">${date}</span>
                            <p style="margin:0.2rem 0;">${data.content}</p>
                        </div>
                    `;
                });
                area.innerHTML = html;
            } catch (err) {
                area.innerHTML = '<p style="color:var(--text-muted);">加载评论失败，请刷新重试。</p>';
            }
        }

        // ====== 发表评论 ======
        async function publishComment(postId) {
            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            if (!content) { alert('请输入评论内容'); return; }
            const user = auth.currentUser;
            if (!user) { alert('请先登录'); return; }
            try {
                await db.collection('comments').add({
                    post_id: postId,
                    user_id: user.uid,
                    username: user.displayName || user.email,
                    avatar_url: user.photoURL || null,
                    content: content,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = '';
                await loadCommentsForPost(postId);
                alert('评论成功！');
            } catch (err) {
                alert('评论失败：' + err.message);
            }
        }

        function backToHome() {
            document.getElementById('home').style.display = 'block';
            document.getElementById('post-container').innerHTML = '';
            loadPosts();
        }

        // =============================================================
        // 搜索和分类
        // =============================================================
        function searchPosts() {
            const keyword = document.getElementById('searchInput').value.trim();
            const activeCat = document.querySelector('.cat-btn.active');
            const cat = activeCat ? activeCat.dataset.cat : 'all';
            loadPosts(cat, keyword);
        }

        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const cat = this.dataset.cat;
                const keyword = document.getElementById('searchInput').value.trim();
                loadPosts(cat, keyword);
            });
        });

        // =============================================================
        // 认证功能（防重复点击已加）
        // =============================================================
        let isPopupOpen = false;

        async function handleSocialLogin(providerName) {
            if (isPopupOpen) {
                console.warn('已有登录弹窗正在处理，请稍候...');
                return;
            }
            let provider;
            if (providerName === 'google') {
                provider = new firebase.auth.GoogleAuthProvider();
            } else if (providerName === 'github') {
                provider = new firebase.auth.GithubAuthProvider();
            } else {
                return;
            }
            isPopupOpen = true;
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists) {
                    await userRef.set({
                        username: user.displayName || (providerName === 'google' ? 'Google用户' : 'GitHub用户'),
                        email: user.email,
                        avatar_url: user.photoURL || null,
                        created_at: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                closeModal();
                loadPosts();
            } catch (error) {
                if (error.code === 'auth/cancelled-popup-request' || error.code === 'auth/popup-closed-by-user') {
                    console.log('登录已取消或弹窗被关闭');
                } else {
                    alert('登录失败：' + error.message);
                }
            } finally {
                isPopupOpen = false;
            }
        }

        async function registerUser(username, email, password) {
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: username });
                await db.collection('users').doc(cred.user.uid).set({
                    username,
                    email,
                    avatar_url: null,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });
                return { success: true, user: cred.user };
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        async function loginUser(email, password) {
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                return { success: true, user: cred.user };
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        async function logoutUser() {
            await auth.signOut();
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                localStorage.setItem('user', JSON.stringify({
                    id: user.uid,
                    username: user.displayName || user.email,
                    email: user.email,
                    avatar_url: user.photoURL || null
                }));
            } else {
                localStorage.removeItem('user');
            }
            updateUI();
            loadPosts();
        });

        function updateUI() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const loginBtn = document.getElementById('loginBtn');
            const avatar = document.getElementById('userAvatar');
            const nameEl = document.getElementById('userName');
            const logoutBtn = document.getElementById('logoutBtn');
            if (user) {
                loginBtn.style.display = 'none';
                avatar.style.display = 'inline-block';
                avatar.src = user.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.username) +
                    '&background=6d5bff&color=fff&size=36';
                nameEl.style.display = 'inline-block';
                nameEl.textContent = user.username;
                logoutBtn.style.display = 'inline-block';
            } else {
                loginBtn.style.display = 'inline-block';
                avatar.style.display = 'none';
                nameEl.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        }

        // =============================================================
        // 模态框
        // =============================================================
        function openModal() {
            document.getElementById('authModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('authModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('authModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        function switchTab(tab) {
            document.querySelectorAll('.modal-tabs button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            const title = document.getElementById('modalTitle');
            const sub = document.getElementById('modalSub');
            if (tab === 'login') {
                title.textContent = '欢迎回来';
                sub.textContent = '登录你的账号，解锁更多互动';
            } else {
                title.textContent = '创建账号';
                sub.textContent = '加入窍某博客网社区';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!email || !password) {
                alert('请填写完整信息');
                return;
            }
            const result = await loginUser(email, password);
            if (result.success) {
                closeModal();
                loadPosts();
            } else {
                alert(result.error);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (!username || !email || !password || !confirm) {
                alert('请填写完整信息');
                return;
            }
            if (password !== confirm) {
                alert('两次密码不一致');
                return;
            }
            if (password.length < 6) {
                alert('密码至少6位');
                return;
            }
            const result = await registerUser(username, email, password);
            if (result.success) {
                closeModal();
                loadPosts();
            } else {
                alert(result.error);
            }
        }

        // =============================================================
        // 发布文章
        // =============================================================
        function togglePublishForm() {
            const form = document.getElementById('publishForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function publishNewPost() {
            const user = auth.currentUser;
            if (!user) {
                alert('请先登录');
                return;
            }
            const title = document.getElementById('newTitle').value.trim();
            const content = document.getElementById('newContent').value.trim();
            const excerpt = document.getElementById('newExcerpt').value.trim();
            const category = document.getElementById('newCategory').value;

            if (!title || !content) {
                alert('标题和内容不能为空');
                return;
            }

            try {
                await db.collection('posts').add({
                    title,
                    content,
                    excerpt,
                    category,
                    cover_image: 'https://picsum.photos/seed/' + Date.now() + '/800/400',
                    author_name: user.displayName || user.email,
                    views: 0,
                    created_at: firebase.firestore.FieldValue.serverTimestamp(),
                    updated_at: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('文章发布成功！🎉');
                document.getElementById('newTitle').value = '';
                document.getElementById('newContent').value = '';
                document.getElementById('newExcerpt').value = '';
                loadPosts();
            } catch (err) {
                if (err.code === 'permission-denied') {
                    alert('⚠️ 权限不足，请在 Firebase 控制台设置规则。');
                } else {
                    alert('发布失败：' + err.message);
                }
            }
        }

        // =============================================================
        // 主题切换（修复 + 持久化）
        // =============================================================
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggle');
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        function loadTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        }

        // =============================================================
        // 初始化
        // =============================================================
        window.onload = function() {
            loadTheme();
            loadPosts();
            updateUI();
        };

        // 暴露全局函数
        window.searchPosts = searchPosts;
        window.showPost = showPost;
        window.backToHome = backToHome;
        window.publishComment = publishComment;
        window.toggleTheme = toggleTheme;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.logoutUser = logoutUser;
        window.handleSocialLogin = handleSocialLogin;
        window.togglePublishForm = togglePublishForm;
        window.publishNewPost = publishNewPost;
        window.loadPosts = loadPosts;
    </script>

</body>
</html>
