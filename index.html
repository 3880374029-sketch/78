<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窍某博客网 - 科技·生活·思考</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.75;
        }
        header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 1.2rem 0;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        nav h1 {
            margin: 0;
            font-size: 1.9rem;
        }
        .search-box {
            padding: 10px 18px;
            border: none;
            border-radius: 30px;
            width: 300px;
            font-size: 1rem;
        }
        #hero {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
            text-align: center;
            padding: 5rem 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }
        .post-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }
        .post-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .post-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .post-card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }
        .post-info {
            padding: 1.6rem;
        }
        .post-card h3 {
            margin: 0 0 0.8rem 0;
            font-size: 1.35rem;
        }
        .date {
            color: #666;
            font-size: 0.95rem;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .post-content {
            display: none;
            background: white;
            margin: 2rem auto;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            max-width: 920px;
            font-size: 1.05rem;
        }
        .post-content.active {
            display: block;
        }
        .post-content img {
            max-width: 100%;
            border-radius: 10px;
            margin: 1.8rem 0;
        }
        footer {
            text-align: center;
            padding: 3rem 1rem;
            background: #1e3a8a;
            color: white;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>窍某博客网</h1>
            <input type="text" id="searchInput" class="search-box" placeholder="搜索文章..." onkeyup="searchPosts()">
        </nav>
    </header>

    <main>
        <section id="home">
            <div id="hero">
                <h2>科技 · 生活 · 思考</h2>
                <p style="font-size:1.25rem;">记录成长，分享所得</p>
            </div>

            <div class="container">
                <h2 style="text-align:center; margin:2.5rem 0 1.5rem;">最新文章</h2>
                <div class="post-list" id="post-list"></div>
            </div>
        </section>

        <div class="container" id="post-container"></div>
    </main>

    <footer>
        <p>© 2026 窍某博客网 | 记录科技时代下的思考与生活</p>
    </footer>

    <script>
        const posts = [
            {
                id: 1,
                title: "欢迎来到窍某博客网",
                date: "2026-07-01",
                excerpt: "开启我的分享之旅，欢迎大家。",
                image: "https://picsum.photos/id/1015/800/400",
                content: `
                    <h1>欢迎来到窍某博客网</h1>
                    <p class="date">2026-07-01</p>
                    <img src="https://picsum.photos/id/1015/800/400">
                    <p>大家好！这里是窍某的个人博客。我会在这里分享科技前沿知识、编程心得、生活感悟以及成长经历。希望这个小站能给大家带来一些启发和帮助。</p>
                `
            },
            {
                id: 2,
                title: "2026年值得重点学习的5个前沿技术",
                date: "2026-07-03",
                excerpt: "AI Agent等技术将重塑未来开发方式。",
                image: "https://picsum.photos/id/201/800/400",
                content: `
                    <h1>2026年值得重点学习的5个前沿技术</h1>
                    <p class="date">2026-07-03</p>
                    <img src="https://picsum.photos/id/201/800/400">
                    <ol>
                        <li><strong>AI Agent</strong>：自主完成复杂任务的智能系统</li>
                        <li><strong>WebAssembly + Rust</strong>：高性能Web开发</li>
                        <li><strong>边缘计算</strong>：低延迟智能应用</li>
                        <li><strong>可持续AI</strong>：绿色低碳模型</li>
                        <li><strong>多模态大模型</strong>：理解图像、视频、音频</li>
                    </ol>
                `
            },
            {
                id: 3,
                title: "如何用AI提升编程效率",
                date: "2026-07-04",
                excerpt: "实战分享AI编程工具使用经验",
                image: "https://picsum.photos/id/180/800/400",
                content: `
                    <h1>如何用AI提升编程效率</h1>
                    <p class="date">2026-07-04</p>
                    <img src="https://picsum.photos/id/180/800/400">
                    <p>推荐工具：Cursor + Claude 3.5 + Copilot。正确使用可将效率提升2-3倍。重点是让AI处理重复工作，自己专注架构和创新。</p>
                `
            },
            {
                id: 4,
                title: "大模型时代的学习方法",
                date: "2026-07-05",
                excerpt: "AI时代如何高效学习",
                image: "https://picsum.photos/id/201/800/400",
                content: `
                    <h1>大模型时代的学习方法</h1>
                    <p class="date">2026-07-05</p>
                    <img src="https://picsum.photos/id/201/800/400">
                    <p>1. 用AI快速理解概念<br>2. 立即实践小项目<br>3. 建立知识框架<br>4. 定期输出分享</p>
                `
            },
            {
                id: 5,
                title: "一个人旅行的意义",
                date: "2026-07-06",
                excerpt: "丽江之行带来的思考",
                image: "https://picsum.photos/id/1018/800/400",
                content: `
                    <h1>一个人旅行的意义</h1>
                    <p class="date">2026-07-06</p>
                    <img src="https://picsum.photos/id/1018/800/400">
                    <p>这次丽江之旅让我学会慢下来，享受独处。旅行不仅是看风景，更是和自己对话的过程。在忙碌的科技工作中，偶尔放空非常重要。</p>
                `
            },
            {
                id: 6,
                title: "前端开发者的2026生存指南",
                date: "2026-07-07",
                excerpt: "AI时代如何保持竞争力",
                image: "https://picsum.photos/id/133/800/400",
                content: `
                    <h1>前端开发者的2026生存指南</h1>
                    <p class="date">2026-07-07</p>
                    <img src="https://picsum.photos/id/133/800/400">
                    <p>掌握AI集成能力、复杂交互设计和高性能优化，才能在AI时代立于不败之地。</p>
                `
            },
            {
                id: 7,
                title: "晨间习惯：咖啡与深度思考",
                date: "2026-07-08",
                excerpt: "我的高效早晨仪式",
                image: "https://picsum.photos/id/292/800/400",
                content: `
                    <h1>晨间习惯：咖啡与深度思考</h1>
                    <p class="date">2026-07-08</p>
                    <img src="https://picsum.photos/id/292/800/400">
                    <p>每天早晨一杯手冲咖啡 + 30分钟阅读或写作，让我全天保持高专注力。这是我坚持最久也最受益的习惯。</p>
                `
            },
            {
                id: 8,
                title: "我对AGI的预测与准备",
                date: "2026-07-09",
                excerpt: "AGI可能很快到来，我们该如何应对",
                image: "https://picsum.photos/id/180/800/400",
                content: `
                    <h1>我对AGI的预测与准备</h1>
                    <p class="date">2026-07-09</p>
                    <img src="https://picsum.photos/id/180/800/400">
                    <p>我预测AGI可能在2028-2030年出现。我们需要持续学习、培养创造力，并思考人与AI的协作方式。</p>
                `
            }
        ];

        let currentPosts = [...posts];

        function renderPostList(filteredPosts) {
            const list = document.getElementById('post-list');
            list.innerHTML = filteredPosts.map(post => `
                <div class="post-card">
                    <img src="${post.image}" alt="${post.title}">
                    <div class="post-info">
                        <h3>${post.title}</h3>
                        <p class="date">${post.date}</p>
                        <p>${post.excerpt}</p>
                        <button onclick="showPost(${post.id})">阅读全文</button>
                    </div>
                </div>
            `).join('');
        }

        function searchPosts() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!keyword) {
                currentPosts = [...posts];
            } else {
                currentPosts = posts.filter(post => 
                    post.title.toLowerCase().includes(keyword) || 
                    post.excerpt.toLowerCase().includes(keyword) ||
                    post.content.toLowerCase().includes(keyword)
                );
            }
            renderPostList(currentPosts);
        }

        function showPost(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;
            document.getElementById('home').style.display = 'none';
            document.getElementById('post-container').innerHTML = `
                <div class="post-content active">
                    <button onclick="backToHome()" style="margin-bottom:1.5rem;">← 返回首页</button>
                    ${post.content}
                </div>
            `;
        }

        function backToHome() {
            document.getElementById('home').style.display = 'block';
            document.getElementById('post-container').innerHTML = '';
        }

        window.onload = () => renderPostList(posts);
    </script>
</body>
</html>
