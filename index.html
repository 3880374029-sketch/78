<!DOCTYPE html>

<head>

    <!-- 样式（与之前完全相同，为了精简此处用简写，但实际使用时请保留完整样式） -->
    <style>

        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0b0e1a;color:#e8edf5;font-family:'Segoe UI',sans-serif;padding:12px;line-height:1.6;}
        .container{max-width:1200px;margin:0 auto;}
        header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;}

        .nav-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
        .search-box{padding:8px 16px;border-radius:30px;border:1px solid #444;background:rgba(255,255,255,0.05);color:#fff;width:200px;}
        .btn{background:linear-gradient(135deg,#6d5bff,#8b5cf6);color:#fff;border:none;padding:6px 18px;border-radius:30px;cursor:pointer;font-size:0.9rem;transition:0.3s;min-height:44px;min-width:44px;display:inline-flex;align-items:center;justify-content:center;}

        .main-content{flex:2;min-width:0;}

    <!-- ===== HTML 结构（与之前完全相同） ===== -->
    <div class="container">
        <header>
            <h1>✦ 窍某论坛</h1>
            <div class="nav-controls">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索帖子..." onkeyup="searchPosts()" />

                    </span>
                    <button class="btn" id="loginBtn" onclick="openModal()">登录</button>
                    <img id="userAvatar" class="user-avatar hidden" alt="头像" />
                    <span id="userName" class="user-name hidden"></span>
                    <button class="logout-btn hidden" id="logoutBtn" onclick="logout()">退出</button>
                    <a id="adminLink" href="admin.html">⚙️ 管理</a>
                    <span id="profileLink" class="profile-link hidden" onclick="openProfile()">👤 个人中心</span>
                </div>
            </div>
        </header>

        <div class="forum-stats">
            <span>📄 帖子：<strong id="statPosts">0</strong></span>
            <span>💬 回复：<strong id="statComments">0</strong></span>
            <span>👤 用户：<strong id="statUsers">0</strong></span>
            <span>🏷️ 版块：<strong id="statTopics">0</strong></span>
            <span>⭐ 积分榜：<strong id="topUserPoints">-</strong></span>

        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;">

        <div class="publish-form" id="publishForm">
            <h3 style="margin-bottom:6px;">📝 发布新帖子</h3>
            <input type="text" id="newTitle" maxlength="100" placeholder="标题（限100字符）" />

                <option value="tech">💻 科技</option>
                <option value="life">🌿 生活</option>
                <option value="career">💼 职场</option>

            <button class="board-btn" data-cat="life" onclick="setCategory('life')">🌿 生活</button>

    <!-- ============================================================= -->
    <!-- 加载器脚本（修复：正确检测全局变量） -->
    <!-- ============================================================= -->
    <script>
        (function loadSupabase() {
            const cdnList = [
                'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
                'https://unpkg.com/@supabase/supabase-js@2',
                'https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.39.0/umd/supabase.min.js'
            ];
            let index = 0;

            function tryLoad() {
                if (index >= cdnList.length) {
                    document.body.innerHTML = `
                        <div style="text-align:center;padding:50px;color:#ef4444;font-size:18px;">
                            <h1>❌ 加载失败</h1>
                            <p>无法加载 Supabase 库，请检查网络或刷新重试。</p>
                            <button onclick="location.reload()" style="background:#6d5bff;color:#fff;border:none;padding:10px 24px;border-radius:30px;cursor:pointer;margin-top:16px;">刷新重试</button>
                        </div>
                    `;
                    return;
                }
                const script = document.createElement('script');
                script.src = cdnList[index];
                script.onload = function() {
                    console.log('✅ Supabase 库加载成功：', cdnList[index]);
                    // 关键：检测正确的全局变量名（window.supabase 或 window.supabaseJs）
                    const lib = window.supabase || window.supabaseJs;
                    if (lib) {
                        if (typeof startApp === 'function') {
                            startApp(lib);
                        } else {
                            console.error('❌ 主程序未定义');
                        }
                    } else {
                        console.error('❌ 无法找到 Supabase 库对象，请检查 CDN 是否成功加载');
                    }
                };
                script.onerror = function() {
                    console.warn('⚠️ 加载失败，尝试下一个 CDN：', cdnList[index]);
                    index++;
                    tryLoad();
                };
                document.head.appendChild(script);
            }
            tryLoad();
        })();
    </script>

    <!-- ============================================================= -->
    <!-- 主程序脚本（定义 startApp 函数） -->
    <!-- ============================================================= -->
    <script>

            // 4. 网络请求（使用 sb）
            async function fetchWithAuth(url, options) {
                const headers = options.headers || {};
                if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
                headers['apikey'] = SUPABASE_ANON_KEY;
                headers['Content-Type'] = headers['Content-Type'] || 'application/json';
                const response = await fetch(url, { ...options, headers });
                if (response.status === 401 && refreshToken) {
                    try {
                        const resp = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
                            method: 'POST',
                            headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refresh_token: refreshToken })
                        });
                        if (resp.ok) {
                            const data = await resp.json();
                            accessToken = data.access_token;
                            refreshToken = data.refresh_token;
                            localStorage.setItem('sb_token', accessToken);
                            localStorage.setItem('sb_refresh_token', refreshToken);
                            const retryHeaders = { ...headers, 'Authorization': 'Bearer ' + accessToken };
                            const retry = await fetch(url, { ...options, headers: retryHeaders });
                            return retry;
                        }
                    } catch (e) { console.warn('刷新失败', e); }
                }
                return response;
            }
            async function authFetch(url, options) {

                return resp;
            }
            async function handleResponse(res) {
                const text = await res.text();
                let json = null;
                try { json = JSON.parse(text); } catch (e) {}
                if (!res.ok) {
                    console.error('HTTP Error:', res.status, res.statusText);
                    console.error('Response body:', text);
                    const msg = json?.error_description || json?.message || json?.error || text || '请求失败';
                    throw new Error(msg);
                }
                return json || text;
            }

                    const kw = keyword.toLowerCase();
                    filtered = filtered.filter(p => p.title.toLowerCase().includes(kw) || (p.excerpt && p.excerpt.toLowerCase().includes(kw)) || (p.content && p.content.toLowerCase().includes(kw)));

            function renderHotList(posts) {
                const container = document.getElementById('hotContent');

                const sorted = [...posts].sort((a, b) => (b.likes || 0) - (a.likes || 0));
                const top = sorted.slice(0, 5);
                if (!top.length) { container.innerHTML = '<p style="color:rgba(255,255,255,0.2);font-size:0.9rem;">暂无帖子</p>'; return; }
                const emojis = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
                container.innerHTML = top.map((p, i) => {
                    const emoji = emojis[i] || `#${i + 1}`;
                    return `<div class="hot-item"><a href="#" onclick="showPost('${p.id}');return false;"><span><span class="hot-num">${emoji}</span> ${p.title}</span><span>❤️ ${p.likes || 0}</span></a></div>`;
                }).join('');
            }

                }

                    const [postsCount, commentsCount, usersCount] = await Promise.all([
                        fetch(SUPABASE_URL + '/rest/v1/posts?select=id', { headers: { 'apikey': SUPABASE_ANON_KEY } }).then(r => r.json()).then(data => data?.length || 0),
                        fetch(SUPABASE_URL + '/rest/v1/comments?select=id', { headers: { 'apikey': SUPABASE_ANON_KEY } }).then(r => r.json()).then(data => data?.length || 0),

            // 7. 加载帖子
            async function loadPosts(category, keyword) {
                const list = document.getElementById('postList');
                list.innerHTML = '<div class="empty-state">⏳ 加载中...</div>';
                try {
                    const [postsData, counts] = await Promise.all([
                        fetchPosts(),
                        fetchCommentCounts()
                    ]);
                    postsCache = postsData || [];
                    commentCountMap = counts || {};
                    postsCache.forEach(p => { p._comment_count = commentCountMap[p.id] || 0; });
                    const userIds = postsCache.map(p => p.author_id).filter(Boolean);
                    if (userIds.length) {
                        const { data: profilesData } = await sb.from('profiles').select('id, points, level').in('id', userIds);
                        if (profilesData) {
                            const profMap = Object.fromEntries(profilesData.map(u => [u.id, u]));
                            postsCache.forEach(p => { if (p.author_id && profMap[p.author_id]) p.profiles = profMap[p.author_id]; });
                        }
                    }
                    const filtered = getFilteredPosts(category, keyword);
                    renderPosts(filtered);
                    renderHotList(postsCache);
                    setTimeout(() => updateStats(), 0);
                    const tags = await fetchHotTags();
                    const tagContainer = document.getElementById('tagContent');
                    if (tags.length) {
                        tagContainer.innerHTML = tags.map(t => `<span class="tag-item" onclick="searchByTag('${t.name}')">#${t.name}</span>`).join(' ');
                    } else {
                        tagContainer.innerHTML = '<p style="color:rgba(255,255,255,0.2);font-size:0.9rem;">暂无标签</p>';
                    }
                } catch (err) {
                    list.innerHTML = `<div class="empty-state">❌ ${err.message}<br><button class="btn" onclick="loadPosts('${category}')">🔄 重试</button></div>`;
                    console.error(err);
                }
            }

            function searchByTag(tagName) {
                document.getElementById('searchInput').value = '#' + tagName;

            // 8. 发帖（含标签）
            async function publishPost() {
                if (isSubmitting) { showToast('请勿重复提交', true); return; }
                if (!currentUser) { showToast('请先登录', true); return; }
                const title = document.getElementById('newTitle').value.trim();
                const content = document.getElementById('newContent').value.trim();
                const excerpt = document.getElementById('newExcerpt').value.trim();
                const category = document.getElementById('newCategory').value;
                const tagsInput = document.getElementById('newTags').value.trim();
                if (!title || !content) { showToast('请填写标题和内容', true); return; }
                if (title.length > 100) { showToast('标题不能超过100字符', true); return; }
                if (content.length > 50000) { showToast('正文过长', true); return; }
                isSubmitting = true;
                const btn = document.getElementById('publishBtn');
                if (btn) btn.disabled = true;
                try {
                    const avatar = userProfile?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.email)}&background=6d5bff&color=fff&size=100`;
                    const postData = {
                        title, content, excerpt, category,
                        author_id: currentUser.id,
                        author_name: currentUser.email,
                        author_avatar: avatar,
                        likes: 0, views: 0,
                        is_pinned: false
                    };
                    const { data: newPost, error: postError } = await sb.from('posts').insert(postData).select();
                    if (postError) throw postError;
                    const postId = newPost[0].id;
                    if (tagsInput) {
                        const tags = tagsInput.split(',').map(s => s.trim()).filter(Boolean);
                        for (const tagName of tags) {
                            let { data: existingTag } = await sb.from('tags').select('id').eq('name', tagName).maybeSingle();
                            let tagId;
                            if (!existingTag) {
                                const { data: newTag, error: tagError } = await sb.from('tags').insert({ name: tagName }).select();
                                if (tagError) { console.warn('创建标签失败', tagError); continue; }
                                tagId = newTag[0].id;
                            } else {
                                tagId = existingTag.id;
                            }
                            await sb.from('post_tags').insert({ post_id: postId, tag_id: tagId });
                        }
                    }
                    showToast('发帖成功！🎉');
                    document.getElementById('newTitle').value = '';
                    document.getElementById('newContent').value = '';
                    document.getElementById('newExcerpt').value = '';
                    document.getElementById('newTags').value = '';
                    document.getElementById('publishForm').style.display = 'none';
                    await loadPosts(currentCategory);
                } catch (err) {
                    if (err.message !== 'Unauthorized') { showToast('发帖失败：' + err.message, true); }
                } finally {
                    isSubmitting = false;
                    if (btn) btn.disabled = false;
                }
            }

            // 9. 点赞、评论、详情
            async function handleLike(postId) {
                if (!currentUser) { showToast('请先登录', true); return; }
                const numericId = parseInt(postId);
                const post = postsCache.find(p => parseInt(p.id) === numericId);
                if (!post) { showToast('帖子不存在', true); return; }
                const oldLikes = post.likes || 0;
                const btn = document.getElementById(`like-btn-${postId}`);
                const isLiked = btn ? btn.classList.contains('liked') : false;
                const willLike = !isLiked;
                const newLikes = willLike ? oldLikes + 1 : Math.max(oldLikes - 1, 0);
                post.likes = newLikes;
                const keyword = document.getElementById('searchInput').value.trim();
                const filtered = getFilteredPosts(currentCategory, keyword);
                renderPosts(filtered);
                renderHotList(postsCache);
                const detailArea = document.getElementById('detailArea');
                if (!detailArea.classList.contains('hidden')) {
                    const detailLikeSpan = document.getElementById(`like-count-detail-${postId}`);
                    if (detailLikeSpan) detailLikeSpan.textContent = newLikes;
                    const detailBtn = document.getElementById(`like-btn-detail-${postId}`);
                    if (detailBtn) detailBtn.classList.toggle('liked', willLike);
                }
                if (btn) btn.classList.toggle('liked', willLike);
                try {
                    const result = await toggleLike(postId, currentUser.id);
                    if ((willLike && result !== 'liked') || (!willLike && result !== 'unliked')) {
                        post.likes = oldLikes;
                        renderPosts(getFilteredPosts(currentCategory, keyword));
                        renderHotList(postsCache);
                        showToast('操作结果与预期不符，已恢复', true);
                    } else {
                        updateStats();
                    }
                } catch (err) {
                    if (err.message === 'Unauthorized') { /* handled */ } else {
                        post.likes = oldLikes;
                        renderPosts(getFilteredPosts(currentCategory, keyword));
                        renderHotList(postsCache);
                        showToast('操作失败：' + err.message, true);
                    }
                    console.error(err);
                }
            }

            async function toggleLike(postId, userId) {
                const numericPostId = parseInt(postId);
                const userIdStr = String(userId);
                const checkUrl = `${SUPABASE_URL}/rest/v1/likes?post_id=eq.${numericPostId}&user_id=eq.${userIdStr}`;
                const checkResp = await authFetch(checkUrl, { method: 'GET' });
                let existing = [];
                try { existing = await handleResponse(checkResp); } catch (e) { existing = []; }
                let action = '';
                if (existing && existing.length > 0) {
                    const deleteUrl = `${SUPABASE_URL}/rest/v1/likes?id=eq.${existing[0].id}`;
                    const deleteResp = await authFetch(deleteUrl, { method: 'DELETE' });
                    if (!deleteResp.ok) throw new Error(`取消点赞失败 (HTTP ${deleteResp.status})`);
                    action = 'unliked';
                } else {
                    const insertResp = await authFetch(SUPABASE_URL + '/rest/v1/likes', {
                        method: 'POST',
                        body: JSON.stringify({ post_id: numericPostId, user_id: userIdStr })
                    });
                    if (insertResp.status === 201 || insertResp.status === 200) action = 'liked';
                    else if (insertResp.status === 409) return 'liked';
                    else {
                        const text = await insertResp.text();
                        throw new Error(`点赞失败: ${insertResp.status} - ${text}`);
                    }
                }
                const increment = action === 'liked' ? 1 : -1;
                const updateResp = await authFetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${numericPostId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ likes: increment })
                });
                if (!updateResp.ok) console.warn('更新帖子点赞数失败，但点赞记录已操作', updateResp.status);
                return action;
            }

            async function showPost(postId) {
                const post = postsCache.find(p => parseInt(p.id) === parseInt(postId));
                if (!post) { showToast('帖子不存在', true); return; }
                try {
                    const updateResp = await authFetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${postId}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ views: 1 })
                    });
                    if (updateResp.ok) { post.views = (post.views || 0) + 1; }
                } catch (err) { console.warn('浏览量更新失败', err); }
                document.getElementById('postList').style.display = 'none';
                const area = document.getElementById('detailArea');
                area.classList.remove('hidden');
                const avatar = post.author_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(post.author_name || 'U')}&background=6d5bff&color=fff&size=40`;
                const commentCount = post._comment_count || 0;
                area.innerHTML = `
                    <div class="post-detail">
                        <button class="back-btn" onclick="backToList()">← 返回列表</button>
                        <h1 style="font-size:1.6rem;">${post.title}</h1>
                        <div class="post-author-info">
                            <img src="${avatar}" alt="${post.author_name || '用户'}" />
                            <span class="author-name">${post.author_name || '匿名'}</span>
                            <span class="post-time">${formatTime(post.created_at)}</span>
                            <span style="margin-left:12px;">👁️ ${post.views || 0}</span>
                        </div>
                        <div class="post-body">${post.content}</div>
                        <div class="post-actions">
                            <span class="like-btn ${post.likes > 0 ? 'liked' : ''}" onclick="handleLike('${post.id}')" id="like-btn-detail-${post.id}">❤️ <span id="like-count-detail-${post.id}">${post.likes || 0}</span></span>
                            <span>💬 ${commentCount}</span>
                        </div>
                        <hr style="border-color:#333;margin:16px 0;" />
                        <h3 style="margin-bottom:12px;">💬 全部回复</h3>
                        <div id="commentsArea"><p style="color:rgba(255,255,255,0.3);">加载中...</p></div>
                        ${currentUser ? `
                            <div style="margin-top:16px;">
                                <textarea id="commentInput" rows="3" maxlength="2000" placeholder="写下你的回复..."></textarea>
                                <button class="btn" onclick="publishComment('${post.id}')" id="commentSubmitBtn" style="margin-top:8px;">发表回复</button>
                            </div>
                        ` : '<p style="color:rgba(255,255,255,0.3);margin-top:12px;">登录后即可回复</p>'}
                    </div>
                `;
                try {
                    const comments = await fetchComments(post.id);
                    const areaC = document.getElementById('commentsArea');
                    const replyCount = document.getElementById('reply-count');
                    if (!comments || comments.length === 0) {
                        areaC.innerHTML = '<p style="color:rgba(255,255,255,0.3);">还没有回复，来抢沙发！</p>';
                        if (replyCount) replyCount.textContent = '0';
                    } else {
                        let html = '';
                        comments.forEach(c => {
                            const ava = c.user_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(c.username || 'U')}&background=6d5bff&color=fff&size=28`;
                            html += `<div class="reply-item">
                                        <div class="reply-author-info">
                                            <img src="${ava}" alt="${c.username || '用户'}" />
                                            <span class="reply-author">${c.username || '用户'}</span>
                                            <span class="reply-time">${formatTime(c.created_at)}</span>
                                        </div>
                                        <div class="reply-content">${c.content}</div>
                                    </div>`;
                        });
                        areaC.innerHTML = html;
                        if (replyCount) replyCount.textContent = comments.length;
                    }
                } catch (err) {
                    document.getElementById('commentsArea').innerHTML = '<p style="color:#ef4444;">加载评论失败</p>';
                }
            }

            function backToList() {
                document.getElementById('postList').style.display = 'block';
                document.getElementById('detailArea').classList.add('hidden');
                document.getElementById('detailArea').innerHTML = '';
                loadPosts(currentCategory);
            }

            async function publishComment(postId) {
                if (isSubmitting) { showToast('请勿重复提交', true); return; }
                const input = document.getElementById('commentInput');
                if (!input) return;
                const content = input.value.trim();
                if (!content) { showToast('请输入回复内容', true); return; }
                if (content.length > 2000) { showToast('回复不能超过2000字符', true); return; }
                if (!currentUser) { showToast('请先登录', true); return; }
                isSubmitting = true;
                const btn = document.getElementById('commentSubmitBtn');
                if (btn) btn.disabled = true;
                try {
                    await createComment({
                        post_id: parseInt(postId),
                        user_id: currentUser.id,
                        username: currentUser.email,
                        user_avatar: userProfile?.avatar_url || null,
                        content
                    });
                    input.value = '';
                    showToast('回复成功！');
                    await loadPosts(currentCategory);
                    await showPost(postId);
                } catch (err) {
                    if (err.message !== 'Unauthorized') { showToast('回复失败：' + err.message, true); }
                } finally {
                    isSubmitting = false;
                    if (btn) btn.disabled = false;
                }
            }

            // 10. 分类、搜索、版块管理
            function setCategory(cat) {
                currentCategory = cat;
                document.querySelectorAll('.board-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.cat === cat || b.dataset.cat === decodeURIComponent(cat));
                });
                const keyword = document.getElementById('searchInput').value.trim();
                loadPosts(cat, keyword);
            }
            function searchPosts() {
                const keyword = document.getElementById('searchInput').value.trim();
                loadPosts(currentCategory, keyword);
            }

            async function loadTopics() {
                try {
                    const data = await fetchTopics();
                    topicsCache = data || [];
                    updateBoardNav();
                    updateCategorySelect();
                    document.getElementById('statTopics').textContent = topicsCache.length;
                } catch (err) { console.error('加载版块失败', err); }
            }
            function updateBoardNav() {
                const container = document.getElementById('dynamicBoards');
                if (!container) return;
                container.innerHTML = topicsCache.map(t =>
                    `<button class="board-btn" data-cat="${encodeURIComponent(t.name)}" onclick="setCategory('${encodeURIComponent(t.name)}')">🏷️ ${t.name}</button>`
                ).join('');
            }
            function updateCategorySelect() {
                const select = document.getElementById('newCategory');
                const fixed = ['闲聊', 'tech', 'life', 'career'];
                const opts = select.querySelectorAll('option');
                opts.forEach(o => { if (!fixed.includes(o.value)) o.remove(); });
                topicsCache.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.name;
                    opt.textContent = '🏷️ ' + t.name;
                    select.appendChild(opt);
                });
            }

            function openNewTopic() {
                if (!currentUser) { showToast('请先登录', true); return; }
                document.getElementById('topicModal').classList.add('active');
                document.getElementById('newTopicName').value = '';
                document.getElementById('topicMsg').innerHTML = '';
            }
            function closeTopicModal() { document.getElementById('topicModal').classList.remove('active'); }
            document.getElementById('topicModal').addEventListener('click', function(e) { if (e.target === this) closeTopicModal(); });

            async function createTopic() {
                const name = document.getElementById('newTopicName').value.trim();
                const msg = document.getElementById('topicMsg');
                if (!name) { msg.innerHTML = '<p style="color:#ef4444;">请输入版块名称</p>'; return; }
                if (name.length > 30) { msg.innerHTML = '<p style="color:#ef4444;">名称不能超过30字符</p>'; return; }
                if (topicsCache.some(t => t.name === name)) { msg.innerHTML = '<p style="color:#ef4444;">该版块已存在</p>'; return; }
                const btn = document.querySelector('#topicModal .btn[onclick="createTopic()"]');
                if (btn) btn.disabled = true;
                msg.innerHTML = '<p style="color:rgba(255,255,255,0.5);">⏳ 创建中...</p>';
                try {
                    const result = await createTopicAPI(name);
                    msg.innerHTML = '<p style="color:#6ee7b7;">✅ 版块创建成功！</p>';
                    document.getElementById('newTopicName').value = '';
                    const newTopic = { id: Date.now(), name: name };
                    topicsCache.push(newTopic);
                    updateBoardNav();
                    updateCategorySelect();
                    document.getElementById('statTopics').textContent = topicsCache.length;
                    setTimeout(() => { setCategory(name); }, 300);
                    setTimeout(closeTopicModal, 1200);
                } catch (err) {
                    if (err.message !== 'Unauthorized') { msg.innerHTML = '<p style="color:#ef4444;">❌ 创建失败：' + err.message + '</p>'; }
                    console.error(err);
                } finally {
                    if (btn) btn.disabled = false;
                }
            }

            // 11. 个人中心
            function openProfile() {
                if (!currentUser) { showToast('请先登录', true); return; }
                document.getElementById('profileModal').classList.add('active');
                document.getElementById('profileNameInput').value = userProfile?.username || '';
                document.getElementById('profileAvatarPreview').src = getAvatarUrl(userProfile || currentUser);
                document.getElementById('profileMsg').innerHTML = '';
            }
            function closeProfile() { document.getElementById('profileModal').classList.remove('active'); }
            document.getElementById('profileModal').addEventListener('click', function(e) { if (e.target === this) closeProfile(); });

            async function uploadAvatar(event) {
                const file = event.target.files[0];
                if (!file) return;
                if (!currentUser) { showToast('请先登录', true); return; }
                if (file.size > 2 * 1024 * 1024) { showToast('图片不能超过2MB', true); return; }
                const msg = document.getElementById('profileMsg');
                msg.innerHTML = '<p style="color:rgba(255,255,255,0.5);">上传中...</p>';
                try {
                    const resp = await authFetch(SUPABASE_URL + '/storage/v1/object/avatars/' + currentUser.id + '.png', {
                        method: 'POST',
                        headers: { 'Content-Type': file.type },
                        body: file
                    });
                    if (!resp.ok) throw new Error('上传失败');
                    const publicUrl = SUPABASE_URL + '/storage/v1/object/public/avatars/' + currentUser.id + '.png';
                    await upsertProfile({ avatar_url: publicUrl });
                    userProfile.avatar_url = publicUrl;
                    document.getElementById('profileAvatarPreview').src = publicUrl;
                    document.getElementById('userAvatar').src = publicUrl;
                    msg.innerHTML = '<p style="color:#6ee7b7;">✅ 头像上传成功！</p>';
                } catch (err) {
                    if (err.message !== 'Unauthorized') { msg.innerHTML = '<p style="color:#ef4444;">上传失败：' + err.message + '</p>'; }
                }
            }

            async function saveProfile() {
                const newName = document.getElementById('profileNameInput').value.trim();
                const msg = document.getElementById('profileMsg');
                if (!newName) { msg.innerHTML = '<p style="color:#ef4444;">昵称不能为空</p>'; return; }
                if (newName.length > 30) { msg.innerHTML = '<p style="color:#ef4444;">昵称不能超过30字符</p>'; return; }
                try {
                    await upsertProfile({ username: newName });
                    userProfile.username = newName;
                    document.getElementById('userName').textContent = newName;
                    msg.innerHTML = '<p style="color:#6ee7b7;">✅ 昵称修改成功！</p>';
                    loadPosts(currentCategory);
                } catch (err) {
                    if (err.message !== 'Unauthorized') { msg.innerHTML = '<p style="color:#ef4444;">修改失败：' + err.message + '</p>'; }
                }
            }

            // 12. 主题切换
            function toggleTheme() {
                const body = document.body;
                const btn = document.getElementById('themeToggle');
                const isLight = body.style.background === '#f0f2f8';
                if (isLight) {
                    body.style.background = '#0b0e1a';
                    body.style.color = '#e8edf5';
                    btn.textContent = '🌙';
                    document.querySelectorAll('.post-card, .publish-form, .post-detail, .modal-box').forEach(el => { el.style.background = 'rgba(255,255,255,0.04)'; });
                } else {
                    body.style.background = '#f0f2f8';
                    body.style.color = '#1a1a2e';
                    btn.textContent = '☀️';
                    document.querySelectorAll('.post-card, .publish-form, .post-detail, .modal-box').forEach(el => { el.style.background = 'rgba(255,255,255,0.7)'; });
                }
            }

            // 13. 模态框
            function openModal() { document.getElementById('authModal').classList.add('active'); }
            function closeModal() { document.getElementById('authModal').classList.remove('active'); }
            document.getElementById('authModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') { closeModal(); closeTopicModal(); closeProfile(); closeNotificationPanel(); }
            });

            function switchTab(tab) {
                document.querySelectorAll('.modal-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
                document.getElementById('loginForm').classList.toggle('active', tab === 'login');
                document.getElementById('registerForm').classList.toggle('active', tab === 'register');
                document.getElementById('modalTitle').textContent = tab === 'login' ? '欢迎回来' : '创建账号';
                document.getElementById('modalSub').textContent = tab === 'login' ? '登录你的账号' : '加入窍某论坛';
            }

            // 14. 认证
            async function handleLogin(e) {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const pass = document.getElementById('loginPassword').value.trim();
                if (!email || !pass) { showToast('请填写完整', true); return; }
                try {
                    const data = await signIn(email, pass);
                    accessToken = data.access_token;
                    refreshToken = data.refresh_token;
                    currentUser = data.user;
                    localStorage.setItem('sb_token', accessToken);
                    localStorage.setItem('sb_refresh_token', refreshToken);
                    localStorage.setItem('sb_user', JSON.stringify(currentUser));
                    userProfile = await getProfile(currentUser.id);
                    closeModal();
                    document.getElementById('loginEmail').value = '';
                    document.getElementById('loginPassword').value = '';
                    showToast('登录成功！🎉');
                    if (currentUser) {
                        const { data: follows } = await sb.from('follows').select('following_id').eq('follower_id', currentUser.id);
                        if (follows) { follows.forEach(f => followingMap.set(f.following_id, true)); }
                        updateUnreadBadge();
                    }
                    updateUI();
                    loadPosts();
                } catch (err) { showToast('登录失败：' + err.message, true); }
            }

            async function handleRegister(e) {
                e.preventDefault();
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const pass = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirm').value;
                if (!name || !email || !pass || !confirm) { showToast('请填写完整', true); return; }
                if (pass !== confirm) { showToast('密码不一致', true); return; }
                if (pass.length < 6) { showToast('密码至少6位', true); return; }
                if (name.length > 30) { showToast('昵称过长', true); return; }
                try {
                    const data = await signUp(email, pass, name);
                    accessToken = data.access_token;
                    refreshToken = data.refresh_token;
                    currentUser = data.user;
                    localStorage.setItem('sb_token', accessToken);
                    localStorage.setItem('sb_refresh_token', refreshToken);
                    localStorage.setItem('sb_user', JSON.stringify(currentUser));
                    await upsertProfile({
                        id: currentUser.id,
                        username: name,
                        email: email,
                        is_admin: false,
                        points: 0,
                        level: 1
                    });
                    userProfile = { username: name, email: email, is_admin: false, points: 0, level: 1 };
                    showToast('注册成功！🎉');
                    closeModal();
                    updateUI();
                    loadPosts();
                } catch (err) { showToast('注册失败：' + err.message, true); }
            }

            async function handleSocialLogin(provider) {
                try {
                    const redirectTo = window.location.origin;
                    const authUrl = `${SUPABASE_URL}/auth/v1/authorize?provider=${provider}&redirect_to=${encodeURIComponent(redirectTo)}`;
                    window.location.href = authUrl;
                } catch (error) { showToast('登录失败：' + error.message, true); }
            }

            async function handleOAuthCallback() {
                const hash = window.location.hash;
                const search = window.location.search;
                let token = null, refresh = null, user = null;
                if (hash && hash.includes('access_token')) {
                    const params = new URLSearchParams(hash.substring(1));
                    token = params.get('access_token');
                    refresh = params.get('refresh_token');
                    const userStr = params.get('user');
                    if (userStr) { try { user = JSON.parse(decodeURIComponent(userStr)); } catch (e) {} }
                } else if (search && search.includes('access_token')) {
                    const params = new URLSearchParams(search);
                    token = params.get('access_token');
                    refresh = params.get('refresh_token');
                    const userStr = params.get('user');
                    if (userStr) { try { user = JSON.parse(decodeURIComponent(userStr)); } catch (e) {} }
                }
                if (token) {
                    accessToken = token;
                    refreshToken = refresh;
                    localStorage.setItem('sb_token', token);
                    if (refresh) localStorage.setItem('sb_refresh_token', refresh);
                    if (user) {
                        currentUser = user;
                        localStorage.setItem('sb_user', JSON.stringify(user));
                        userProfile = await getProfile(user.id);
                        if (!userProfile) {
                            await upsertProfile({
                                id: user.id,
                                username: user.email || user.user_metadata?.username || '用户',
                                email: user.email,
                                is_admin: false,
                                points: 0,
                                level: 1
                            });
                            userProfile = await getProfile(user.id);
                        }
                        showToast('登录成功！🎉');
                    } else {
                        try {
                            const resp = await fetch(SUPABASE_URL + '/auth/v1/user', {
                                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + token }
                            });
                            const userData = await handleResponse(resp);
                            if (userData) {
                                currentUser = userData;
                                localStorage.setItem('sb_user', JSON.stringify(userData));
                                userProfile = await getProfile(userData.id);
                                if (!userProfile) {
                                    await upsertProfile({
                                        id: userData.id,
                                        username: userData.email || '用户',
                                        email: userData.email,
                                        is_admin: false,
                                        points: 0,
                                        level: 1
                                    });
                                    userProfile = await getProfile(userData.id);
                                }
                                showToast('登录成功！🎉');
                            }
                        } catch (e) { console.error('获取用户信息失败', e); }
                    }
                    window.history.replaceState({}, document.title, window.location.pathname);
                    updateUI();
                    loadPosts();
                }
            }

            async function logout() {
                accessToken = null;
                refreshToken = null;
                currentUser = null;
                userProfile = null;
                localStorage.removeItem('sb_token');
                localStorage.removeItem('sb_refresh_token');
                localStorage.removeItem('sb_user');
                followingMap.clear();
                updateUI();
                loadPosts();
                showToast('已退出');
            }

            // 15. UI 更新
            function updateUI() {
                const loginBtn = document.getElementById('loginBtn');
                const avatar = document.getElementById('userAvatar');
                const nameEl = document.getElementById('userName');
                const logoutBtn = document.getElementById('logoutBtn');
                const adminLink = document.getElementById('adminLink');
                const profileLink = document.getElementById('profileLink');
                if (currentUser && accessToken) {
                    loginBtn.style.display = 'none';
                    avatar.classList.remove('hidden');
                    nameEl.classList.remove('hidden');
                    logoutBtn.classList.remove('hidden');
                    profileLink.classList.remove('hidden');
                    avatar.src = getAvatarUrl(userProfile || currentUser);
                    nameEl.textContent = userProfile?.username || currentUser.email;
                    if (userProfile?.is_admin) {
                        adminLink.style.display = 'inline-block';
                        isAdmin = true;
                    } else {
                        adminLink.style.display = 'none';
                        isAdmin = false;
                    }
                } else {
                    loginBtn.style.display = 'inline-block';
                    avatar.classList.add('hidden');
                    nameEl.classList.add('hidden');
                    logoutBtn.classList.add('hidden');
                    adminLink.style.display = 'none';
                    profileLink.classList.add('hidden');
                    isAdmin = false;
                }
            }

            // 16. 暴露全局（供 onclick 使用）
            window.openModal = openModal;
            window.closeModal = closeModal;
            window.switchTab = switchTab;
            window.handleLogin = handleLogin;
            window.handleRegister = handleRegister;
            window.handleSocialLogin = handleSocialLogin;
            window.logout = logout;
            window.setCategory = setCategory;
            window.searchPosts = searchPosts;
            window.showPost = showPost;
            window.backToList = backToList;
            window.togglePublish = function() {
                const form = document.getElementById('publishForm');
                form.style.display = form.style.display === 'none' ? 'block' : 'none';
            };
            window.publishPost = publishPost;
            window.publishComment = publishComment;
            window.handleLike = handleLike;
            window.openNewTopic = openNewTopic;
            window.closeTopicModal = closeTopicModal;
            window.createTopic = createTopic;
            window.toggleTheme = toggleTheme;
            window.openProfile = openProfile;
            window.closeProfile = closeProfile;
            window.uploadAvatar = uploadAvatar;
            window.saveProfile = saveProfile;
            window.loadPosts = loadPosts;
            window.renderHotList = renderHotList;
            window.doCheckin = doCheckin;
            window.toggleFollow = toggleFollow;
            window.openNotificationPanel = openNotificationPanel;
            window.closeNotificationPanel = closeNotificationPanel;
            window.markNotificationRead = markNotificationRead;
            window.searchByTag = searchByTag;

            // 17. 初始化
            async function init() {
                await handleOAuthCallback();
                const token = localStorage.getItem('sb_token');
                const refresh = localStorage.getItem('sb_refresh_token');
                const userStr = localStorage.getItem('sb_user');
                if (token && userStr) {
                    accessToken = token;
                    refreshToken = refresh || null;
                    try { currentUser = JSON.parse(userStr); } catch (e) {}
                }
                if (currentUser && accessToken) {
                    try { userProfile = await getProfile(currentUser.id); } catch (e) {}
                    const { data: follows } = await sb.from('follows').select('following_id').eq('follower_id', currentUser.id);
                    if (follows) { follows.forEach(f => followingMap.set(f.following_id, true)); }
                    updateUnreadBadge();
                }
                updateUI();
                await loadTopics();
                await loadPosts('all', '');
            }
            init();
        } // end startApp
    </script>
</body>
</html>
