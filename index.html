<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>窍某论坛</title>
    <!-- 加载器与样式与之前相同（此处省略以节省篇幅，实际使用时请复制之前提供的完整版本） -->
    <!-- 但必须确保所有 innerHTML 都被 textContent 或转义替代 -->
</head>
<body>
    <!-- 页面结构同前 -->
    <script>
        // 在 startApp 中增加 escapeHtml 函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        // 然后在所有渲染处使用，例如：
        // post.title 用 escapeHtml(post.title)
        // post.content 用 escapeHtml(post.content)
        // 用户名、标签等同理
    </script>
</body>
</html>
