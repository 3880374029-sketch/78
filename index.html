        body{background:#0b0e1a;color:#e8edf5;font-family:'Segoe UI',sans-serif;padding:20px;line-height:1.6;}
        .container{max-width:1200px;margin:0 auto;}
        header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;}

        .main-content{flex:2;min-width:0;}
        .sidebar{flex:1;min-width:260px;}

        .post-card .post-title{font-size:1.1rem;font-weight:600;color:#e8edf5;cursor:pointer;}

        .post-detail .post-author-info img{width:40px;height:40px;border-radius:50%;object-fit:cover;}
        .post-detail .post-author-info .author-name{color:#a5b4fc;font-weight:600;}

<body>
    <!-- ===== HTML 结构 ===== -->
    <div class="container">
        <header>
            <h1>✦ 窍某论坛</h1>
            <div class="nav-controls">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索帖子..." onkeyup="searchPosts()" />

                <div class="auth-section">
                    <button class="btn" id="loginBtn" onclick="openModal()">登录</button>
                    <img id="userAvatar" class="user-avatar hidden" alt="头像" />
                    <span id="userName" class="user-name hidden"></span>
                    <button class="logout-btn hidden" id="logoutBtn" onclick="logout()">退出</button>
                    <a id="adminLink" href="admin.html">⚙️ 管理</a>
                    <span id="profileLink" class="profile-link hidden" onclick="openProfile()">👤 个人中心</span>
                </div>
            </div>
        </header>
        <div class="forum-stats">
            <span>📄 帖子：<strong id="statPosts">0</strong></span>
            <span>💬 回复：<strong id="statComments">0</strong></span>
            <span>👤 用户：<strong id="statUsers">0</strong></span>
            <span>🏷️ 版块：<strong id="statTopics">0</strong></span>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
            <button class="btn" onclick="togglePublish()">📝 发帖</button>
            <button class="btn" onclick="openNewTopic()">🏷️ 新建版块</button>
        </div>
        <div class="publish-form" id="publishForm">
            <h3 style="margin-bottom:6px;">📝 发布新帖子</h3>
            <input type="text" id="newTitle" maxlength="100" placeholder="标题（限100字符）" />
            <input type="text" id="newExcerpt" maxlength="300" placeholder="摘要（可选）" />
            <select id="newCategory">
                <option value="闲聊">💬 闲聊</option>
                <option value="tech">💻 科技</option>
                <option value="life">🌿 生活</option>
                <option value="career">💼 职场</option>

            <textarea id="newContent" rows="6" maxlength="50000" placeholder="正文内容（支持 HTML 和图片链接）"></textarea>

            <div class="sidebar">

                </div>
            </div>
        </div>
    </div>
    <footer>
        <div class="social-links"><a href="#">💬 QQ: 3880374029</a><a href="#">▶️ @qiaomouqiao</a><a href="#">🎵 @mr.qiaomou</a><a href="#">🐙 GitHub</a></div>
        <div>📧 投稿邮箱：<a href="mailto:3880374029@qq.com" style="color:rgba(255,255,255,0.3);">3880374029@qq.com</a></div>

    <!-- 模态框 -->
    <div class="modal" id="authModal">
        <div class="modal-box">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">欢迎回来</h2>
            <p class="sub" id="modalSub">登录你的账号</p>
            <div class="modal-tabs">
                <button class="active" data-tab="login" onclick="switchTab('login')">登录</button>
                <button data-tab="register" onclick="switchTab('register')">注册</button>
            </div>
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">

                <button type="button" class="social-btn github-btn" onclick="handleSocialLogin('github')">🐙 使用 GitHub 登录</button>
            </form>
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <label for="regName">昵称</label>
                <input type="text" id="regName" maxlength="30" placeholder="你的昵称" required />

                <div class="divider">或</div>
                <button type="button" class="social-btn google-btn" onclick="handleSocialLogin('google')">🔵 使用 Google 登录</button>
                <button type="button" class="social-btn github-btn" onclick="handleSocialLogin('github')">🐙 使用 GitHub 登录</button>
            </form>
        </div>
    </div>
    <div class="modal" id="topicModal">
        <div class="modal-box">
            <span class="close" onclick="closeTopicModal()">&times;</span>
            <h2>🏷️ 新建版块</h2>
            <p style="color:rgba(255,255,255,0.4);margin-bottom:16px;">输入新版块名称，创建后即可在发帖时选择</p>
            <input type="text" id="newTopicName" maxlength="30" placeholder="版块名称（限30字符）" />
            <button class="btn" onclick="createTopic()" style="margin-top:12px;width:100%;">创建版块</button>
            <div id="topicMsg" style="margin-top:8px;"></div>
        </div>
    </div>
    <div class="modal" id="profileModal">
        <div class="modal-box">

                    <div class="profile-upload-btn" style="margin:0 auto 16px;">
                        <button class="btn" style="position:relative;">📷 上传头像</button>
                        <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(event)" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="profileNameInput">昵称</label>
                    <input type="text" id="profileNameInput" maxlength="30" placeholder="输入新昵称" />

    <script>
        // =============================================================
        // 1. 所有变量声明（在最顶部，避免暂时性死区）
        // =============================================================
        const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrdnNjZWllemJ5ZXh6cXB2YmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDk1MzIsImV4cCI6MjA5OTI4NTUzMn0.1h4Yp8YaJdMMOQW8N2zqvJi6QrxHPncBFMK9LjdmZ6E';

        // 确保 supabaseJs 已加载
        if (typeof supabaseJs === 'undefined') {
            alert('Supabase 库加载失败，请刷新页面或检查网络连接。');
            throw new Error('supabaseJs is not defined');
        }
        const sb = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let userProfile = null;
        let accessToken = null;
        let postsCache = [];
        let topicsCache = [];
        let currentCategory = 'all';   // ← 在这里初始化
        let isSubmitting = false;
        let isAdmin = false;

        // =============================================================
        // 2. 工具函数（均依赖上述变量）
        // =============================================================
        function formatDate(d) {
            if (!d) return '';
            return new Date(d).toLocaleDateString('zh-CN');
        }
        function formatTime(d) {
            if (!d) return '';
            return new Date(d).toLocaleString('zh-CN');
        }
        function getAvatarUrl(user) {
            if (user && user.avatar_url) return user.avatar_url;
            const name = user?.username || user?.email || 'U';
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6d5bff&color=fff&size=100`;
        }
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            clearTimeout(t._hide);
            t._hide = setTimeout(() => { t.className = 'toast'; }, 4000);
        }

        function getHeaders(includeAuth = true) {
            const headers = {
                'apikey': SUPABASE_ANON_KEY,
                'Content-Type': 'application/json'
            };
            if (includeAuth && accessToken) {
                headers['Authorization'] = 'Bearer ' + accessToken;
            }
            return headers;
        }

        async function handleResponse(res) {
            const text = await res.text();
            let json = null;
            try { json = JSON.parse(text); } catch(e) {}
            if (!res.ok) {
                console.error('HTTP Error:', res.status, res.statusText);
                console.error('Response body:', text);
                const msg = json?.error_description || json?.message || json?.error || text || '请求失败';
                throw new Error(msg);
            }
            return json || text;
        }

        // =============================================================
        // 3. API 调用
        // =============================================================
        // ... 所有 API 函数与之前相同（signIn, signUp, getProfile, ...）
        // 为节省篇幅，这里省略（实际上完整代码中必须包含全部）

        // =============================================================
        // 4. 重要：setCategory 函数定义（在 currentCategory 声明之后）
        // =============================================================
        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.board-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.cat === cat || b.dataset.cat === decodeURIComponent(cat));
            });
            const keyword = document.getElementById('searchInput').value.trim();
            loadPosts(cat, keyword);
        }

        // ... 其他函数定义 ...

        // =============================================================
        // 5. 初始化（确保 accessToken 在使用前赋值）
        // =============================================================
        async function init() {
            // 恢复会话
            const token = localStorage.getItem('sb_token');
            const userStr = localStorage.getItem('sb_user');
            if (token && userStr) {
                accessToken = token;
                try { currentUser = JSON.parse(userStr); } catch(e) {}
            }
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                currentUser = session.user;
                accessToken = session.access_token;
                localStorage.setItem('sb_token', accessToken);
                localStorage.setItem('sb_user', JSON.stringify(currentUser));
            }
            if (currentUser && accessToken) {
                try {
                    userProfile = await getProfile(currentUser.id);
                } catch(e) {}
            }
            // 监听状态变化
            sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    currentUser = session.user;
                    accessToken = session.access_token;
                    localStorage.setItem('sb_token', accessToken);
                    localStorage.setItem('sb_user', JSON.stringify(currentUser));
                    userProfile = await getProfile(currentUser.id);
                    updateUI();
                    loadPosts();
                } else if (event === 'SIGNED_OUT') {
                    currentUser = null;
                    accessToken = null;
                    userProfile = null;
                    localStorage.removeItem('sb_token');
                    localStorage.removeItem('sb_user');
                    updateUI();
                    loadPosts();
                }
                updateUI();
            });
            updateUI();
            await loadTopics();
            loadPosts('all', '');
        }

        // 暴露全局
        window.setCategory = setCategory;
        // ... 其他暴露

        // 启动
        init();
    </script>
