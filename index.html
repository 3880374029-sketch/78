<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>窍某博客网 - 科技·生活·思考</title>
    <style>
        /* ============================================================
                   🌈 CSS 变量 —— 支持主题切换
                   ============================================================ */
        :root {
            /* 深色主题（默认） */
            --bg-primary: #0b0e1a;
            --bg-secondary: #151b30;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --text-primary: #e8edf5;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --text-muted: rgba(255, 255, 255, 0.4);
            --border-light: rgba(255, 255, 255, 0.06);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.35);
            --shadow-card-hover: 0 20px 60px rgba(0, 0, 0, 0.50);
            --gradient-hero: linear-gradient(135deg, #f0f0ff, #a5b4fc, #818cf8);
            --gradient-nav: linear-gradient(135deg, #c4b5fd, #818cf8, #60a5fa);
            --gradient-btn: linear-gradient(135deg, #6d5bff, #8b5cf6);
            --badge-tech: rgba(96, 165, 250, 0.15);
            --badge-tech-color: #93bbfc;
            --badge-life: rgba(52, 211, 153, 0.12);
            --badge-life-color: #6ee7b7;
            --badge-career: rgba(251, 191, 36, 0.12);
            --badge-career-color: #fcd34d;
            --header-bg: rgba(11, 14, 26, 0.65);
            --footer-border: rgba(255, 255, 255, 0.04);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.10);
            --input-focus: rgba(130, 100, 255, 0.5);
        }

        /* 浅色主题 */
        body.light {
            --bg-primary: #f0f2f8;
            --bg-secondary: #e6e9f2;
            --bg-card: rgba(255, 255, 255, 0.7);
            --bg-card-hover: rgba(255, 255, 255, 0.9);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(30, 30, 60, 0.8);
            --text-muted: rgba(30, 30, 60, 0.5);
            --border-light: rgba(0, 0, 0, 0.08);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-card-hover: 0 20px 60px rgba(0, 0, 0, 0.12);
            --gradient-hero: linear-gradient(135deg, #4f46e5, #7c3aed);
            --gradient-nav: linear-gradient(135deg, #4f46e5, #7c3aed);
            --gradient-btn: linear-gradient(135deg, #4f46e5, #7c3aed);
            --badge-tech: rgba(37, 99, 235, 0.12);
            --badge-tech-color: #2563eb;
            --badge-life: rgba(5, 150, 105, 0.12);
            --badge-life-color: #059669;
            --badge-career: rgba(217, 119, 6, 0.12);
            --badge-career-color: #d97706;
            --header-bg: rgba(255, 255, 255, 0.7);
            --footer-border: rgba(0, 0, 0, 0.06);
            --input-bg: rgba(255, 255, 255, 0.5);
            --input-border: rgba(0, 0, 0, 0.10);
            --input-focus: rgba(79, 70, 229, 0.4);
        }

        /* ============================================================
                   🌌 全局重置 & 字体
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, Arial, sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.8;
            overflow-x: hidden;
            transition: background 0.4s, color 0.3s;
        }

        /* ============================================================
                   🌟 背景层 —— 动态渐变 + 光晕 + 网格纹理 (深色/浅色自适应)
                   ============================================================ */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(88, 50, 200, 0.45) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(30, 80, 220, 0.40) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(180, 60, 220, 0.25) 0%, transparent 50%),
                linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 40%, #1a1040 100%);
            transition: background 0.6s;
        }
        body.light .bg-layer {
            background:
                radial-gradient(ellipse at 20% 50%, rgba(79, 70, 229, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(236, 72, 153, 0.06) 0%, transparent 50%),
                linear-gradient(145deg, #f0f2f8 0%, #e6e9f2 40%, #d5d9e8 100%);
        }

        .bg-layer::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(120, 80, 255, 0.15) 0%, transparent 70%);
            animation: floatGlow 18s ease-in-out infinite alternate;
            pointer-events: none;
        }
        body.light .bg-layer::before {
            background: radial-gradient(ellipse, rgba(79, 70, 229, 0.08) 0%, transparent 70%);
        }
        .bg-layer::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(60, 140, 255, 0.12) 0%, transparent 70%);
            animation: floatGlow2 22s ease-in-out infinite alternate;
            pointer-events: none;
        }
        body.light .bg-layer::after {
            background: radial-gradient(ellipse, rgba(124, 58, 237, 0.06) 0%, transparent 70%);
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(8%, 12%) scale(1.3); opacity: 1; }
        }
        @keyframes floatGlow2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(-6%, -10%) scale(1.4); opacity: 1; }
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        body.light .bg-grid {
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
        }

        /* ============================================================
                   🧩 通用组件
                   ============================================================ */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(160, 130, 255, 0.4);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(160, 130, 255, 0.7);
        }

        /* ============================================================
                   🏷️ 顶部导航
                   ============================================================ */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-light);
            padding: 0.9rem 0;
            transition: background 0.3s, border-color 0.3s;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        nav h1 {
            margin: 0;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: var(--gradient-nav);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(100, 100, 255, 0.15);
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-box {
            padding: 10px 22px;
            border: 1px solid var(--input-border);
            border-radius: 40px;
            width: 200px;
            font-size: 0.95rem;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.35s;
            backdrop-filter: blur(4px);
        }
        .search-box::placeholder {
            color: var(--text-muted);
        }
        .search-box:focus {
            border-color: var(--input-focus);
            background: rgba(255, 255, 255, 0.10);
            box-shadow: 0 0 20px rgba(130, 100, 255, 0.08);
        }

        /* Google Translate 下拉菜单样式 */
        #google_translate_element {
            display: inline-block;
        }
        #google_translate_element .goog-te-combo {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
            appearance: auto;
            -webkit-appearance: auto;
            max-width: 150px;
        }
        #google_translate_element .goog-te-combo:hover {
            border-color: var(--input-focus);
        }
        body.light #google_translate_element .goog-te-combo {
            background: rgba(255, 255, 255, 0.7);
            color: #1a1a2e;
        }
        /* 隐藏 Google Translate 顶部横幅 */
        .goog-te-banner-frame {
            display: none !important;
        }
        body {
            top: 0 !important;
        }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
            line-height: 1;
        }
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--input-focus);
        }

        .categories {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cat-btn {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            border: 1px solid var(--border-light);
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }
        .cat-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }
        .cat-btn.active {
            background: var(--gradient-btn);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(109, 91, 255, 0.30);
        }

        /* ============================================================
                   🎯 Hero 区域
                   ============================================================ */
        #hero {
            text-align: center;
            padding: 4.5rem 1.5rem 3.5rem;
            position: relative;
        }
        #hero h2 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 60px rgba(100, 100, 255, 0.10);
        }
        #hero p {
            font-size: 1.15rem;
            color: var(--text-muted);
            max-width: 580px;
            margin: 0 auto;
            letter-spacing: 0.3px;
        }

        /* ============================================================
                   📰 文章列表
                   ============================================================ */
        .section-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 2.4rem 0 2rem;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            margin: 10px auto 0;
            background: var(--gradient-btn);
            border-radius: 10px;
        }

        .post-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .post-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
        }
        .post-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: var(--shadow-card-hover);
        }

        .post-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.5s ease;
            border-bottom: 1px solid var(--border-light);
        }
        .post-card:hover img {
            transform: scale(1.03);
        }

        .post-info {
            padding: 1.6rem 1.8rem 1.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .post-info h3 {
            margin: 0 0 0.3rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            letter-spacing: 0.2px;
        }
        .post-info .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .post-info .meta .badge {
            padding: 0 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            border: 1px solid var(--border-light);
        }
        .post-info .meta .badge.tech {
            background: var(--badge-tech);
            color: var(--badge-tech-color);
            border-color: var(--badge-tech);
        }
        .post-info .meta .badge.life {
            background: var(--badge-life);
            color: var(--badge-life-color);
            border-color: var(--badge-life);
        }
        .post-info .meta .badge.career {
            background: var(--badge-career);
            color: var(--badge-career-color);
            border-color: var(--badge-career);
        }

        .post-info p {
            margin: 0.4rem 0 1rem;
            color: var(--text-secondary);
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .post-info .btn-read {
            background: var(--gradient-btn);
            color: #fff;
            border: none;
            padding: 0.65rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.35s;
            align-self: flex-start;
            margin-top: 6px;
            box-shadow: 0 4px 16px rgba(109, 91, 255, 0.20);
            letter-spacing: 0.3px;
        }
        .post-info .btn-read:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(109, 91, 255, 0.35);
            background: linear-gradient(135deg, #7c6bff, #9b6cf6);
        }

        /* ============================================================
                   📄 文章详情页
                   ============================================================ */
        #post-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 24px;
        }

        .post-content {
            display: none;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.8rem 3rem;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
        }
        .post-content.active {
            display: block;
            animation: fadeSlide 0.5s ease;
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .post-content h1 {
            font-size: 2.2rem;
            margin-top: 0;
            color: var(--text-primary);
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .post-content h2 {
            font-size: 1.4rem;
            margin: 1.8rem 0 0.8rem;
            color: #c4b5fd;
            border-left: 4px solid #818cf8;
            padding-left: 1rem;
            font-weight: 600;
        }
        body.light .post-content h2 {
            color: #4f46e5;
            border-left-color: #4f46e5;
        }
        .post-content h3 {
            font-size: 1.1rem;
            margin: 1.4rem 0 0.4rem;
            color: var(--text-primary);
            font-weight: 600;
        }
        .post-content p {
            margin: 0.8rem 0;
            color: var(--text-secondary);
            line-height: 1.9;
        }
        .post-content ul, .post-content ol {
            margin: 0.6rem 0 1rem 1.8rem;
            color: var(--text-secondary);
        }
        .post-content li { margin: 0.3rem 0; }
        .post-content blockquote {
            border-left: 4px solid #818cf8;
            padding: 0.5rem 1.5rem;
            margin: 1rem 0;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 0 12px 12px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .post-content .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin: 1.8rem 0;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.40);
            background: #000;
        }
        .post-content .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .post-content .back-btn {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            border: 1px solid var(--border-light);
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
        }
        .post-content .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            transform: translateX(-4px);
        }

        .post-content .video-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: -0.3rem;
            margin-bottom: 0.3rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .post-content .video-label::before {
            content: '▶';
            color: #818cf8;
        }
        .post-content .read-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 1rem 0;
        }

        .post-content a.download-link {
            display: inline-block;
            background: var(--gradient-btn);
            color: #fff;
            padding: 0.5rem 1.4rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            margin: 0.5rem 0;
            font-size: 0.9rem;
            box-shadow: 0 4px 16px rgba(109, 91, 255, 0.20);
        }
        .post-content a.download-link:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(109, 91, 255, 0.30);
        }

        .post-content a.sub-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.06);
            color: #c4b5fd;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.3s;
            margin: 0.5rem 0;
            word-break: break-all;
            border: 1px solid var(--border-light);
        }
        .post-content a.sub-link:hover {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(130, 100, 255, 0.3);
            transform: scale(1.02);
        }

        /* ============================================================
                   🦶 页脚 —— 联系方式 + 投稿邮箱
                   ============================================================ */
        footer {
            text-align: center;
            padding: 2.2rem 1rem 1.8rem;
            margin-top: 3rem;
            border-top: 1px solid var(--footer-border);
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }
        footer .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 0.5rem 0 0.8rem;
        }
        footer .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }
        footer .social-links a:hover {
            color: var(--text-primary);
        }
        footer .social-links a i {
            font-style: normal;
            font-weight: 700;
        }
        footer .social-links .github-icon {
            font-size: 1.2rem;
        }
        footer .email-line {
            margin: 0.2rem 0 0.8rem;
        }
        footer .email-line a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }
        footer .email-line a:hover {
            color: var(--text-primary);
        }
        footer p {
            margin: 0.3rem 0;
        }

        /* ============================================================
                   📱 响应式
                   ============================================================ */
        @media (max-width: 820px) {
            nav { flex-direction: column; align-items: stretch; gap: 12px; }
            nav h1 { text-align: center; }
            .nav-controls { justify-content: center; flex-wrap: wrap; }
            .search-box { width: 100%; }
            #google_translate_element .goog-te-combo { max-width: 100%; width: 100%; }
            .categories { justify-content: center; }
            #hero h2 { font-size: 2.2rem; }
            .post-list { grid-template-columns: 1fr; }
            .post-content { padding: 1.8rem 1.4rem; }
            .post-content h1 { font-size: 1.6rem; }
            .post-content .video-wrapper { margin: 1.2rem 0; }

                      <p>一个人旅行，不是孤独，而是一种深度的自我对话。2026 年春天，我独自去了丽江，在雪山与古镇之间，找回了一种久违的内心秩序。</p>
                      <h2>出发的理由</h2>
                      <p>过去一年，生活被工作和信息塞得满满当当。每天醒来第一件事是看手机，睡觉前最后一件事也是看手机。我发现自己越来越难专注，也越来越难听到内心的声音。</p>
                      <p>于是我订了一张去丽江的机票。没有攻略，没有计划，只是想去一个能让自己慢下来的地方。</p>
                      <h2>在古城里迷路</h2>
                      <p>丽江古城很小，但巷子很密。我故意关掉了手机导航，任由脚步把自己带到任何地方。我路过一家卖手工银饰的小店，老板娘在门口晒太阳；我坐在一座小桥上，看流水和柳树发呆；我在一个不知名的咖啡馆里写了一下午日记。</p>
                      <p><strong>迷路的意义，不是找到正确的路，而是享受走错路的过程。</strong></p>
                      <h2>雪山下的顿悟</h2>
                      <p>在玉龙雪山脚下，我遇到了一位独自旅行的老人。他告诉我，他已经连续十年每年都来丽江住一个月。"不是为了看风景，"他说，"是为了看自己。"</p>
                      <p>这句话让我想了很久。旅行真正的意义，或许不是去更多的地方，而是在每个地方都能安住当下，看清自己内心真正想要的是什么。</p>
                      <h2>回来之后</h2>
                      <p>回到城市后，我并没有 "焕然一新"。但我学会了每天留出 30 分钟给自己，不刷手机，不处理消息，只是安静地坐着或写点什么。</p>
                      <p>一个人旅行的意义，不在于走了多远，而在于有没有把 "自己" 带回来。</p>`

                      <p>过去三个月，我同时使用了 Cursor 和 GitHub Copilot 两款 AI 编程助手，分别完成了三个中型项目。本文从代码质量、上下文理解、交互体验、学习曲线四个维度进行了深度对比。</p>
                      <h2>概览：两款工具的区别</h2>

                          <li><strong>Cursor：</strong> 基于 VS Code fork，但增加了更多 AI 功能（自然语言对话、代码库理解、一键重构），更像一个 "AI 原生编辑器"。</li>
                      </ul>
                      <h2>1. 代码质量</h2>
                      <p>两款工具的代码质量都很高，但在不同场景下各有优劣：</p>
                      <ul>
                          <li><strong>Copilot：</strong> 在 "单行补全" 和 "代码片段生成" 上非常精准，尤其在处理常见模式（CRUD、循环、条件判断）时几乎无需修改。</li>
                          <li><strong>Cursor：</strong> 在 "复杂重构" 和 "跨文件逻辑" 上更胜一筹。它能理解整个项目的上下文，生成更符合项目风格的代码。</li>
