<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窍某论坛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0e1a; color: #e8edf5; font-family: 'Segoe UI', sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        h1 { background: linear-gradient(135deg, #c4b5fd, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { background: linear-gradient(135deg, #6d5bff, #8b5cf6); color: #fff; border: none; padding: 6px 18px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; }
        .btn:hover { transform: scale(1.04); }
        .auth-section { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .hidden { display: none !important; }
        .post-card { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); }
        .post-card .title { font-size: 1.2rem; font-weight: 600; cursor: pointer; }
        .post-card .title:hover { color: #a5b4fc; }
        .post-card .meta { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin: 4px 0; }
        .post-card .excerpt { color: rgba(255,255,255,0.5); }
        .post-card .footer { display: flex; gap: 16px; margin-top: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.3); }
        .publish-form { display: none; background: rgba(255,255,255,0.04); padding: 16px; border-radius: 12px; margin: 12px 0; }
        .publish-form input, .publish-form textarea, .publish-form select { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #444; background: rgba(255,255,255,0.05); color: #fff; margin: 4px 0; font-family: inherit; font-size: 0.95rem; }
        .publish-form input:focus, .publish-form textarea:focus { outline: none; border-color: #6d5bff; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 999; }
        .modal.active { display: flex; }
        .modal-box { background: #1a1a2e; padding: 30px; border-radius: 16px; max-width: 400px; width: 90%; }
        .modal-box .close { float: right; font-size: 24px; cursor: pointer; color: #888; }
        .modal-box .close:hover { color: #fff; }
        .modal-box input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #444; background: rgba(255,255,255,0.05); color: #fff; margin: 6px 0; font-size: 0.95rem; }
        .modal-box input:focus { outline: none; border-color: #6d5bff; }
        .modal-tabs { display: flex; gap: 8px; border-bottom: 1px solid #333; margin-bottom: 16px; }
        .modal-tabs button { flex: 1; background: none; border: none; color: rgba(255,255,255,0.4); padding: 8px; cursor: pointer; border-bottom: 2px solid transparent; font-size: 0.95rem; }
        .modal-tabs button.active { color: #fff; border-bottom-color: #6d5bff; }
        .auth-form { display: none; flex-direction: column; gap: 12px; }
        .auth-form.active { display: flex; }
        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); }
        .empty-state .btn { margin-top: 12px; }
        footer { margin-top: 30px; padding: 16px; text-align: center; border-top: 1px solid rgba(255,255,255,0.04); color: rgba(255,255,255,0.2); font-size: 0.8rem; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); object-fit: cover; }
        .badge { padding: 2px 10px; border-radius: 30px; font-size: 0.65rem; background: rgba(255,255,255,0.06); }
        .badge.tech { background: rgba(96,165,250,0.15); color: #93bbfc; }
        .badge.life { background: rgba(52,211,153,0.12); color: #6ee7b7; }
        .badge.career { background: rgba(251,191,36,0.12); color: #fcd34d; }
        .badge.topic { background: rgba(251,191,36,0.15); color: #fcd34d; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a2e; padding: 12px 24px; border-radius: 8px; border: 1px solid #444; z-index: 1000; display: none; max-width: 90%; }
        .toast.show { display: block; animation: fadeIn 0.3s; }
        .toast.error { border-color: #ef4444; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @media (max-width: 640px) { .container { padding: 0; } header { flex-direction: column; align-items: stretch; } .auth-section { justify-content: center; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>✦ 窍某论坛</h1>
        <div class="auth-section">
            <button class="btn" id="loginBtn" onclick="openModal()">登录</button>
            <img id="userAvatar" class="user-avatar hidden" />
            <span id="userName" class="hidden" style="color:rgba(255,255,255,0.6);"></span>
            <button class="btn" id="logoutBtn" onclick="logout()" style="background:#444;display:none;">退出</button>
            <a id="adminLink" href="admin.html" style="color:rgba(255,255,255,0.5);text-decoration:none;display:none;">⚙️ 管理</a>
        </div>
    </header>

    <div style="margin-bottom:12px;">
        <button class="btn" onclick="togglePublish()">📝 发帖</button>
    </div>

    <div class="publish-form" id="publishForm">
        <input type="text" id="newTitle" maxlength="100" placeholder="标题" />
        <select id="newCategory">
            <option value="闲聊">💬 闲聊</option>
            <option value="tech">💻 科技</option>
            <option value="life">🌿 生活</option>
            <option value="career">💼 职场</option>
        </select>
        <textarea id="newContent" rows="4" placeholder="正文内容（支持HTML）"></textarea>
        <button class="btn" onclick="publishPost()">提交</button>
    </div>

    <div id="postList"><div class="empty-state">⏳ 加载中...</div></div>

    <!-- 登录模态框 -->
    <div class="modal" id="authModal">
        <div class="modal-box">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">欢迎回来</h2>
            <div class="modal-tabs">
                <button class="active" onclick="switchTab('login')">登录</button>
                <button onclick="switchTab('register')">注册</button>
            </div>
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <input type="email" id="loginEmail" placeholder="邮箱" required />
                <input type="password" id="loginPassword" placeholder="密码" required />
                <button type="submit" class="btn">登录</button>
            </form>
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <input type="text" id="regName" placeholder="昵称" maxlength="30" required />
                <input type="email" id="regEmail" placeholder="邮箱" required />
                <input type="password" id="regPassword" placeholder="密码（至少6位）" minlength="6" required />
                <button type="submit" class="btn">注册</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <footer>© 2026 窍某论坛</footer>
</div>

<script>
// =============================================================
// 配置
// =============================================================
const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrdnNjZWllemJ5ZXh6cXB2YmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDk1MzIsImV4cCI6MjA5OTI4NTUzMn0.1h4Yp8YaJdMMOQW8N2zqvJi6QrxHPncBFMK9LjdmZ6E';

// =============================================================
// 全局状态
// =============================================================
let currentUser = null;
let userProfile = null;
let postsCache = [];
let accessToken = null;

// =============================================================
// 工具函数
// =============================================================
function formatDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('zh-CN');
}

function getAvatarUrl(user) {
    if (user && user.avatar_url) return user.avatar_url;
    const name = user?.username || user?.email || 'U';
    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6d5bff&color=fff&size=32`;
}

function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(t._hide);
    t._hide = setTimeout(() => { t.className = 'toast'; }, 4000);
}

function getHeaders(includeAuth = true) {
    const headers = {
        'apikey': SUPABASE_ANON_KEY,
        'Content-Type': 'application/json'
    };
    if (includeAuth && accessToken) {
        headers['Authorization'] = 'Bearer ' + accessToken;
    }
    return headers;
}

async function handleResponse(res) {
    const text = await res.text();
    let json = null;
    try { json = JSON.parse(text); } catch(e) {}
    if (!res.ok) {
        console.error('HTTP Error:', res.status, res.statusText);
        console.error('Response body:', text);
        const msg = json?.error_description || json?.message || json?.error || text || '请求失败';
        throw new Error(msg);
    }
    return json || text;
}

// =============================================================
// API
// =============================================================
async function signIn(email, password) {
    const resp = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: getHeaders(false),
        body: JSON.stringify({ email, password })
    });
    return await handleResponse(resp);
}

async function signUp(email, password, username) {
    const resp = await fetch(SUPABASE_URL + '/auth/v1/signup', {
        method: 'POST',
        headers: getHeaders(false),
        body: JSON.stringify({ email, password, data: { username } })
    });
    return await handleResponse(resp);
}

async function getProfile(userId) {
    const resp = await fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId, {
        headers: getHeaders(true)
    });
    if (resp.status === 404) return null;
    const data = await handleResponse(resp);
    return data && data.length > 0 ? data[0] : null;
}

async function upsertProfile(data) {
    const resp = await fetch(SUPABASE_URL + '/rest/v1/profiles', {
        method: 'POST',
        headers: getHeaders(true),
        body: JSON.stringify(data)
    });
    return await handleResponse(resp);
}

async function fetchPosts() {
    const resp = await fetch(SUPABASE_URL + '/rest/v1/posts?order=created_at.desc', {
        headers: getHeaders(false)
    });
    return await handleResponse(resp);
}

async function createPost(data) {
    const resp = await fetch(SUPABASE_URL + '/rest/v1/posts', {
        method: 'POST',
        headers: getHeaders(true),
        body: JSON.stringify(data)
    });
    return await handleResponse(resp);
}

async function signOut() {
    if (!accessToken) return;
    try {
        await fetch(SUPABASE_URL + '/auth/v1/logout', {
            method: 'POST',
            headers: getHeaders(true)
        });
    } catch(e) {}
    accessToken = null;
    currentUser = null;
    userProfile = null;
    localStorage.removeItem('sb_token');
    localStorage.removeItem('sb_user');
}

// =============================================================
// 认证
// =============================================================
async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    if (!email || !pass) { showToast('请填写完整', true); return; }
    try {
        const data = await signIn(email, pass);
        accessToken = data.access_token;
        currentUser = data.user;
        localStorage.setItem('sb_token', accessToken);
        localStorage.setItem('sb_user', JSON.stringify(currentUser));
        userProfile = await getProfile(currentUser.id);
        closeModal();
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        showToast('登录成功！🎉');
        updateUI();
        loadPosts();
    } catch(err) {
        showToast('登录失败：' + err.message, true);
        console.error(err);
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    if (!name || !email || !pass) { showToast('请填写完整', true); return; }
    if (pass.length < 6) { showToast('密码至少6位', true); return; }
    try {
        const data = await signUp(email, pass, name);
        accessToken = data.access_token;
        currentUser = data.user;
        localStorage.setItem('sb_token', accessToken);
        localStorage.setItem('sb_user', JSON.stringify(currentUser));
        await upsertProfile({
            id: currentUser.id,
            username: name,
            email: email,
            is_admin: false
        });
        userProfile = { username: name, email: email, is_admin: false };
        showToast('注册成功！🎉');
        closeModal();
        updateUI();
        loadPosts();
    } catch(err) {
        showToast('注册失败：' + err.message, true);
        console.error(err);
    }
}

async function logout() {
    await signOut();
    updateUI();
    loadPosts();
    showToast('已退出');
}

// =============================================================
// UI
// =============================================================
function updateUI() {
    const loginBtn = document.getElementById('loginBtn');
    const avatar = document.getElementById('userAvatar');
    const nameEl = document.getElementById('userName');
    const logoutBtn = document.getElementById('logoutBtn');
    const adminLink = document.getElementById('adminLink');

    if (!currentUser && localStorage.getItem('sb_token')) {
        accessToken = localStorage.getItem('sb_token');
        try {
            currentUser = JSON.parse(localStorage.getItem('sb_user'));
        } catch(e) {}
    }

    if (currentUser && accessToken) {
        loginBtn.style.display = 'none';
        avatar.classList.remove('hidden');
        nameEl.classList.remove('hidden');
        logoutBtn.style.display = 'inline-block';
        avatar.src = getAvatarUrl(userProfile || currentUser);
        nameEl.textContent = userProfile?.username || currentUser.email;
        adminLink.style.display = userProfile?.is_admin ? 'inline-block' : 'none';
    } else {
        loginBtn.style.display = 'inline-block';
        avatar.classList.add('hidden');
        nameEl.classList.add('hidden');
        logoutBtn.style.display = 'none';
        adminLink.style.display = 'none';
    }
}

// =============================================================
// 帖子
// =============================================================
async function loadPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = '<div class="empty-state">⏳ 加载中...</div>';
    try {
        const data = await fetchPosts();
        postsCache = data || [];
        renderPosts(postsCache);
    } catch(err) {
        list.innerHTML = '<div class="empty-state">❌ ' + err.message + '<br><button class="btn" onclick="loadPosts()">🔄 重试</button></div>';
        console.error(err);
    }
}

function renderPosts(posts) {
    const list = document.getElementById('postList');
    if (!posts || posts.length === 0) {
        list.innerHTML = '<div class="empty-state">📭 还没有帖子，来发第一篇吧！</div>';
        return;
    }
    const catMap = { tech: '科技', life: '生活', career: '职场', '闲聊': '闲聊' };
    list.innerHTML = posts.map(p => {
        const badgeClass = ['tech','life','career','闲聊'].includes(p.category) ? 'badge ' + p.category : 'badge topic';
        const badgeText = catMap[p.category] || p.category || '闲聊';
        const avatar = p.author_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.author_name||'U')}&background=6d5bff&color=fff&size=30`;
        return `
            <div class="post-card">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span class="title" onclick="viewPost('${p.id}')">${p.title}</span>
                    <span class="${badgeClass}">${badgeText}</span>
                </div>
                <div class="meta">👤 ${p.author_name || '匿名'} · ${formatDate(p.created_at)}</div>
                <div class="excerpt">${p.content ? p.content.replace(/<[^>]+>/g,'').slice(0,120) : ''}</div>
                <div class="footer">
                    <span>❤️ ${p.likes || 0}</span>
                    <span>💬 ${p.comment_count || 0}</span>
                    <span>👁️ ${p.views || 0}</span>
                </div>
            </div>
        `;
    }).join('');
}

function viewPost(postId) {
    const post = postsCache.find(p => p.id === postId);
    if (!post) { showToast('帖子不存在', true); return; }
    alert('📄 ' + post.title + '\n\n' + (post.content || '') + '\n\n作者：' + (post.author_name || '匿名') + '\n发布于：' + formatDate(post.created_at));
}

// =============================================================
// 发帖
// =============================================================
function togglePublish() {
    const form = document.getElementById('publishForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function publishPost() {
    if (!currentUser || !accessToken) { showToast('请先登录', true); return; }
    const title = document.getElementById('newTitle').value.trim();
    const content = document.getElementById('newContent').value.trim();
    const category = document.getElementById('newCategory').value;
    if (!title || !content) { showToast('请填写标题和内容', true); return; }
    try {
        const avatar = userProfile?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.email)}&background=6d5bff&color=fff&size=100`;
        await createPost({
            title, content, category,
            author_id: currentUser.id,
            author_name: currentUser.email,
            author_avatar: avatar,
            likes: 0, views: 0
        });
        showToast('发帖成功！🎉');
        document.getElementById('newTitle').value = '';
        document.getElementById('newContent').value = '';
        document.getElementById('publishForm').style.display = 'none';
        loadPosts();
    } catch(err) {
        showToast('发帖失败：' + err.message, true);
        console.error(err);
    }
}

// =============================================================
// 模态框
// =============================================================
function openModal() {
    document.getElementById('authModal').classList.add('active');
}
function closeModal() {
    document.getElementById('authModal').classList.remove('active');
}
document.getElementById('authModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

function switchTab(tab) {
    document.querySelectorAll('.modal-tabs button').forEach(b => b.classList.toggle('active', b.textContent.trim() === (tab === 'login' ? '登录' : '注册')));
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    document.getElementById('modalTitle').textContent = tab === 'login' ? '欢迎回来' : '创建账号';
}

// =============================================================
// 初始化
// =============================================================
function init() {
    const token = localStorage.getItem('sb_token');
    const userStr = localStorage.getItem('sb_user');
    if (token && userStr) {
        accessToken = token;
        try { currentUser = JSON.parse(userStr); } catch(e) {}
    }
    if (currentUser && accessToken) {
        getProfile(currentUser.id).then(profile => {
            userProfile = profile;
            updateUI();
            loadPosts();
        }).catch(() => { updateUI(); loadPosts(); });
    } else {
        updateUI();
        loadPosts();
    }
}

// 暴露全局
window.openModal = openModal;
window.closeModal = closeModal;
window.switchTab = switchTab;
window.handleLogin = handleLogin;
window.handleRegister = handleRegister;
window.logout = logout;
window.togglePublish = togglePublish;
window.publishPost = publishPost;
window.viewPost = viewPost;
window.loadPosts = loadPosts;

init();
</script>
</body>
</html>
