<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>窍某论坛</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== 完整样式 ===== */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0b0e1a;color:#e8edf5;font-family:'Segoe UI',sans-serif;padding:20px;line-height:1.6;}
        .container{max-width:1200px;margin:0 auto;}
        header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
        h1{background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.8rem;}

        .search-box{padding:8px 16px;border-radius:30px;border:1px solid #444;background:rgba(255,255,255,0.05);color:#fff;width:200px;}

        .logout-btn:hover{border-color:#ef4444;color:#ef4444;}
        .hidden{display:none!important;}
        #adminLink{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;border:1px solid rgba(255,255,255,0.1);padding:4px 12px;border-radius:20px;display:none;}
        #adminLink:hover{color:#fff;border-color:rgba(255,255,255,0.3);}
        .profile-link{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;margin-left:8px;cursor:pointer;}
        .forum-stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:rgba(255,255,255,0.03);border-radius:12px;}

    <script>
        // =============================================================
        // 所有变量声明在最顶部（避免暂时性死区）
        // =============================================================
        const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrdnNjZWllemJ5ZXh6cXB2YmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDk1MzIsImV4cCI6MjA5OTI4NTUzMn0.1h4Yp8YaJdMMOQW8N2zqvJi6QrxHPncBFMK9LjdmZ6E';
        const sb = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let userProfile = null;
        let accessToken = null;
        let postsCache = [];
        let topicsCache = [];
        let currentCategory = 'all';
        let isSubmitting = false;
        let isAdmin = false;

        // =============================================================
        // 工具函数（全部使用上述变量）
        // =============================================================
        function formatDate(d) {
            if (!d) return '';
            return new Date(d).toLocaleDateString('zh-CN');
        }
        function formatTime(d) {
            if (!d) return '';
            return new Date(d).toLocaleString('zh-CN');
        }
        function getAvatarUrl(user) {
            if (user && user.avatar_url) return user.avatar_url;
            const name = user?.username || user?.email || 'U';
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6d5bff&color=fff&size=100`;
        }
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            clearTimeout(t._hide);
            t._hide = setTimeout(() => { t.className = 'toast'; }, 4000);
        }

        function getHeaders(includeAuth = true) {
            const headers = {
                'apikey': SUPABASE_ANON_KEY,
                'Content-Type': 'application/json'
            };
            if (includeAuth && accessToken) {
                headers['Authorization'] = 'Bearer ' + accessToken;
            }
            return headers;
        }

        async function handleResponse(res) {
            const text = await res.text();
            let json = null;
            try { json = JSON.parse(text); } catch(e) {}
            if (!res.ok) {
                console.error('HTTP Error:', res.status, res.statusText);
                console.error('Response body:', text);
                const msg = json?.error_description || json?.message || json?.error || text || '请求失败';
                throw new Error(msg);
            }
            return json || text;
        }

        // =============================================================
        // API 调用
        // =============================================================
        async function signIn(email, password) {
            const resp = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
                method: 'POST',
                headers: getHeaders(false),
                body: JSON.stringify({ email, password })
            });
            return await handleResponse(resp);
        }

        async function signUp(email, password, username) {
            const resp = await fetch(SUPABASE_URL + '/auth/v1/signup', {
                method: 'POST',
                headers: getHeaders(false),
                body: JSON.stringify({ email, password, data: { username } })
            });
            return await handleResponse(resp);
        }

        async function getProfile(userId) {
            const resp = await fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId, {
                headers: getHeaders(true)
            });
            if (resp.status === 404) return null;

        // =============================================================
        // 点赞核心（修复版）
        // =============================================================
        async function toggleLike(postId, userId) {
            const numericPostId = parseInt(postId);
            const userIdStr = String(userId);

            try {
                const checkUrl = `${SUPABASE_URL}/rest/v1/likes?post_id=eq.${numericPostId}&user_id=eq.${userIdStr}`;
                const checkResp = await fetch(checkUrl, { headers: getHeaders(true) });
                let existing = [];
                try {
                    existing = await checkResp.json();
                } catch (e) {
                    existing = [];
                }

                if (existing && existing.length > 0) {
                    const deleteUrl = `${SUPABASE_URL}/rest/v1/likes?id=eq.${existing[0].id}`;
                    const deleteResp = await fetch(deleteUrl, { method: 'DELETE', headers: getHeaders(true) });
                    if (deleteResp.ok) {
                        return 'unliked';
                    } else {
                        throw new Error(`取消点赞失败 (HTTP ${deleteResp.status})`);
                    }
                }

                const insertResp = await fetch(`${SUPABASE_URL}/rest/v1/likes`, {
                    method: 'POST',
                    headers: getHeaders(true),
                    body: JSON.stringify({ post_id: numericPostId, user_id: userIdStr })
                });
                if (insertResp.status === 201 || insertResp.status === 200) {
                    return 'liked';
                }
                if (insertResp.status === 409) {
                    console.warn('检测到冲突，执行强制切换...');
                    await fetch(`${SUPABASE_URL}/rest/v1/likes?post_id=eq.${numericPostId}&user_id=eq.${userIdStr}`, {
                        method: 'DELETE',
                        headers: getHeaders(true)
                    });
                    const retryResp = await fetch(`${SUPABASE_URL}/rest/v1/likes`, {
                        method: 'POST',
                        headers: getHeaders(true),
                        body: JSON.stringify({ post_id: numericPostId, user_id: userIdStr })
                    });
                    if (retryResp.status === 201 || retryResp.status === 200) {
                        return 'liked';
                    } else {
                        throw new Error(`强制切换失败 (HTTP ${retryResp.status})`);
                    }
                }
                const text = await insertResp.text();
                throw new Error(`点赞失败: ${insertResp.status} - ${text}`);
            } catch (error) {
                console.error('toggleLike 错误:', error);
                throw error;
            }
        }

        // =============================================================
        // 点赞处理
        // =============================================================
        async function handleLike(postId) {
            if (!currentUser) {
                showToast('请先登录', true);
                return;
            }
            try {
                const result = await toggleLike(postId, currentUser.id);
                const numericId = parseInt(postId);
                const post = postsCache.find(p => parseInt(p.id) === numericId);
                if (post) {
                    if (result === 'liked') {
                        post.likes = (post.likes || 0) + 1;
                    } else {
                        post.likes = Math.max((post.likes || 0) - 1, 0);
                    }
                }
                const keyword = document.getElementById('searchInput').value.trim();
                const filtered = getFilteredPosts(currentCategory, keyword);
                renderPosts(filtered);
                renderHotList(postsCache);
                const detailArea = document.getElementById('detailArea');
                if (!detailArea.classList.contains('hidden')) {
                    await showPost(postId);
                }
                showToast(result === 'liked' ? '❤️ 点赞成功！' : '已取消点赞');
            } catch (err) {
                showToast('操作失败：' + err.message, true);
                console.error(err);
            }
        }

        // =============================================================
        // 帖子列表
        // =============================================================
        function getFilteredPosts(category, keyword = '') {
            let filtered = postsCache;
            if (category !== 'all') filtered = filtered.filter(p => p.category === category);
            if (keyword) {
                const kw = keyword.toLowerCase();
                filtered = filtered.filter(p =>
                    p.title.toLowerCase().includes(kw) ||
                    (p.excerpt && p.excerpt.toLowerCase().includes(kw)) ||
                    (p.content && p.content.toLowerCase().includes(kw))
                );
            }
            return filtered;
        }

            const list = document.getElementById('postList');
            list.innerHTML = '<div class="empty-state">⏳ 加载中...</div>';
            try {
                const data = await fetchPosts();
                postsCache = data || [];
                const filtered = getFilteredPosts(category, keyword);
                renderPosts(filtered);
                renderHotList(postsCache);
                updateStats();
            } catch (err) {
                list.innerHTML = `
                    <div class="empty-state">
                        ❌ ${err.message}
                        <br>
                        <button class="btn" onclick="loadPosts('${category}')">🔄 重试</button>

        function renderPosts(posts) {
            const list = document.getElementById('postList');
            if (!posts || posts.length === 0) {
                list.innerHTML = '<div class="empty-state"><h3>📭 还没有帖子</h3><p style="color:rgba(255,255,255,0.3);">登录后点击「发帖」开始讨论！</p></div>';
                return;
            }
            const catMap = { tech: '科技', life: '生活', career: '职场', '闲聊': '闲聊' };
            list.innerHTML = posts.map(p => {
                const badgeClass = ['tech','life','career','闲聊'].includes(p.category) ? 'badge ' + p.category : 'badge topic';
                const badgeText = catMap[p.category] || p.category || '闲聊';
                const avatar = p.author_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.author_name||'U')}&background=6d5bff&color=fff&size=30`;
                return `
                    <div class="post-card">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;">
                            <span class="post-title" onclick="showPost('${p.id}')">${p.title}</span>
                            <span class="${badgeClass}" style="flex-shrink:0;margin-top:2px;">${badgeText}</span>
                        </div>
                        <div class="post-meta">
                            <img class="author-avatar" src="${avatar}" alt="${p.author_name||'用户'}" />
                            <span class="author">${p.author_name || '匿名'}</span>
                            <span>· ${formatDate(p.created_at)}</span>
                        </div>
                        <div class="post-excerpt">${p.excerpt || (p.content ? p.content.replace(/<[^>]+>/g,'').slice(0,80)+'...' : '')}</div>
                        <div class="post-footer">
                            <span class="like-btn" onclick="handleLike('${p.id}')" id="like-btn-${p.id}">❤️ <span id="like-count-${p.id}">${p.likes || 0}</span></span>
                            <span>💬 ${p.comment_count || 0}</span>
                            <span>👁️ ${p.views || 0}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderHotList(posts) {
            const container = document.getElementById('hotContent');
            if (!container) return;
            const sorted = [...posts].sort((a,b) => (b.likes||0) - (a.likes||0));
            const top = sorted.slice(0,5);
            if (!top.length) {
                container.innerHTML = '<p style="color:rgba(255,255,255,0.2);font-size:0.9rem;">暂无帖子</p>';
                return;
            }
            container.innerHTML = top.map((p, i) => {
                const emoji = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
                return `<div class="hot-item"><a href="#" onclick="showPost('${p.id}');return false;"><span><span class="hot-num">${emoji}</span> ${p.title}</span><span>❤️ ${p.likes||0}</span></a></div>`;
            }).join('');
        }

                    <div id="commentsArea"><p style="color:rgba(255,255,255,0.3);">加载中...</p></div>
                    ${currentUser ? `
                        <div style="margin-top:16px;">

                            <button class="btn" onclick="publishComment('${post.id}')" id="commentSubmitBtn" style="margin-top:8px;">发表回复</button>
                        </div>
                    ` : '<p style="color:rgba(255,255,255,0.3);margin-top:12px;">登录后即可回复</p>'}
                </div>
            `;
            try {
                const comments = await fetchComments(post.id);
                const areaC = document.getElementById('commentsArea');
                const replyCount = document.getElementById('reply-count');
                if (!comments || comments.length === 0) {
                    areaC.innerHTML = '<p style="color:rgba(255,255,255,0.3);">还没有回复，来抢沙发！</p>';
                    if (replyCount) replyCount.textContent = '0';
                } else {

                        const ava = c.user_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(c.username||'U')}&background=6d5bff&color=fff&size=28`;
                        html += `<div class="reply-item">

                                        <span class="reply-author">${c.username || '用户'}</span>
                                        <span class="reply-time">${formatTime(c.created_at)}</span>
                                    </div>
                                    <div class="reply-content">${c.content}</div>
                                </div>`;

        // =============================================================
        function togglePublish() {
            const form = document.getElementById('publishForm');

        async function publishPost() {
            if (isSubmitting) { showToast('请勿重复提交', true); return; }
            if (!currentUser) { showToast('请先登录', true); return; }
            const title = document.getElementById('newTitle').value.trim();
            const content = document.getElementById('newContent').value.trim();
            const excerpt = document.getElementById('newExcerpt').value.trim();
            const category = document.getElementById('newCategory').value;
            if (!title || !content) { showToast('请填写标题和内容', true); return; }
            if (title.length > 100) { showToast('标题不能超过100字符', true); return; }
            if (content.length > 50000) { showToast('正文过长', true); return; }

            isSubmitting = true;
            const btn = document.getElementById('publishBtn');
            if (btn) btn.disabled = true;

            try {
                const avatar = userProfile?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.email)}&background=6d5bff&color=fff&size=100`;
                await createPost({
                    title, content, excerpt, category,
                    author_id: currentUser.id,
                    author_name: currentUser.email,
                    author_avatar: avatar,
                    likes: 0, views: 0
                });
                showToast('发帖成功！🎉');
                document.getElementById('newTitle').value = '';
                document.getElementById('newContent').value = '';
                document.getElementById('newExcerpt').value = '';
                document.getElementById('publishForm').style.display = 'none';
                await loadPosts(currentCategory);
            } catch(err) {
                showToast('发帖失败：' + err.message, true);
            } finally {
                isSubmitting = false;
                if (btn) btn.disabled = false;
            }
        }

        // =============================================================
        // 评论
        // =============================================================
        async function publishComment(postId) {
            if (isSubmitting) { showToast('请勿重复提交', true); return; }
            const input = document.getElementById('commentInput');
            if (!input) return;
            const content = input.value.trim();
            if (!content) { showToast('请输入回复内容', true); return; }
            if (content.length > 2000) { showToast('回复不能超过2000字符', true); return; }
            if (!currentUser) { showToast('请先登录', true); return; }

            isSubmitting = true;
            const btn = document.getElementById('commentSubmitBtn');
            if (btn) btn.disabled = true;

            try {
                await createComment({
                    post_id: parseInt(postId),
                    user_id: currentUser.id,
                    username: currentUser.email,
                    user_avatar: userProfile?.avatar_url || null,
                    content
                });
                input.value = '';
                showToast('回复成功！');
                await showPost(postId);
            } catch(err) {
                showToast('回复失败：' + err.message, true);
            } finally {
                isSubmitting = false;
                if (btn) btn.disabled = false;
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.modal-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.getElementById('modalTitle').textContent = tab === 'login' ? '欢迎回来' : '创建账号';
            document.getElementById('modalSub').textContent = tab === 'login' ? '登录你的账号' : '加入窍某论坛';
        }

        // =============================================================
        // 认证
        // =============================================================
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            if (!email || !pass) { showToast('请填写完整', true); return; }
            try {
                const data = await signIn(email, pass);
                accessToken = data.access_token;
                currentUser = data.user;
                localStorage.setItem('sb_token', accessToken);
                localStorage.setItem('sb_user', JSON.stringify(currentUser));
                userProfile = await getProfile(currentUser.id);
                closeModal();
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                showToast('登录成功！🎉');
                updateUI();
                loadPosts();
            } catch(err) {
                showToast('登录失败：' + err.message, true);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (!name || !email || !pass || !confirm) { showToast('请填写完整', true); return; }
            if (pass !== confirm) { showToast('密码不一致', true); return; }
            if (pass.length < 6) { showToast('密码至少6位', true); return; }
            if (name.length > 30) { showToast('昵称过长', true); return; }
            try {
                const data = await signUp(email, pass, name);
                accessToken = data.access_token;
                currentUser = data.user;
                localStorage.setItem('sb_token', accessToken);
                localStorage.setItem('sb_user', JSON.stringify(currentUser));
                await upsertProfile({
                    id: currentUser.id,
                    username: name,
                    email: email,
                    is_admin: false
                });
                userProfile = { username: name, email: email, is_admin: false };
                showToast('注册成功！🎉');
                closeModal();
                updateUI();
                loadPosts();
            } catch(err) {
                showToast('注册失败：' + err.message, true);
            }
        }

        async function handleSocialLogin(provider) {
            if (!sb) {
                showToast('客户端未初始化', true);
                return;
            }
            try {
                const { data, error } = await sb.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: window.location.origin
                    }
                });
                if (error) throw error;
            } catch (error) {
                showToast('登录失败：' + error.message, true);
            }
        }

        async function logout() {
            await sb.auth.signOut();
            accessToken = null;
            currentUser = null;
            userProfile = null;
            localStorage.removeItem('sb_token');
            localStorage.removeItem('sb_user');
            updateUI();
            loadPosts();
            showToast('已退出');
        }

        // =============================================================
        // UI 更新
        // =============================================================
        function updateUI() {
            const loginBtn = document.getElementById('loginBtn');
            const avatar = document.getElementById('userAvatar');
            const nameEl = document.getElementById('userName');
            const logoutBtn = document.getElementById('logoutBtn');
            const adminLink = document.getElementById('adminLink');
            const profileLink = document.getElementById('profileLink');

            if (currentUser && accessToken) {
                loginBtn.style.display = 'none';
                avatar.classList.remove('hidden');
                nameEl.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                profileLink.classList.remove('hidden');
                avatar.src = getAvatarUrl(userProfile || currentUser);
                nameEl.textContent = userProfile?.username || currentUser.email;
                if (userProfile?.is_admin) {
                    adminLink.style.display = 'inline-block';
                    isAdmin = true;
                } else {
                    adminLink.style.display = 'none';
                    isAdmin = false;
                }
            } else {
                loginBtn.style.display = 'inline-block';
                avatar.classList.add('hidden');
                nameEl.classList.add('hidden');
                logoutBtn.classList.add('hidden');
                adminLink.style.display = 'none';
                profileLink.classList.add('hidden');
                isAdmin = false;
            }
        }

        // =============================================================
        // 初始化（确保 accessToken 在使用前已赋值）
        // =============================================================
        async function init() {
            // 优先从 localStorage 恢复
            const token = localStorage.getItem('sb_token');
            const userStr = localStorage.getItem('sb_user');
            if (token && userStr) {
                accessToken = token;
                try { currentUser = JSON.parse(userStr); } catch(e) {}
            }

            // 从 Supabase 会话恢复（优先级更高）
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                currentUser = session.user;
                accessToken = session.access_token;
                localStorage.setItem('sb_token', accessToken);
                localStorage.setItem('sb_user', JSON.stringify(currentUser));
            }

            // 获取用户资料
            if (currentUser && accessToken) {
                try {
                    userProfile = await getProfile(currentUser.id);
                } catch(e) {}
            }

            // 监听认证状态变化
            sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    currentUser = session.user;
                    accessToken = session.access_token;
                    localStorage.setItem('sb_token', accessToken);
                    localStorage.setItem('sb_user', JSON.stringify(currentUser));
                    userProfile = await getProfile(currentUser.id);
                    updateUI();
                    loadPosts();
                } else if (event === 'SIGNED_OUT') {
                    currentUser = null;
                    accessToken = null;
                    userProfile = null;
                    localStorage.removeItem('sb_token');
                    localStorage.removeItem('sb_user');
                    updateUI();
                    loadPosts();
                }
                updateUI();
            });

            updateUI();
            await loadTopics();
            loadPosts('all', '');
        }

        // =============================================================
        // 暴露全局函数（确保 onclick 能访问）
        // =============================================================
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.handleSocialLogin = handleSocialLogin;
        window.logout = logout;
        window.setCategory = setCategory;
        window.searchPosts = searchPosts;
        window.showPost = showPost;
        window.backToList = backToList;
        window.togglePublish = togglePublish;
        window.publishPost = publishPost;
        window.publishComment = publishComment;
        window.handleLike = handleLike;
        window.openNewTopic = openNewTopic;
        window.closeTopicModal = closeTopicModal;
        window.createTopic = createTopic;
        window.toggleTheme = toggleTheme;
        window.openProfile = openProfile;
        window.closeProfile = closeProfile;
        window.uploadAvatar = uploadAvatar;
        window.saveProfile = saveProfile;
        window.loadPosts = loadPosts;

        // 启动
        init();
    </script>
</body>
</html>
