<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窍某论坛</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0b0e1a;color:#e8edf5;font-family:'Segoe UI',sans-serif;padding:20px;line-height:1.6;}
        .container{max-width:1200px;margin:0 auto;}
        header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
        h1{background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.8rem;margin:0;}
        .nav-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
        .search-box{padding:8px 16px;border-radius:30px;border:1px solid #444;background:rgba(255,255,255,0.05);color:#fff;width:200px;}
        .btn{background:linear-gradient(135deg,#6d5bff,#8b5cf6);color:#fff;border:none;padding:6px 18px;border-radius:30px;cursor:pointer;font-size:0.9rem;}
        .btn-outline{background:transparent;border:1px solid #444;}
        .btn-outline:hover{background:rgba(255,255,255,0.05);}
        .auth-section{display:flex;align-items:center;gap:8px;}
        .user-avatar{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);object-fit:cover;}
        .user-name{color:rgba(255,255,255,0.6);}
        .logout-btn{background:transparent;border:1px solid #444;color:rgba(255,255,255,0.4);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.75rem;}
        .logout-btn:hover{border-color:#ef4444;color:#ef4444;}
        .hidden{display:none!important;}
        #adminLink{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;border:1px solid rgba(255,255,255,0.1);padding:4px 12px;border-radius:20px;display:none;}
        #adminLink:hover{color:#fff;border-color:rgba(255,255,255,0.3);}
        .profile-link{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;margin-left:8px;cursor:pointer;}

        .forum-stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:rgba(255,255,255,0.03);border-radius:12px;}
        .forum-stats span{color:rgba(255,255,255,0.5);font-size:0.85rem;}

        .main-layout{display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap;}

        .post-card{background:rgba(255,255,255,0.03);border-radius:12px;padding:16px 20px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.05);transition:0.3s;}

        .post-card .badge.tech{background:rgba(96,165,250,0.15);color:#93bbfc;}
        .post-card .badge.life{background:rgba(52,211,153,0.12);color:#6ee7b7;}

        .post-card .badge.topic{background:rgba(251,191,36,0.15);color:#fcd34d;}

        .post-content .back-btn{background:rgba(255,255,255,0.06);border:1px solid #444;color:#e8edf5;padding:6px 16px;border-radius:30px;cursor:pointer;margin-bottom:16px;}
        .post-content .post-author-info{display:flex;align-items:center;gap:12px;margin:8px 0;}

        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:999;}

        .auth-form{display:none;flex-direction:column;gap:12px;}

        .google-btn{background:#fff;color:#333;}

    </style>
</head>

<script>
// =============================================================
// 🔥 Supabase 配置（替换成你的）
// =============================================================
const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';  // 你的 Project URL
const SUPABASE_ANON_KEY = 'sb_publishable_7zn5_p-Iw0u5WTov1qqlTw_Cz5YSD4s';  // 你的可发布密钥

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =============================================================
// 状态
// =============================================================
let postsCache = [];
let currentCategory = 'all';
let currentUser = null;
let userProfile = null;
let topicsCache = [];
let isSubmitting = false;
let lastSubmitTime = 0;
let isAdmin = false;

// =============================================================
// 工具函数
// =============================================================
function formatDate(date) {
    if (!date) return '';
    const d = new Date(date);
    return d.toLocaleDateString('zh-CN');
}
function formatTime(date) {
    if (!date) return '';
    const d = new Date(date);
    return d.toLocaleString('zh-CN');
}
function getAvatarUrl(user) {
    if (user && user.avatar_url) return user.avatar_url;
    const name = user?.username || user?.email || 'U';
    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6d5bff&color=fff&size=100`;
}

// =============================================================
// 数据操作
// =============================================================
async function loadPosts(category = 'all', keyword = '') {
    let query = supabase.from('posts').select('*, profiles(username, avatar_url)')
        .order('created_at', { ascending: false });

    if (category !== 'all') {
        query = query.eq('category', category);
    }

    const { data, error } = await query;
    if (error) {
        console.error('加载帖子失败:', error);
        postsCache = [];
    } else {
        postsCache = data || [];
        postsCache.forEach(p => {
            if (p.profiles) {
                p.author_name = p.profiles.username;
                p.author_avatar = p.profiles.avatar_url;
            }
        });
    }

    let filtered = postsCache;
    if (keyword) {
        const kw = keyword.toLowerCase();
        filtered = filtered.filter(p =>
            p.title.toLowerCase().includes(kw) ||
            (p.excerpt && p.excerpt.toLowerCase().includes(kw)) ||
            (p.content && p.content.toLowerCase().includes(kw))
        );
    }
    renderPostList(filtered);
    renderHotList(filtered);
    updateStats();
}

async function loadTopics() {
    const { data, error } = await supabase.from('topics').select('*').order('name', { ascending: true });
    if (error) {
        console.error('加载版块失败:', error);
        topicsCache = [];
    } else {
        topicsCache = data || [];
    }
    updateBoardNav();
    updateCategorySelect();
    document.getElementById('statTopics').textContent = topicsCache.length;
}

async function createTopic(name) {
    const { error } = await supabase.from('topics').insert({ name });
    if (error) throw error;
    await loadTopics();
}

async function deleteTopic(topicId) {
    const { error } = await supabase.from('topics').delete().eq('id', topicId);
    if (error) throw error;
    await loadTopics();
}

async function publishPost(title, content, excerpt, category) {
    if (!currentUser) throw new Error('请先登录');
    const avatar = userProfile?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.email)}&background=6d5bff&color=fff&size=100`;
    const { data, error } = await supabase.from('posts').insert({
        title,
        content,
        excerpt,
        category,
        author_id: currentUser.id,
        author_name: currentUser.email,
        author_avatar: avatar,
        views: 0,
        likes: 0
    }).select();
    if (error) throw error;
    return data;
}

async function deletePost(postId) {
    const { error } = await supabase.from('posts').delete().eq('id', postId);
    if (error) throw error;
}

async function publishComment(postId, content) {
    if (!currentUser) throw new Error('请先登录');
    const { error } = await supabase.from('comments').insert({
        post_id: postId,
        user_id: currentUser.id,
        username: currentUser.email,
        user_avatar: userProfile?.avatar_url || null,
        content
    });
    if (error) throw error;
}

async function loadComments(postId) {
    const { data, error } = await supabase.from('comments')
        .select('*')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });
    if (error) {
        console.error('加载评论失败:', error);
        return [];
    }
    return data || [];
}

async function deleteComment(commentId) {
    const { error } = await supabase.from('comments').delete().eq('id', commentId);
    if (error) throw error;
}

async function toggleLike(postId) {
    if (!currentUser) throw new Error('请先登录');
    const { data: existing, error: checkError } = await supabase
        .from('likes')
        .select('id')
        .eq('user_id', currentUser.id)
        .eq('post_id', postId)
        .maybeSingle();
    if (checkError) throw checkError;

    if (existing) {
        const { error } = await supabase.from('likes').delete().eq('id', existing.id);
        if (error) throw error;
        const post = postsCache.find(p => p.id === postId);
        if (post) {
            post.likes = Math.max((post.likes || 0) - 1, 0);
            await supabase.from('posts').update({ likes: post.likes }).eq('id', postId);
        }
    } else {
        const { error } = await supabase.from('likes').insert({
            user_id: currentUser.id,
            post_id: postId
        });
        if (error) throw error;
        const post = postsCache.find(p => p.id === postId);
        if (post) {
            post.likes = (post.likes || 0) + 1;
            await supabase.from('posts').update({ likes: post.likes }).eq('id', postId);
        }
    }
    await updateLikesUI();
    renderHotList(postsCache);
}

async function incrementView(postId) {
    const post = postsCache.find(p => p.id === postId);
    if (post) {
        post.views = (post.views || 0) + 1;
        await supabase.from('posts').update({ views: post.views }).eq('id', postId);
    }
}

function renderPostList(posts) {
    const list = document.getElementById('postList');
    if (!posts || posts.length === 0) {
        list.innerHTML = `<div class="empty-state"><h3>📭 还没有帖子</h3><p style="color:rgba(255,255,255,0.3);">登录后点击「发帖」开始讨论！</p></div>`;
        return;
    }
    const catMap = { tech: '科技', life: '生活', career: '职场' };
    list.innerHTML = posts.map(p => {
        const badgeClass = ['tech','life','career'].includes(p.category) ? `badge ${p.category}` : 'badge topic';
        const badgeText = catMap[p.category] || p.category;
        const avatar = p.author_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.author_name||'U')}&background=6d5bff&color=fff&size=30`;
        return `
            <div class="post-card">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;">
                    <span class="post-title" onclick="showPost('${p.id}')">${p.title}</span>
                    <span class="badge ${badgeClass}" style="flex-shrink:0;margin-top:2px;">${badgeText}</span>
                </div>
                <div class="post-meta">
                    <img class="author-avatar" src="${avatar}" alt="${p.author_name||'用户'}" />
                    <span class="author">${p.author_name || '匿名'}</span>
                    <span>· ${formatDate(p.created_at)}</span>
                </div>
                <div class="post-excerpt">${p.excerpt || (p.content ? p.content.replace(/<[^>]+>/g,'').slice(0,80)+'...' : '')}</div>
                <div class="post-footer">
                    <span class="like-btn" onclick="toggleLike('${p.id}')" id="like-btn-${p.id}">❤️ <span id="like-count-${p.id}">${p.likes || 0}</span></span>
                    <span>💬 ${p.comment_count || 0}</span>
                    <span>👁️ ${p.views || 0}</span>
                </div>
            </div>
        `;
    }).join('');
    updateLikesUI();
}

function renderHotList(posts) {
    const container = document.getElementById('hotContent');
    if (!container) return;
    const sorted = [...posts].sort((a,b) => (b.likes||0) - (a.likes||0));
    const top = sorted.slice(0,5);
    if (!top.length) {
        container.innerHTML = '<p style="color:rgba(255,255,255,0.2);font-size:0.9rem;">暂无帖子</p>';
        return;
    }
    let html = '';
    top.forEach((p, i) => {
        const emoji = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
        html += `<div class="hot-item"><a href="#" onclick="showPost('${p.id}');return false;"><span><span class="hot-num">${emoji}</span> ${p.title}</span><span>❤️ ${p.likes||0}</span></a></div>`;
    });
    container.innerHTML = html;
}

async function updateStats() {
    document.getElementById('statPosts').textContent = postsCache.length;
    const { count: commentCount, error: ce } = await supabase.from('comments').select('*', { count: 'exact', head: true });
    if (!ce) document.getElementById('statComments').textContent = commentCount;
    const { count: userCount, error: ue } = await supabase.from('profiles').select('*', { count: 'exact', head: true });
    if (!ue) document.getElementById('statUsers').textContent = userCount;
}

async function updateLikesUI() {
    if (!currentUser) {
        document.querySelectorAll('.like-btn').forEach(el => el.style.color = '');
        return;
    }
    const { data, error } = await supabase
        .from('likes')
        .select('post_id')
        .eq('user_id', currentUser.id);
    if (error) return;
    const likedIds = new Set(data.map(d => d.post_id));
    document.querySelectorAll('.like-btn').forEach(el => {
        const postId = el.id.replace('like-btn-', '').replace('-detail', '');
        el.style.color = likedIds.has(postId) ? '#ef4444' : '';
    });
}

function updateBoardNav() {
    const container = document.getElementById('dynamicBoards');
    if (!container) return;
    let html = '';
    topicsCache.forEach(t => {
        html += `<button class="board-btn" data-cat="${encodeURIComponent(t.name)}" onclick="setCategory('${encodeURIComponent(t.name)}')">🏷️ ${t.name}</button>`;

    container.innerHTML = html;
}

function updateCategorySelect() {
    const select = document.getElementById('newCategory');
    const fixed = ['tech','life','career'];
    const opts = select.querySelectorAll('option');
    opts.forEach(o => { if(!fixed.includes(o.value)) o.remove(); });
    topicsCache.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.name;
        opt.textContent = '🏷️ ' + t.name;
        select.appendChild(opt);
    });
}

async function showPost(postId) {
    const post = postsCache.find(p => p.id === postId);
    if (!post) { alert('帖子不存在'); return; }
    await incrementView(postId);

    document.getElementById('postList').style.display = 'none';
    const area = document.getElementById('detailArea');
    area.classList.remove('hidden');

    const avatar = post.author_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(post.author_name||'U')}&background=6d5bff&color=fff&size=40`;

    area.innerHTML = `
        <div class="post-content">
            <button class="back-btn" onclick="backToList()">← 返回列表</button>
            <h1 style="font-size:1.6rem;">${post.title}</h1>
            <div class="post-author-info">
                <img src="${avatar}" alt="${post.author_name||'用户'}" />
                <span class="author-name">${post.author_name || '匿名'}</span>
                <span class="post-time">${formatTime(post.created_at)}</span>
                <span style="margin-left:12px;">👁️ ${post.views || 0}</span>
            </div>
            <div class="post-body">${post.content}</div>
            <div class="post-actions">
                <span class="like-btn" onclick="toggleLike('${postId}')" id="like-btn-detail-${postId}">❤️ <span id="like-count-detail-${postId}">${post.likes || 0}</span></span>
                <span>💬 回复 <span id="reply-count">0</span></span>
            </div>
            <hr style="border-color:#333;margin:16px 0;" />
            <h3 style="margin-bottom:12px;">💬 全部回复</h3>
            <div id="commentsArea"><p style="color:rgba(255,255,255,0.3);">加载中...</p></div>
            ${currentUser ? `
                <div style="margin-top:16px;">
                    <textarea id="commentInput" rows="3" maxlength="2000" placeholder="写下你的回复..."></textarea>
                    <button class="btn" onclick="publishComment('${postId}')" id="commentSubmitBtn" style="margin-top:8px;">发表回复</button>
                </div>
            ` : '<p style="color:rgba(255,255,255,0.3);margin-top:12px;">登录后即可回复</p>'}
        </div>
    `;

    const comments = await loadComments(postId);
    const areaC = document.getElementById('commentsArea');
    const replyCount = document.getElementById('reply-count');
    if (!comments.length) {
        areaC.innerHTML = '<p style="color:rgba(255,255,255,0.3);">还没有回复，来抢沙发！</p>';
        if (replyCount) replyCount.textContent = '0';
    } else {
        let html = '';
        for (const c of comments) {
            const ava = c.user_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(c.username||'U')}&background=6d5bff&color=fff&size=28`;
            html += `<div class="reply-item">
                        <div class="reply-author-info">
                            <img src="${ava}" alt="${c.username||'用户'}" />
                            <span class="reply-author">${c.username || '用户'}</span>
                            <span class="reply-time">${formatTime(c.created_at)}</span>
                        </div>
                        <div class="reply-content">${c.content}</div>
                    </div>`;
        }
        areaC.innerHTML = html;
        if (replyCount) replyCount.textContent = comments.length;
    }
    updateLikesUI();
    window.scrollTo({ top: 0 });
}

function backToList() {
    document.getElementById('postList').style.display = 'block';

function togglePublish() {
    const form = document.getElementById('publishForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function publishPost() {
    if (isSubmitting) { alert('请勿重复提交'); return; }
    const now = Date.now();
    if (now - lastSubmitTime < 10000) { alert('操作频繁，请等待10秒'); return; }
    if (!currentUser) { alert('请先登录'); return; }
    const title = document.getElementById('newTitle').value.trim();
    const content = document.getElementById('newContent').value.trim();
    const excerpt = document.getElementById('newExcerpt').value.trim();
    const category = document.getElementById('newCategory').value;
    if (!title) { alert('请输入标题'); return; }
    if (title.length > 100) { alert('标题不能超过100字符'); return; }
    if (!content) { alert('请输入正文'); return; }
    if (content.length > 50000) { alert('正文过长'); return; }

    isSubmitting = true; lastSubmitTime = now;
    const btn = document.getElementById('publishBtn');
    if (btn) btn.disabled = true;

    try {
        await publishPost(title, content, excerpt, category);
        alert('发帖成功！🎉');
        document.getElementById('newTitle').value = '';
        document.getElementById('newContent').value = '';
        document.getElementById('newExcerpt').value = '';
        loadPosts(currentCategory);
    } catch(e) {
        alert('发帖失败：' + e.message);
    } finally {
        isSubmitting = false;
        if (btn) btn.disabled = false;
    }
}

async function publishComment(postId) {
    if (isSubmitting) { alert('请勿重复提交'); return; }
    const now = Date.now();
    if (now - lastSubmitTime < 5000) { alert('操作频繁，请等待5秒'); return; }
    const input = document.getElementById('commentInput');
    if (!input) return;
    const content = input.value.trim();
    if (!content) { alert('请输入回复内容'); return; }
    if (content.length > 2000) { alert('回复不能超过2000字符'); return; }
    if (!currentUser) { alert('请先登录'); return; }

    isSubmitting = true; lastSubmitTime = now;
    const btn = document.getElementById('commentSubmitBtn');
    if (btn) btn.disabled = true;

    try {
        await publishComment(postId, content);
        input.value = '';
        showPost(postId);
        alert('回复成功！');
    } catch(e) {
        alert('回复失败：' + e.message);
    } finally {
        isSubmitting = false;
        if (btn) btn.disabled = false;
    }
}

async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    if (!email || !pass) { alert('请填写完整'); return; }
    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;
        closeModal();
    } catch(err) { alert(err.message); }
}

async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    if (!name || !email || !pass || !confirm) { alert('请填写完整'); return; }
    if (pass !== confirm) { alert('密码不一致'); return; }
    if (pass.length < 6) { alert('密码至少6位'); return; }
    if (name.length > 30) { alert('昵称过长'); return; }
    try {
        const { data, error } = await supabase.auth.signUp({
            email,
            password: pass,
            options: { data: { username: name } }
        });
        if (error) throw error;
        if (data.user) {
            await supabase.from('profiles').insert({
                id: data.user.id,
                username: name,
                avatar_url: null
            });
        }
        alert('注册成功！请验证邮箱（如有要求）或直接登录');
        closeModal();
    } catch(err) { alert(err.message); }
}

async function handleSocialLogin(provider) {

    if (error) alert('登录失败：' + error.message);
}

async function uploadAvatar(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!currentUser) { alert('请先登录'); return; }
    if (file.size > 2 * 1024 * 1024) { alert('图片大小不能超过2MB'); return; }

    const msg = document.getElementById('profileMsg');
    msg.innerHTML = '<p style="color:rgba(255,255,255,0.5);">上传中...</p>';

    const fileExt = file.name.split('.').pop();
    const fileName = `${currentUser.id}.${fileExt}`;
    const { data, error: uploadError } = await supabase.storage
        .from('avatars')
        .upload(fileName, file, { upsert: true });
    if (uploadError) {
        msg.innerHTML = '<p style="color:#ef4444;">上传失败：' + uploadError.message + '</p>';
        return;
    }
    const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(fileName);
    const avatarUrl = urlData.publicUrl;

    const { error: updateError } = await supabase
        .from('profiles')
        .update({ avatar_url: avatarUrl })
        .eq('id', currentUser.id);
    if (updateError) {
        msg.innerHTML = '<p style="color:#ef4444;">更新失败：' + updateError.message + '</p>';
        return;
    }
    userProfile.avatar_url = avatarUrl;
    document.getElementById('profileAvatarPreview').src = avatarUrl;
    document.getElementById('userAvatar').src = avatarUrl;
    msg.innerHTML = '<p style="color:#6ee7b7;">✅ 头像上传成功！</p>';
}

async function saveProfile() {
    const newName = document.getElementById('profileNameInput').value.trim();
    const msg = document.getElementById('profileMsg');
    if (!newName) { msg.innerHTML = '<p style="color:#ef4444;">昵称不能为空</p>'; return; }
    if (newName.length > 30) { msg.innerHTML = '<p style="color:#ef4444;">昵称不能超过30字符</p>'; return; }
    try {
        const { error } = await supabase
            .from('profiles')
            .update({ username: newName })
            .eq('id', currentUser.id);
        if (error) throw error;
        userProfile.username = newName;
        document.getElementById('userName').textContent = newName;
        msg.innerHTML = '<p style="color:#6ee7b7;">✅ 昵称修改成功！</p>';
        loadPosts(currentCategory);
    } catch(e) {
        msg.innerHTML = '<p style="color:#ef4444;">修改失败：' + e.message + '</p>';
    }
}

window.onload = async function() {
    supabase.auth.onAuthStateChange(async (event, session) => {
        currentUser = session?.user || null;
        const loginBtn = document.getElementById('loginBtn');
        const avatar = document.getElementById('userAvatar');
        const nameEl = document.getElementById('userName');
        const logoutBtn = document.getElementById('logoutBtn');
        const adminLink = document.getElementById('adminLink');
        const profileLink = document.getElementById('profileLink');

        if (currentUser) {
            loginBtn.style.display = 'none';
            avatar.classList.remove('hidden');
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            if (!error && data) {
                userProfile = data;
                avatar.src = getAvatarUrl(data);
                nameEl.textContent = data.username || currentUser.email;
                isAdmin = data.is_admin || false;
            } else {
                userProfile = null;
                avatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.email)}&background=6d5bff&color=fff&size=36`;
                nameEl.textContent = currentUser.email;
                isAdmin = false;
            }
            nameEl.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            if (isAdmin) {
                adminLink.style.display = 'inline-block';
            } else {
                adminLink.style.display = 'none';
            }
            profileLink.classList.remove('hidden');
        } else {
            loginBtn.style.display = 'inline-block';
            avatar.classList.add('hidden');
            nameEl.classList.add('hidden');
            logoutBtn.classList.add('hidden');
            adminLink.style.display = 'none';
            profileLink.classList.add('hidden');
            userProfile = null;
            isAdmin = false;
        }
        loadPosts(currentCategory);
    });

    await loadTopics();
    loadPosts('all', '');
};
