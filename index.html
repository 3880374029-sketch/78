<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>窍某论坛</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{background:#0b0e1a;color:#e8edf5;font-family:sans-serif;padding:20px;max-width:900px;margin:0 auto;}
        button{background:#6d5bff;color:#fff;border:none;padding:6px 18px;border-radius:30px;cursor:pointer;margin:4px;}
        input,textarea{width:100%;padding:8px;border-radius:8px;border:1px solid #444;background:rgba(255,255,255,0.05);color:#fff;margin:4px 0;box-sizing:border-box;}
        .post{background:rgba(255,255,255,0.04);padding:12px;margin:8px 0;border-radius:8px;border:1px solid rgba(255,255,255,0.05);}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:999;}
        .modal.active{display:flex;}
        .modal-box{background:#1a1a2e;padding:30px;border-radius:16px;max-width:400px;width:100%;}
        .hidden{display:none;}
        .close{float:right;font-size:24px;cursor:pointer;color:#888;}
        .publish-form{background:rgba(255,255,255,0.03);padding:16px;border-radius:12px;margin:12px 0;}
        .stats{display:flex;gap:20px;padding:12px;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:12px;}
        .stats span{color:rgba(255,255,255,0.5);}
        .stats strong{color:#a5b4fc;}
        .board-btn{background:transparent;border:1px solid #444;color:rgba(255,255,255,0.6);padding:4px 16px;border-radius:20px;cursor:pointer;margin:2px;}
        .board-btn.active{background:#6d5bff;color:#fff;border-color:#6d5bff;}
    </style>
</head>
<body>

<h1>✦ 窍某论坛</h1>

<div class="stats">
    <span>📄 帖子：<strong id="statPosts">0</strong></span>
    <span>👤 用户：<strong id="statUsers">0</strong></span>
</div>

<div style="display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px;">
    <div>
        <button onclick="togglePublish()">📝 发帖</button>
        <button onclick="openModal()" id="loginBtn">登录</button>
        <span id="userInfo" class="hidden"></span>
        <button onclick="logout()" id="logoutBtn" class="hidden">退出</button>
    </div>
    <div class="board-nav" id="boardNav">
        <button class="board-btn active" onclick="setCategory('all')">全部</button>
        <button class="board-btn" onclick="setCategory('tech')">科技</button>
        <button class="board-btn" onclick="setCategory('life')">生活</button>
        <button class="board-btn" onclick="setCategory('career')">职场</button>
    </div>
</div>

<div id="publishForm" class="publish-form hidden">
    <input type="text" id="newTitle" placeholder="标题" />
    <textarea id="newContent" rows="4" placeholder="内容"></textarea>
    <button onclick="publishPost()">提交</button>
</div>

<div id="postList"></div>

<!-- 登录模态框 -->
<div class="modal" id="authModal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">欢迎回来</h2>
        <div style="display:flex;gap:8px;border-bottom:1px solid #333;margin-bottom:16px;">
            <button style="flex:1;background:none;border:none;color:#fff;padding:8px;cursor:pointer;border-bottom:2px solid #6d5bff;" onclick="switchTab('login')">登录</button>
            <button style="flex:1;background:none;border:none;color:rgba(255,255,255,0.4);padding:8px;cursor:pointer;" onclick="switchTab('register')">注册</button>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="email" id="loginEmail" placeholder="邮箱" required />
            <input type="password" id="loginPassword" placeholder="密码" required />
            <button type="submit" style="width:100%;">登录</button>
        </form>
        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <input type="text" id="regName" placeholder="昵称" required />
            <input type="email" id="regEmail" placeholder="邮箱" required />
            <input type="password" id="regPassword" placeholder="密码（至少6位）" minlength="6" required />
            <button type="submit" style="width:100%;">注册</button>
        </form>
    </div>
</div>

<script>
// =============================================================
// 配置
// =============================================================
const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrdnNjZWllemJ5ZXh6cXB2YmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDk1MzIsImV4cCI6MjA5OTI4NTUzMn0.1h4Yp8YaJdMMOQW8N2zqvJi6QrxHPncBFMK9LjdmZ6E';

// 全局客户端
const sb = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =============================================================
// 状态
// =============================================================
let currentUser = null;
let postsCache = [];
let currentCategory = 'all';

// =============================================================
// 模态框
// =============================================================
function openModal() {
    document.getElementById('authModal').classList.add('active');
}
function closeModal() {
    document.getElementById('authModal').classList.remove('active');
}
document.getElementById('authModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

function switchTab(tab) {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const title = document.getElementById('modalTitle');
    if (tab === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        title.textContent = '欢迎回来';
    } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        title.textContent = '创建账号';
    }
}

// =============================================================
// 认证
// =============================================================
async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    if (!email || !pass) { alert('请填写完整'); return; }
    try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;
        closeModal();
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
    } catch(err) {
        alert('登录失败：' + err.message);
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    if (!name || !email || !pass) { alert('请填写完整'); return; }
    if (pass.length < 6) { alert('密码至少6位'); return; }
    try {
        const { data, error } = await sb.auth.signUp({
            email,
            password: pass,
            options: { data: { username: name } }
        });
        if (error) throw error;
        if (data.user) {
            await sb.from('profiles').upsert({
                id: data.user.id,
                username: name,
                email: email,
                is_admin: false
            });
        }
        alert('注册成功！请验证邮箱或直接登录');
        switchTab('login');
        document.getElementById('regName').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
        closeModal();
    } catch(err) {
        alert('注册失败：' + err.message);
    }
}

async function logout() {
    await sb.auth.signOut();
}

// =============================================================
// 数据操作
// =============================================================
async function loadPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = '⏳ 加载中...';
    let query = sb.from('posts').select('*').order('created_at', { ascending: false });
    if (currentCategory !== 'all') {
        query = query.eq('category', currentCategory);
    }
    const { data, error } = await query;
    if (error) {
        list.innerHTML = '❌ 加载失败：' + error.message;
        return;
    }
    postsCache = data || [];
    renderPosts(postsCache);
    updateStats();
}

function renderPosts(posts) {
    const list = document.getElementById('postList');
    if (!posts || posts.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);">📭 还没有帖子</div>';
        return;
    }
    list.innerHTML = posts.map(p => `
        <div class="post">
            <h3>${p.title}</h3>
            <p style="color:rgba(255,255,255,0.5);">${p.content || ''}</p>
            <small style="color:rgba(255,255,255,0.3);">${p.author_name || '匿名'} · ${new Date(p.created_at).toLocaleString()}</small>
            <div style="margin-top:6px;font-size:0.8rem;color:rgba(255,255,255,0.3);">❤️ ${p.likes || 0} &nbsp; 💬 ${p.comment_count || 0} &nbsp; 👁️ ${p.views || 0}</div>
        </div>
    `).join('');
}

async function updateStats() {
    document.getElementById('statPosts').textContent = postsCache.length;
    const { count, error } = await sb.from('profiles').select('*', { count: 'exact', head: true });
    if (!error) document.getElementById('statUsers').textContent = count;
}

// =============================================================
// 交互
// =============================================================
function togglePublish() {
    const form = document.getElementById('publishForm');
    form.classList.toggle('hidden');
}

async function publishPost() {
    if (!currentUser) { alert('请先登录'); return; }
    const title = document.getElementById('newTitle').value.trim();
    const content = document.getElementById('newContent').value.trim();
    if (!title || !content) { alert('请填写完整'); return; }
    try {
        const { error } = await sb.from('posts').insert({
            title,
            content,
            category: currentCategory === 'all' ? 'tech' : currentCategory,
            author_id: currentUser.id,
            author_name: currentUser.email,
            likes: 0,
            views: 0
        });
        if (error) throw error;
        alert('发帖成功！');
        document.getElementById('newTitle').value = '';
        document.getElementById('newContent').value = '';
        document.getElementById('publishForm').classList.add('hidden');
        loadPosts();
    } catch(err) {
        alert('发帖失败：' + err.message);
    }
}

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.board-btn').forEach(b => b.classList.toggle('active', b.textContent === cat || (cat === 'all' && b.textContent === '全部')));
    loadPosts();
}

// =============================================================
// 用户状态监听
// =============================================================
sb.auth.onAuthStateChange(async (event, session) => {
    currentUser = session?.user || null;
    const loginBtn = document.getElementById('loginBtn');
    const userInfo = document.getElementById('userInfo');
    const logoutBtn = document.getElementById('logoutBtn');
    if (currentUser) {
        loginBtn.style.display = 'none';
        userInfo.textContent = '👤 ' + currentUser.email;
        userInfo.classList.remove('hidden');
        logoutBtn.classList.remove('hidden');
    } else {
        loginBtn.style.display = 'inline-block';
        userInfo.classList.add('hidden');
        logoutBtn.classList.add('hidden');
    }
    loadPosts();
});

// =============================================================
// 全局暴露（供 onclick 使用）
// =============================================================
window.openModal = openModal;
window.closeModal = closeModal;
window.switchTab = switchTab;
window.handleLogin = handleLogin;
window.handleRegister = handleRegister;
window.logout = logout;
window.togglePublish = togglePublish;
window.publishPost = publishPost;
window.setCategory = setCategory;

// 初始化加载
loadPosts();
</script>

</body>
</html>
