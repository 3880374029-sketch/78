    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0b0e1a;color:#e8edf5;font-family:'Segoe UI',sans-serif;padding:20px;line-height:1.6;}

        .comment-item{border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 0;}
        .comment-item strong{color:#a5b4fc;}
        .comment-item .c-time{color:rgba(255,255,255,0.3);font-size:0.8rem;margin-left:8px;}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:999;}
        .modal.active{display:flex;}
        .modal-box{background:#1a1a2e;padding:30px;border-radius:20px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
        .modal-box .close{position:absolute;top:12px;right:20px;font-size:1.8rem;cursor:pointer;color:rgba(255,255,255,0.4);}

        .modal-tabs{display:flex;gap:8px;border-bottom:1px solid #333;padding-bottom:12px;margin-bottom:20px;}
        .modal-tabs button{flex:1;background:transparent;border:none;color:rgba(255,255,255,0.4);padding:8px 0;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;}
        .modal-tabs button.active{color:#fff;border-bottom-color:#6d5bff;}
        .auth-form{display:none;flex-direction:column;gap:12px;}
        .auth-form.active{display:flex;}
        .social-btn{padding:10px;border-radius:12px;border:none;font-weight:600;cursor:pointer;text-align:center;}
        .google-btn{background:#fff;color:#333;}
        .github-btn{background:#24292e;color:#fff;}
        .divider{display:flex;align-items:center;gap:16px;color:rgba(255,255,255,0.3);}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#333;}
        .auth-switch{text-align:center;color:rgba(255,255,255,0.4);}
        .auth-switch a{color:#6d5bff;cursor:pointer;}
        footer{text-align:center;margin-top:40px;padding:20px;border-top:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.2);font-size:0.85rem;}
        .social-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:8px;}
        .social-links a{color:rgba(255,255,255,0.3);text-decoration:none;}
        .social-links a:hover{color:rgba(255,255,255,0.7);}
        .no-result{text-align:center;padding:20px;color:rgba(255,255,255,0.3);}
        .empty-state{padding:40px 20px;text-align:center;border:2px dashed rgba(255,255,255,0.1);border-radius:16px;margin:20px 0;}
        .empty-state h3{color:rgba(255,255,255,0.5);margin-bottom:12px;}
    </style>
</head>
<body>

<script>
// =============================================================
// 🔥 Firebase 配置（已填）
// =============================================================
const firebaseConfig = {
    apiKey: "AIzaSyB8ZalWGiP8at0EUIfKN46CbwQ3eH4iM8E",
    authDomain: "project-170416828695178494.firebaseapp.com",
    projectId: "project-170416828695178494",
    storageBucket: "project-170416828695178494.firebasestorage.app",
    messagingSenderId: "1096326612519",
    appId: "1:1096326612519:web:8208916652738ce870f002",
    measurementId: "G-3K0YDFV3J5"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// =============================================================
// 状态
// =============================================================
let postsCache = [];
let currentCategory = 'all';
let currentUser = null;
let isPopupOpen = false;

// =============================================================
// 日期格式化工具
// =============================================================
function formatDate(date) {
    if (!date) return '';
    if (date.seconds) return new Date(date.seconds * 1000).toLocaleDateString('zh-CN');
    if (date instanceof Date) return date.toLocaleDateString('zh-CN');
    return new Date(date).toLocaleDateString('zh-CN');
}

function sortByDate(a, b) {
    const getTime = (item) => {
        const d = item.created_at;
        if (!d) return 0;
        if (d.seconds) return d.seconds;
        if (d instanceof Date) return d.getTime() / 1000;
        return new Date(d).getTime() / 1000;
    };
    return getTime(b) - getTime(a);
}

// =============================================================
// 核心：从 Firebase 加载文章（无内置）
// =============================================================
async function loadPosts(category = 'all', keyword = '') {
    try {
        let query = db.collection('posts').orderBy('created_at', 'desc');
        if (category !== 'all') {
            query = query.where('category', '==', category);
        }
        const snapshot = await query.get();
        const fbPosts = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            data.id = doc.id;
            fbPosts.push(data);
        });
        // 直接使用 Firebase 数据，不做合并
        postsCache = fbPosts;
    } catch (err) {
        console.error('加载文章失败:', err);
        postsCache = [];
    }

    // 应用分类和搜索
    let filtered = postsCache;
    if (category !== 'all') {
        filtered = filtered.filter(p => p.category === category);
    }
    if (keyword) {
        const kw = keyword.toLowerCase();
        filtered = filtered.filter(p =>
            p.title.toLowerCase().includes(kw) ||
            (p.excerpt && p.excerpt.toLowerCase().includes(kw)) ||
            (p.content && p.content.toLowerCase().includes(kw))
        );
    }
    renderPostList(filtered);
    // 更新点赞状态（等待 DOM 渲染）
    setTimeout(updateAllLikes, 100);
}

// =============================================================
// 渲染文章列表
// =============================================================
function renderPostList(posts) {
    const list = document.getElementById('postList');
    if (!posts || posts.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <h3>📭 还没有文章</h3>
                <p style="color:rgba(255,255,255,0.4);">登录后点击「发布新文章」或「新建话题」开始创作！</p>
            </div>
        `;
        return;
    }
    const catMap = { tech: '科技', life: '生活', career: '职场', topic: '💬 话题' };
    list.innerHTML = posts.map(p => {
        const dateStr = formatDate(p.created_at);
        const badgeText = catMap[p.category] || p.category;
        const badgeClass = p.category === 'topic' ? 'badge topic' : `badge ${p.category}`;
        return `
            <div class="post-card">
                <img src="${p.cover_image || 'https://picsum.photos/seed/'+p.id+'/800/400'}" alt="${p.title}" />
                <h3>${p.title}</h3>
                <div class="meta">${dateStr} · <span class="${badgeClass}">${badgeText}</span></div>
                <p>${p.excerpt || (p.content ? p.content.replace(/<[^>]+>/g,'').slice(0,80)+'...' : '')}</p>
                <div class="actions">
                    <span class="like-btn" onclick="toggleLike('${p.id}')" id="like-btn-${p.id}">❤️ <span id="like-count-${p.id}">${p.likes || 0}</span></span>
                    <span>👁️ ${p.views || 0}</span>
                </div>
                <button class="btn-read" onclick="showPost('${p.id}')">阅读全文 →</button>
            </div>
        `;
    }).join('');
}

// =============================================================
// 显示文章详情
// =============================================================
async function showPost(postId) {
    let post = postsCache.find(p => p.id === postId);
    if (!post) { alert('文章不存在'); return; }

    document.getElementById('postList').style.display = 'none';
    const area = document.getElementById('detailArea');
    area.classList.remove('hidden');
    const dateStr = formatDate(post.created_at);

    area.innerHTML = `
        <div class="post-content">
            <button class="back-btn" onclick="backToList()">← 返回列表</button>
            <h1>${post.title}</h1>
            <p style="color:rgba(255,255,255,0.4);font-size:0.9rem;">${dateStr} · 作者：${post.author_name || '匿名'} · 阅读 ${post.views || 0}</p>
            <div style="display:flex;align-items:center;gap:20px;margin:12px 0;">
                <span style="cursor:pointer;" onclick="toggleLike('${postId}')" id="like-btn-detail-${postId}">❤️ <span id="like-count-detail-${postId}">${post.likes || 0}</span></span>
                <span>👁️ ${post.views || 0}</span>
            </div>
            <div>${post.content}</div>
            <hr style="border-color:#333;margin:20px 0;" />
            <h3>💬 评论</h3>
            <div id="commentsArea"><p style="color:rgba(255,255,255,0.3);">⏳ 加载中...</p></div>
            ${currentUser ? `
                <textarea id="commentInput" rows="3" placeholder="写下你的评论..." style="margin-top:12px;"></textarea>
                <button class="btn" onclick="publishComment('${postId}')" style="margin-top:6px;">发表评论</button>
            ` : '<p style="color:rgba(255,255,255,0.3);margin-top:12px;">登录后即可评论</p>'}
        </div>
    `;

    await loadComments(postId);
    // 增加浏览量
    try {
        await db.collection('posts').doc(postId).update({ views: firebase.firestore.FieldValue.increment(1) });
        post.views = (post.views || 0) + 1;
    } catch (e) {}
    // 更新点赞UI
    await updateLikeUI(postId);
    window.scrollTo({ top: 0 });
}

// =============================================================
// 评论功能
// =============================================================
async function loadComments(postId) {
    const area = document.getElementById('commentsArea');
    if (!area) return;
    try {
        const snapshot = await db.collection('comments')
            .where('post_id', '==', postId)
            .orderBy('created_at', 'asc')
            .get();
        if (snapshot.empty) {
            area.innerHTML = '<p style="color:rgba(255,255,255,0.3);">💬 暂无评论，来抢沙发吧！</p>';
            return;
        }
        let html = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            const date = data.created_at && data.created_at.toDate ?
                data.created_at.toDate().toLocaleString() :
                '';
            html += `<div class="comment-item"><strong>${data.username || '用户'}</strong><span class="c-time">${date}</span><p>${data.content}</p></div>`;
        });
        area.innerHTML = html;
    } catch (e) {
        console.error('加载评论失败:', e);
        area.innerHTML = '<p style="color:#ef4444;">❌ 加载评论失败</p>';
    }
}

async function publishComment(postId) {
    const input = document.getElementById('commentInput');
    const content = input.value.trim();
    if (!content) { alert('请输入评论内容'); return; }
    if (!currentUser) { alert('请先登录'); return; }
    try {
        await db.collection('comments').add({
            post_id: postId,
            user_id: currentUser.uid,
            username: currentUser.displayName || currentUser.email,
            content: content,
            created_at: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = '';
        await loadComments(postId);
        alert('评论成功！');
    } catch (e) { alert('评论失败：' + e.message); }
}

function backToList() {
    document.getElementById('postList').style.display = 'block';
    document.getElementById('detailArea').classList.add('hidden');
    document.getElementById('detailArea').innerHTML = '';
    loadPosts(currentCategory);
}

// =============================================================
// 搜索和分类
// =============================================================
function searchPosts() {
    const keyword = document.getElementById('searchInput').value.trim();
    const activeCat = document.querySelector('.cat-btn.active');
    const cat = activeCat ? activeCat.dataset.cat : 'all';
    loadPosts(cat, keyword);
}

document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        loadPosts(this.dataset.cat, document.getElementById('searchInput').value.trim());
    });
});

// =============================================================
// 🔥 点赞功能
// =============================================================
async function toggleLike(postId) {
    if (!currentUser) {
        alert('请先登录');
        return;
    }
    const likeRef = db.collection('likes').doc(`${currentUser.uid}_${postId}`);
    const postRef = db.collection('posts').doc(postId);
    try {
        const doc = await likeRef.get();
        if (doc.exists) {
            await likeRef.delete();
            await postRef.update({ likes: firebase.firestore.FieldValue.increment(-1) });
            const post = postsCache.find(p => p.id === postId);
            if (post) post.likes = Math.max((post.likes || 0) - 1, 0);
        } else {
            await likeRef.set({
                userId: currentUser.uid,
                postId: postId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await postRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
            const post = postsCache.find(p => p.id === postId);
            if (post) post.likes = (post.likes || 0) + 1;
        }
        await updateLikeUI(postId);
    } catch (err) {
        console.error('点赞操作失败:', err);
        alert('操作失败，请重试');
    }
}

async function updateLikeUI(postId) {
    const post = postsCache.find(p => p.id === postId);
    if (!post) return;
    const countEl = document.getElementById(`like-count-${postId}`);
    if (countEl) countEl.textContent = post.likes || 0;
    const countDetail = document.getElementById(`like-count-detail-${postId}`);
    if (countDetail) countDetail.textContent = post.likes || 0;
    if (currentUser) {
        const likeRef = db.collection('likes').doc(`${currentUser.uid}_${postId}`);
        const doc = await likeRef.get();
        const hearts = document.querySelectorAll(`[id^="like-btn-"]`);
        hearts.forEach(el => {
            if (el.id === `like-btn-${postId}` || el.id === `like-btn-detail-${postId}`) {
                el.style.color = doc.exists ? '#ef4444' : '';
            }
        });
    }
}

async function updateAllLikes() {
    if (!currentUser) return;
    for (const post of postsCache) {
        const likeRef = db.collection('likes').doc(`${currentUser.uid}_${post.id}`);
        const doc = await likeRef.get();
        const hearts = document.querySelectorAll(`[id^="like-btn-"]`);
        hearts.forEach(el => {
            if (el.id === `like-btn-${post.id}` || el.id === `like-btn-detail-${post.id}`) {
                el.style.color = doc.exists ? '#ef4444' : '';
            }
        });
    }
}

// =============================================================
// 发布文章（支持话题）
// =============================================================
function togglePublish() {
    const form = document.getElementById('publishForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function openNewTopic() {
    document.getElementById('newCategory').value = 'topic';
    document.getElementById('publishForm').style.display = 'block';
    document.getElementById('newTitle').focus();
}

async function publishPost() {
    if (!currentUser) { alert('请先登录'); return; }
    const title = document.getElementById('newTitle').value.trim();
    const content = document.getElementById('newContent').value.trim();
    const excerpt = document.getElementById('newExcerpt').value.trim();
    const category = document.getElementById('newCategory').value;
    if (!title || !content) { alert('标题和内容不能为空'); return; }
    try {
        await db.collection('posts').add({
            title, content, excerpt, category,
            cover_image: 'https://picsum.photos/seed/' + Date.now() + '/800/400',
            author_name: currentUser.displayName || currentUser.email,
            views: 0,
            likes: 0,
            created_at: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('发布成功！🎉');
        document.getElementById('newTitle').value = '';
        document.getElementById('newContent').value = '';
        document.getElementById('newExcerpt').value = '';
        loadPosts(currentCategory);
    } catch (e) { alert('发布失败：' + e.message); }
}

// =============================================================
// 认证
// =============================================================
function openModal() { document.getElementById('authModal').classList.add('active'); }
function closeModal() { document.getElementById('authModal').classList.remove('active'); }
document.getElementById('authModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

function switchTab(tab) {
    document.querySelectorAll('.modal-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    document.getElementById('modalTitle').textContent = tab === 'login' ? '欢迎回来' : '创建账号';
    document.getElementById('modalSub').textContent = tab === 'login' ? '登录你的账号' : '加入窍某博客网社区';
}

async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    if (!email || !pass) { alert('请填写完整'); return; }
    try {
        await auth.signInWithEmailAndPassword(email, pass);
        closeModal();
        loadPosts(currentCategory);
    } catch (err) { alert(err.message); }
}

async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    if (!name || !email || !pass || !confirm) { alert('请填写完整'); return; }
    if (pass !== confirm) { alert('密码不一致'); return; }
    if (pass.length < 6) { alert('密码至少6位'); return; }
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await cred.user.updateProfile({ displayName: name });
        closeModal();
        alert('注册成功！');
        loadPosts(currentCategory);
    } catch (err) { alert(err.message); }
}

async function handleSocialLogin(provider) {
    if (isPopupOpen) return;
    isPopupOpen = true;
    let prov;
    if (provider === 'google') prov = new firebase.auth.GoogleAuthProvider();
    else if (provider === 'github') prov = new firebase.auth.GithubAuthProvider();
    else return;
    try {
        const result = await auth.signInWithPopup(prov);
        const user = result.user;
        const userRef = db.collection('users').doc(user.uid);
        const doc = await userRef.get();
        if (!doc.exists) {
            await userRef.set({
                username: user.displayName || (provider === 'google' ? 'Google用户' : 'GitHub用户'),
                email: user.email,
                avatar_url: user.photoURL || null,
                created_at: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        closeModal();
        loadPosts(currentCategory);
    } catch (err) {
        if (err.code !== 'auth/cancelled-popup-request') {
            alert('登录失败：' + err.message);
        }
    } finally { isPopupOpen = false; }
}

async function logout() {
    await auth.signOut();
    loadPosts(currentCategory);
}

// =============================================================
// 登录状态监听 & 管理员入口
// =============================================================
const ADMIN_UID = "你的_UID";  // ⚠️ 替换为你的 UID

auth.onAuthStateChanged(user => {
    currentUser = user;
    const loginBtn = document.getElementById('loginBtn');
    const avatar = document.getElementById('userAvatar');
    const nameEl = document.getElementById('userName');
    const logoutBtn = document.getElementById('logoutBtn');
    const adminLink = document.getElementById('adminLink');

    if (user) {
        loginBtn.style.display = 'none';
        avatar.classList.remove('hidden');
        avatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || user.email) + '&background=6d5bff&color=fff&size=36';
        nameEl.classList.remove('hidden');
        nameEl.textContent = user.displayName || user.email;
        logoutBtn.classList.remove('hidden');
        if (user.uid === ADMIN_UID) adminLink.style.display = 'inline-block';
        else adminLink.style.display = 'none';
    } else {
        loginBtn.style.display = 'inline-block';
        avatar.classList.add('hidden');
        nameEl.classList.add('hidden');
        logoutBtn.classList.add('hidden');
        adminLink.style.display = 'none';
    }
    // 初次加载或登录状态变化时加载文章
    if (user) loadPosts(currentCategory);
});

// 如果未登录，也加载文章（但可能无法点赞/评论）
// 但初始加载是在 window.onload 中调用

// =============================================================
// 主题切换
// =============================================================
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeToggle');
    if (body.style.background === '#f0f2f8') {
        body.style.background = '#0b0e1a';
        body.style.color = '#e8edf5';
        btn.textContent = '🌙';
        document.querySelectorAll('.post-card, .publish-form, .post-content, .modal-box').forEach(el => {
            el.style.background = 'rgba(255,255,255,0.04)';
        });
    } else {
        body.style.background = '#f0f2f8';
        body.style.color = '#1a1a2e';
        btn.textContent = '☀️';
        document.querySelectorAll('.post-card, .publish-form, .post-content, .modal-box').forEach(el => {
            el.style.background = 'rgba(255,255,255,0.7)';
        });
    }
}

window.searchPosts = searchPosts;

window.openModal = openModal;
window.closeModal = closeModal;
window.switchTab = switchTab;
window.handleLogin = handleLogin;
window.handleRegister = handleRegister;
window.handleSocialLogin = handleSocialLogin;
window.logout = logout;
window.loadPosts = loadPosts;
</script>
