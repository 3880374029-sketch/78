    <script>
        const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';

        const sb = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function login() {
            const email = prompt('邮箱:');
            const pass = prompt('密码:');
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

            else document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
    </script>
