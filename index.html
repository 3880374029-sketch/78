<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>窍某博客网 - 科技·生活·思考</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- Google Translate -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
    </script>

    <style>
        /* ============================================================
                   全部样式（包含所有你之前的功能）
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: #0b0e1a;
            color: #e8edf5;
            line-height: 1.8;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* 背景层 */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(88, 50, 200, 0.45) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(30, 80, 220, 0.40) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(180, 60, 220, 0.25) 0%, transparent 50%),
                linear-gradient(145deg, #0b0e1a 0%, #151b30 40%, #1a1040 100%);
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 头部 */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            background: rgba(11, 14, 26, 0.65);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0.9rem 0;
            transition: background 0.3s;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }
        nav h1 {
            margin: 0;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #c4b5fd, #818cf8, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-box {
            padding: 10px 22px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 40px;
            width: 200px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.06);
            color: #e8edf5;
            outline: none;
            transition: all 0.35s;
        }
        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .search-box:focus {
            border-color: rgba(130, 100, 255, 0.5);
            background: rgba(255, 255, 255, 0.10);
        }

        #google_translate_element .goog-te-combo {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            color: #e8edf5;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            max-width: 140px;
        }
        .goog-te-banner-frame {
            display: none !important;
        }
        body {
            top: 0 !important;
        }
        .skiptranslate {
            display: none !important;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            color: #e8edf5;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* 登录控件 */
        .auth-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auth-btn {
            background: linear-gradient(135deg, #6d5bff, #8b5cf6);
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(109, 91, 255, 0.20);
        }
        .auth-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(109, 91, 255, 0.35);
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            display: none;
        }
        .user-name {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            display: none;
            cursor: pointer;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
            display: none;
        }
        .logout-btn:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.3);
            color: #ef4444;
        }

        .categories {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cat-btn {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        .cat-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
        .cat-btn.active {
            background: linear-gradient(135deg, #6d5bff, #8b5cf6);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(109, 91, 255, 0.30);
        }

        /* Hero */
        #hero {
            text-align: center;
            padding: 4.5rem 1.5rem 3.5rem;
        }
        #hero h2 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f0ff, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        #hero p {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.4);
            max-width: 580px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 2.4rem 0 2rem;
            color: #e8edf5;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            margin: 10px auto 0;
            background: linear-gradient(90deg, #6d5bff, #8b5cf6);
            border-radius: 10px;
        }

        .post-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
        }
        .post-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.50);
        }
        .post-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.5s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .post-card:hover img {
            transform: scale(1.03);
        }
        .post-info {
            padding: 1.6rem 1.8rem 1.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .post-info h3 {
            margin: 0 0 0.3rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #f0f0ff;
            line-height: 1.4;
        }
        .post-info .meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .post-info .meta .badge {
            padding: 0 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .post-info .meta .badge.tech {
            background: rgba(96, 165, 250, 0.15);
            color: #93bbfc;
        }
        .post-info .meta .badge.life {
            background: rgba(52, 211, 153, 0.12);
            color: #6ee7b7;
        }
        .post-info .meta .badge.career {
            background: rgba(251, 191, 36, 0.12);
            color: #fcd34d;
        }
        .post-info p {
            margin: 0.4rem 0 1rem;
            color: rgba(255, 255, 255, 0.5);
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .post-info .btn-read {
            background: linear-gradient(135deg, #6d5bff, #8b5cf6);
            color: #fff;
            border: none;
            padding: 0.65rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.35s;
            align-self: flex-start;
            margin-top: 6px;
            box-shadow: 0 4px 16px rgba(109, 91, 255, 0.20);
        }
        .post-info .btn-read:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(109, 91, 255, 0.35);
        }

        /* 文章详情 */
        #post-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 24px;
        }
        .post-content {
            display: none;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            padding: 2.8rem 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }
        .post-content.active {
            display: block;
            animation: fadeSlide 0.5s ease;
        }
        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .post-content h1 {
            font-size: 2.2rem;
            margin-top: 0;
            color: #f0f0ff;
        }
        .post-content h2 {
            font-size: 1.4rem;
            margin: 1.8rem 0 0.8rem;
            color: #c4b5fd;
            border-left: 4px solid #818cf8;
            padding-left: 1rem;
        }
        .post-content p {
            margin: 0.8rem 0;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.9;
        }
        .post-content ul,
        .post-content ol {
            margin: 0.6rem 0 1rem 1.8rem;
            color: rgba(255, 255, 255, 0.7);
        }
        .post-content blockquote {
            border-left: 4px solid #818cf8;
            padding: 0.5rem 1.5rem;
            margin: 1rem 0;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 0 12px 12px 0;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
        }
        .post-content .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin: 1.8rem 0;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.40);
            background: #000;
        }
        .post-content .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .post-content .back-btn {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
        }
        .post-content .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateX(-4px);
        }
        .post-content .read-time {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
            margin: 0 0 1rem 0;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: rgba(20, 24, 50, 0.95);
            border-radius: 24px;
            padding: 2.5rem 2.8rem;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.3s;
            line-height: 1;
        }
        .modal-box .close-modal:hover {
            color: #fff;
        }
        .modal-box h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 1.6rem;
            font-weight: 700;
            color: #f0f0ff;
        }
        .modal-box .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }
        .modal-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 0.8rem;
        }
        .modal-tabs button {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .modal-tabs button.active {
            color: #f0f0ff;
            border-bottom-color: #818cf8;
        }
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .auth-form.active {
            display: flex;
        }
        .auth-form label {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
        }
        .auth-form input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.06);
            color: #e8edf5;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
        }
        .auth-form input:focus {
            border-color: rgba(130, 100, 255, 0.5);
        }
        .auth-form .submit-btn {
            background: linear-gradient(135deg, #6d5bff, #8b5cf6);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 4px;
        }
        .auth-form .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(109, 91, 255, 0.35);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 8px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
        }
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            margin: 4px 0 8px;
        }
        .google-btn-wrapper .g_id_signin {
            width: 100%;
            max-width: 320px;
        }
        .auth-switch {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
        }
        .auth-switch a {
            color: #818cf8;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-switch a:hover {
            text-decoration: underline;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 2.2rem 1rem 1.8rem;
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.9rem;
        }
        footer .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 0.5rem 0 0.8rem;
        }
        footer .social-links a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }
        footer .social-links a:hover {
            color: rgba(255, 255, 255, 0.8);
        }
        footer .email-line {
            margin: 0.2rem 0 0.8rem;
        }
        footer .email-line a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.3s;
        }
        footer .email-line a:hover {
            color: rgba(255, 255, 255, 0.8);
        }
        footer p {
            margin: 0.3rem 0;
        }

        .no-result {
            text-align: center;
            padding: 3rem 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 820px) {
            nav {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            nav h1 {
                text-align: center;
            }
            .nav-controls {
                justify-content: center;
                flex-wrap: wrap;
            }
            .search-box {
                width: 100%;
            }
            #google_translate_element .goog-te-combo {
                max-width: 100%;
                width: 100%;
            }
            .categories {
                justify-content: center;
            }
            #hero h2 {
                font-size: 2.2rem;
            }
            .post-list {
                grid-template-columns: 1fr;
            }
            .post-content {
                padding: 1.8rem 1.4rem;
            }
            .post-content h1 {
                font-size: 1.6rem;
            }
            .post-content .video-wrapper {
                margin: 1.2rem 0;
            }
            footer .social-links {
                gap: 12px;
            }
            .modal-box {
                padding: 1.8rem 1.4rem;
                margin: 0 16px;
            }
        }
        @media (min-width: 821px) and (max-width: 1100px) {
            .post-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- ===== 背景层 ===== -->
    <div class="bg-layer"></div>
    <div class="bg-grid"></div>

    <!-- ===== 头部 ===== -->
    <header>
        <nav class="container">
            <h1>✦ 窍某博客网</h1>
            <div class="nav-controls">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索文章..." onkeyup="searchPosts()" />
                <div id="google_translate_element"></div>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
                <div class="auth-section">
                    <button class="auth-btn" id="loginBtn" onclick="openModal()">登录</button>
                    <img id="userAvatar" class="user-avatar" alt="头像" />
                    <span id="userName" class="user-name"></span>
                    <button class="logout-btn" id="logoutBtn" onclick="logoutUser()">退出</button>
                </div>
            </div>
            <div class="categories">
                <button class="cat-btn active" data-cat="all">📋 全部</button>
                <button class="cat-btn" data-cat="tech">💻 科技</button>
                <button class="cat-btn" data-cat="life">🌿 生活</button>
                <button class="cat-btn" data-cat="career">💼 职场</button>
            </div>
        </nav>
    </header>

    <!-- ===== 主内容 ===== -->
    <main>
        <section id="home">
            <div id="hero" class="container">
                <h2>科技 · 生活 · 思考</h2>
                <p>记录成长，分享所得 — 用文字与影像留下时代的印记</p>
            </div>
            <div class="container">
                <h2 class="section-title">📖 最新文章</h2>
                <div class="post-list" id="post-list"></div>
            </div>
        </section>
        <div id="post-container"></div>
    </main>

    <!-- ===== 页脚 ===== -->
    <footer>
        <div class="social-links">
            <a href="https://qm.qq.com/q/3880374029" target="_blank">💬 QQ: 3880374029</a>
            <a href="https://www.youtube.com/@qiaomouqiao" target="_blank">▶️ @qiaomouqiao</a>
            <a href="https://www.tiktok.com/@mr.qiaomou" target="_blank">🎵 @mr.qiaomou</a>
            <a href="https://github.com/3880374029-sketch/78" target="_blank">🐙 GitHub</a>
        </div>
        <div class="email-line">
            📧 投稿邮箱：<a href="mailto:3880374029@qq.com">3880374029@qq.com</a>
        </div>
        <p>© 2026 窍某博客网 · 多维度记录与分享 · 用思考对抗平庸</p>
    </footer>

    <!-- ===== 登录模态框 ===== -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle">欢迎回来</h2>
            <p class="subtitle" id="modalSub">登录你的账号，解锁更多互动</p>
            <div class="modal-tabs">
                <button class="active" data-tab="login" onclick="switchTab('login')">登录</button>
                <button data-tab="register" onclick="switchTab('register')">注册</button>
            </div>
            <!-- 登录 -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <label for="loginEmail">邮箱地址</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" required />
                <label for="loginPassword">密码</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required />
                <button type="submit" class="submit-btn">登录</button>
                <div class="divider">或</div>
                <div class="google-btn-wrapper" id="googleBtnWrapper"></div>
                <div class="auth-switch">还没有账号？ <a onclick="switchTab('register')">立即注册</a></div>
            </form>
            <!-- 注册 -->
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <label for="regName">昵称</label>
                <input type="text" id="regName" placeholder="你的昵称" required />
                <label for="regEmail">邮箱地址</label>
                <input type="email" id="regEmail" placeholder="your@email.com" required />
                <label for="regPassword">密码</label>
                <input type="password" id="regPassword" placeholder="至少6位" minlength="6" required />
                <label for="regConfirm">确认密码</label>
                <input type="password" id="regConfirm" placeholder="再次输入" required />
                <button type="submit" class="submit-btn">注册</button>
                <div class="divider">或</div>
                <div class="google-btn-wrapper" id="googleBtnWrapper2"></div>
                <div class="auth-switch">已有账号？ <a onclick="switchTab('login')">去登录</a></div>
            </form>
        </div>
    </div>

    <!-- ============================================================ -->
    <!--  JavaScript  -->
    <!-- ============================================================ -->
    <script>
        // =============================================================
        // ★★★ 在这里粘贴你的 firebaseConfig ★★★
        // =============================================================
        const firebaseConfig = {
            apiKey: "你的 apiKey",
            authDomain: "你的 authDomain",
            projectId: "你的 projectId",
            storageBucket: "你的 storageBucket",
            messagingSenderId: "你的 messagingSenderId",
            appId: "你的 appId"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // =============================================================
        //  认证函数
        // =============================================================

        // 注册
        async function registerUser(username, email, password) {
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: username });
                await db.collection('users').doc(cred.user.uid).set({
                    username: username,
                    email: email,
                    avatar_url: null,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });
                return { success: true, user: cred.user };
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        // 登录
        async function loginUser(email, password) {
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                return { success: true, user: cred.user };
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        // Google 登录
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const cred = await auth.signInWithPopup(provider);
                const userRef = db.collection('users').doc(cred.user.uid);
                const doc = await userRef.get();
                if (!doc.exists) {
                    await userRef.set({
                        username: cred.user.displayName || 'Google用户',
                        email: cred.user.email,
                        avatar_url: cred.user.photoURL || null,
                        created_at: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                return { success: true, user: cred.user };
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        // 退出
        async function logoutUser() {
            await auth.signOut();
        }

        // 监听登录状态
        auth.onAuthStateChanged(user => {
            if (user) {
                localStorage.setItem('user', JSON.stringify({
                    id: user.uid,
                    username: user.displayName || user.email,
                    email: user.email,
                    avatar_url: user.photoURL || null
                }));
            } else {
                localStorage.removeItem('user');
            }
            updateUI();
            // 刷新文章列表（显示作者名）
            loadPosts();
        });

        // =============================================================
        //  文章与评论操作
        // =============================================================

        // 获取文章列表
        async function loadPosts(category = 'all', keyword = '') {
            let query = db.collection('posts').orderBy('created_at', 'desc');
            if (category !== 'all') {
                query = query.where('category', '==', category);
            }
            const snapshot = await query.get();
            let posts = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                data.id = doc.id;
                posts.push(data);
            });
            if (keyword) {
                posts = posts.filter(p =>
                    p.title.includes(keyword) ||
                    (p.excerpt && p.excerpt.includes(keyword)) ||
                    (p.content && p.content.includes(keyword))
                );
            }
            renderPostList(posts);
        }

        // 获取单篇文章
        async function getPost(postId) {
            const doc = await db.collection('posts').doc(postId).get();
            if (!doc.exists) return null;
            const data = doc.data();
            data.id = doc.id;
            return data;
        }

        // 获取评论
        async function loadComments(postId) {
            const snapshot = await db.collection('comments')
                .where('post_id', '==', postId)
                .orderBy('created_at', 'asc')
                .get();
            const comments = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                data.id = doc.id;
                comments.push(data);
            });
            return comments;
        }

        // 发表评论
        async function addComment(postId, content) {
            const user = auth.currentUser;
            if (!user) return { success: false, error: '请先登录' };
            try {
                await db.collection('comments').add({
                    post_id: postId,
                    user_id: user.uid,
                    username: user.displayName || user.email,
                    avatar_url: user.photoURL || null,
                    content: content,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });
                return { success: true };
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        // =============================================================
        //  界面渲染
        // =============================================================

        function renderPostList(posts) {
            const list = document.getElementById('post-list');
            if (!posts.length) {
                list.innerHTML = '<div class="no-result">😕 暂无文章</div>';
                return;
            }
            const catMap = { tech: '科技', life: '生活', career: '职场' };
            list.innerHTML = posts.map(post => `
                <div class="post-card">
                    <img src="${post.cover_image || 'https://picsum.photos/seed/'+post.id+'/800/400'}" alt="${post.title}" loading="lazy" />
                    <div class="post-info">
                        <h3>${post.title}</h3>
                        <div class="meta">
                            <span>${post.created_at ? post.created_at.toDate().toLocaleDateString() : ''}</span>
                            <span class="badge ${post.category}">${catMap[post.category] || post.category}</span>
                        </div>
                        <p>${post.excerpt || post.content.slice(0,80)+'...'}</p>
                        <button class="btn-read" onclick="showPost('${post.id}')">阅读全文 →</button>
                    </div>
                </div>
            `).join('');
        }

        async function showPost(postId) {
            const post = await getPost(postId);
            if (!post) { alert('文章不存在'); return; }
            document.getElementById('home').style.display = 'none';
            const container = document.getElementById('post-container');
            container.innerHTML = `
                <div class="post-content active">
                    <button class="back-btn" onclick="backToHome()">← 返回首页</button>
                    <h1>${post.title}</h1>
                    <p class="read-time">${post.created_at ? post.created_at.toDate().toLocaleDateString() : ''} · 作者：${post.author_name || '匿名'} · 阅读 ${post.views || 0}</p>
                    ${post.cover_image ? `<img src="${post.cover_image}" style="max-width:100%;border-radius:12px;margin:1rem 0;" />` : ''}
                    <div>${post.content}</div>
                    <hr />
                    <h3>💬 评论</h3>
                    <div id="comments-area"></div>
                    ${auth.currentUser ? `
                        <textarea id="commentInput" placeholder="写下你的评论..." rows="3" style="width:100%;padding:12px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#e8edf5;"></textarea>
                        <button onclick="publishComment('${postId}')" style="margin-top:8px;background:linear-gradient(135deg,#6d5bff,#8b5cf6);color:#fff;border:none;padding:8px 20px;border-radius:30px;cursor:pointer;">发表评论</button>
                    ` : '<p style="color:rgba(255,255,255,0.4);">登录后即可评论</p>'}
                </div>
            `;
            // 加载评论
            const comments = await loadComments(postId);
            const area = document.getElementById('comments-area');
            if (!comments.length) {
                area.innerHTML = '<p style="color:rgba(255,255,255,0.4);">暂无评论，来抢沙发吧！</p>';
            } else {
                area.innerHTML = comments.map(c => `
                    <div style="border-bottom:1px solid rgba(255,255,255,0.06);padding:0.8rem 0;">
                        <strong>${c.username || '用户'}</strong> <span style="color:rgba(255,255,255,0.3);font-size:0.8rem;">${c.created_at ? c.created_at.toDate().toLocaleString() : ''}</span>
                        <p style="margin:0.2rem 0;">${c.content}</p>
                    </div>
                `).join('');
            }
            // 增加浏览量
            await db.collection('posts').doc(postId).update({ views: firebase.firestore.FieldValue.increment(1) });
            window.scrollTo({ top: 0 });
        }

        async function publishComment(postId) {
            const content = document.getElementById('commentInput').value.trim();
            if (!content) return alert('请输入评论内容');
            const result = await addComment(postId, content);
            if (result.success) {
                document.getElementById('commentInput').value = '';
                showPost(postId);
            } else {
                alert(result.error);
            }
        }

        function backToHome() {
            document.getElementById('home').style.display = 'block';
            document.getElementById('post-container').innerHTML = '';
            loadPosts();
        }

        // 搜索
        function searchPosts() {
            const keyword = document.getElementById('searchInput').value.trim();
            const activeCat = document.querySelector('.cat-btn.active');
            const cat = activeCat ? activeCat.dataset.cat : 'all';
            loadPosts(cat, keyword);
        }

        // =============================================================
        //  UI 更新（登录状态）
        // =============================================================
        function updateUI() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const loginBtn = document.getElementById('loginBtn');
            const avatar = document.getElementById('userAvatar');
            const nameEl = document.getElementById('userName');
            const logoutBtn = document.getElementById('logoutBtn');

            if (user) {
                loginBtn.style.display = 'none';
                avatar.style.display = 'inline-block';
                avatar.src = user.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.username) +
                    '&background=6d5bff&color=fff&size=36';
                nameEl.style.display = 'inline-block';
                nameEl.textContent = user.username;
                logoutBtn.style.display = 'inline-block';
            } else {
                loginBtn.style.display = 'inline-block';
                avatar.style.display = 'none';
                nameEl.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        }

        // =============================================================
        //  模态框与表单事件
        // =============================================================
        function openModal() {
            document.getElementById('authModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('authModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // 点击背景关闭
        document.getElementById('authModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ESC 关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        function switchTab(tab) {
            document.querySelectorAll('.modal-tabs button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            const title = document.getElementById('modalTitle');
            const sub = document.getElementById('modalSub');
            if (tab === 'login') {
                title.textContent = '欢迎回来';
                sub.textContent = '登录你的账号，解锁更多互动';
            } else {
                title.textContent = '创建账号';
                sub.textContent = '加入窍某博客网社区';
            }
        }

        // 登录提交
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!email || !password) {
                alert('请填写完整信息');
                return;
            }
            const result = await loginUser(email, password);
            if (result.success) {
                closeModal();
                loadPosts();
            } else {
                alert(result.error);
            }
        }

        // 注册提交
        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (!username || !email || !password || !confirm) {
                alert('请填写完整信息');
                return;
            }
            if (password !== confirm) {
                alert('两次密码不一致');
                return;
            }
            if (password.length < 6) {
                alert('密码至少6位');
                return;
            }
            const result = await registerUser(username, email, password);
            if (result.success) {
                closeModal();
                loadPosts();
            } else {
                alert(result.error);
            }
        }

        // =============================================================
        //  主题切换
        // =============================================================
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggle');
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                btn.textContent = '🌙';
                // 重置背景变量（实际 CSS 已通过 class 控制）
            } else {
                body.classList.add('light');
                btn.textContent = '☀️';
            }
        }

        // 动态添加 light 样式（通过 CSS 变量）
        // 在 <style> 中已定义了 body.light 的变量，无需额外操作

        // =============================================================
        //  分类点击
        // =============================================================
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const cat = this.dataset.cat;
                const keyword = document.getElementById('searchInput').value.trim();
                loadPosts(cat, keyword);
            });
        });

        // =============================================================
        //  初始化
        // =============================================================
        window.onload = function() {
            // 添加默认演示文章（如果数据库为空）
            const demoPosts = [{
                title: '欢迎来到窍某博客网',
                content: '这里是我个人思考与成长的自留地。从技术到生活，从职场到内心，我希望能用文字和影像记录下每一个值得回味的瞬间。',
                excerpt: '开启分享之旅，记录思考点滴',
                category: 'life',
                cover_image: 'https://picsum.photos/id/1015/800/400',
                author_name: '窍某',
                views: 0
            }, {
                title: '2026 年前沿技术风向标',
                content: '2026 年已经过半，技术领域的变革比我们想象的更快。本文梳理了今年最值得关注的几个技术方向，以及它们背后的逻辑。',
                excerpt: 'AI Agent、WebAssembly 与边缘计算',
                category: 'tech',
                cover_image: 'https://picsum.photos/id/201/800/400',
                author_name: '窍某',
                views: 0
            }];
            // 检查文章数量，如果为0则插入示例
            db.collection('posts').get().then(snapshot => {
                if (snapshot.empty) {
                    demoPosts.forEach(p => {
                        db.collection('posts').add({
                            ...p,
                            created_at: firebase.firestore.FieldValue.serverTimestamp(),
                            updated_at: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    });
                }
            }).then(() => {
                loadPosts();
            });

            // 初始化 UI
            updateUI();
        };

        // 暴露全局函数
        window.showPost = showPost;
        window.backToHome = backToHome;
        window.publishComment = publishComment;
        window.searchPosts = searchPosts;
        window.toggleTheme = toggleTheme;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.logoutUser = logoutUser;
        window.loadPosts = loadPosts;
    </script>

</body>
