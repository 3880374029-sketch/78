        let currentCategory = 'all';
        function renderPostList(filteredPosts) {
            const list = document.getElementById('post-list');
            if (!filteredPosts.length) {
                list.innerHTML = `<div class="no-result">😕 没有找到匹配的文章</div>`;
                return;
            }
            list.innerHTML = filteredPosts.map(post => {
                const catMap = { tech:'科技', life:'生活', career:'职场' };
                return `
                    <div class="post-card">
                        <img src="${post.image}" alt="${post.title}" loading="lazy" />
                        <div class="post-info">
                            <h3>${post.title}</h3>
                            <div class="meta"><span>${post.date}</span><span class="badge ${post.category}">${catMap[post.category]}</span></div>
                            <p>${post.excerpt}</p>
                            <button class="btn-read" onclick="showPost(${post.id})">阅读全文 →</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.cat === cat));
            searchPosts();
        }
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() { filterCategory(this.dataset.cat); });
        });

        function searchPosts() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = posts;
            if (currentCategory !== 'all') filtered = filtered.filter(p => p.category === currentCategory);
            if (keyword) filtered = filtered.filter(p => p.title.toLowerCase().includes(keyword) || p.excerpt.toLowerCase().includes(keyword) || p.content.toLowerCase().includes(keyword));
            renderPostList(filtered);
        }

        function showPost(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;
            document.getElementById('home').style.display = 'none';
            const container = document.getElementById('post-container');
            container.innerHTML = `<div class="post-content active"><button class="back-btn" onclick="backToHome()">← 返回首页</button>${post.content}</div>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToHome() {
            document.getElementById('home').style.display = 'block';
            document.getElementById('post-container').innerHTML = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = function() {
            renderPostList(posts);
            document.querySelector('.cat-btn[data-cat="all"]')?.classList.add('active');
        };

        window.filterCategory = filterCategory;
        window.searchPosts = searchPosts;
        window.showPost = showPost;
        window.backToHome = backToHome;
    </script>
