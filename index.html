<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窍某论坛</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0b0e1a;color:#e8edf5;font-family:'Segoe UI',sans-serif;padding:20px;line-height:1.6;}
        .container{max-width:1200px;margin:0 auto;}
        header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
        h1{background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.8rem;}
        .nav-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
        .search-box{padding:8px 16px;border-radius:30px;border:1px solid #444;background:rgba(255,255,255,0.05);color:#fff;width:200px;}
        .btn{background:linear-gradient(135deg,#6d5bff,#8b5cf6);color:#fff;border:none;padding:6px 18px;border-radius:30px;cursor:pointer;font-size:0.9rem;transition:0.3s;}
        .btn:hover{transform:scale(1.04);}
        .btn-outline{background:transparent;border:1px solid #444;}
        .btn-outline:hover{background:rgba(255,255,255,0.05);}
        .auth-section{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .user-avatar{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);object-fit:cover;}
        .user-name{color:rgba(255,255,255,0.6);}
        .logout-btn{background:transparent;border:1px solid #444;color:rgba(255,255,255,0.4);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.75rem;}
        .logout-btn:hover{border-color:#ef4444;color:#ef4444;}
        .hidden{display:none!important;}
        #adminLink{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;border:1px solid rgba(255,255,255,0.1);padding:4px 12px;border-radius:20px;display:none;}
        #adminLink:hover{color:#fff;border-color:rgba(255,255,255,0.3);}
        .profile-link{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;margin-left:8px;cursor:pointer;}
        .forum-stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:rgba(255,255,255,0.03);border-radius:12px;}
        .forum-stats span{color:rgba(255,255,255,0.5);font-size:0.85rem;}
        .forum-stats strong{color:#a5b4fc;}
        .main-layout{display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap;}
        .main-content{flex:2;min-width:0;}
        .sidebar{flex:1;min-width:260px;}
        .board-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
        .board-nav .board-btn{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);padding:4px 16px;border-radius:20px;cursor:pointer;font-size:0.85rem;transition:0.3s;}
        .board-nav .board-btn:hover{background:rgba(255,255,255,0.05);color:#fff;}
        .board-nav .board-btn.active{background:#6d5bff;color:#fff;border-color:#6d5bff;}
        .post-card{background:rgba(255,255,255,0.03);border-radius:12px;padding:16px 20px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.05);transition:0.3s;}
        .post-card:hover{border-color:rgba(255,255,255,0.12);}
        .post-card .post-title{font-size:1.1rem;font-weight:600;color:#e8edf5;cursor:pointer;}
        .post-card .post-title:hover{color:#a5b4fc;}
        .post-card .post-meta{color:rgba(255,255,255,0.35);font-size:0.8rem;margin:4px 0 8px;display:flex;align-items:center;gap:8px;}
        .post-card .post-meta .author-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;}
        .post-card .post-meta .author{color:#a5b4fc;}
        .post-card .post-excerpt{color:rgba(255,255,255,0.5);font-size:0.9rem;}
        .post-card .post-footer{display:flex;align-items:center;gap:16px;margin-top:10px;font-size:0.8rem;color:rgba(255,255,255,0.3);}
        .post-card .post-footer .like-btn{cursor:pointer;user-select:none;}
        .post-card .badge{padding:2px 10px;border-radius:30px;font-size:0.65rem;font-weight:600;}
        .post-card .badge.tech{background:rgba(96,165,250,0.15);color:#93bbfc;}
        .post-card .badge.life{background:rgba(52,211,153,0.12);color:#6ee7b7;}
        .post-card .badge.career{background:rgba(251,191,36,0.12);color:#fcd34d;}
        .post-card .badge.topic{background:rgba(251,191,36,0.15);color:#fcd34d;}
        .post-detail{background:rgba(255,255,255,0.04);padding:24px;border-radius:20px;border:1px solid rgba(255,255,255,0.06);margin-top:20px;}
        .post-detail .back-btn{background:rgba(255,255,255,0.06);border:1px solid #444;color:#e8edf5;padding:6px 16px;border-radius:30px;cursor:pointer;margin-bottom:16px;}
        .post-detail .post-author-info{display:flex;align-items:center;gap:12px;margin:8px 0;}
        .post-detail .post-author-info img{width:40px;height:40px;border-radius:50%;object-fit:cover;}
        .post-detail .post-author-info .author-name{color:#a5b4fc;font-weight:600;}
        .post-detail .post-time{color:rgba(255,255,255,0.3);font-size:0.85rem;}
        .post-detail .post-body{margin:16px 0;}
        .post-detail .post-body p{margin:8px 0;color:rgba(255,255,255,0.75);}
        .post-detail .post-body img{max-width:100%;border-radius:8px;margin:8px 0;}
        .post-detail .post-actions{display:flex;align-items:center;gap:20px;padding:12px 0;border-top:1px solid rgba(255,255,255,0.06);margin-top:12px;}
        .post-detail .post-actions .like-btn{cursor:pointer;user-select:none;}
        .reply-item{border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 0;}
        .reply-item .reply-author-info{display:flex;align-items:center;gap:8px;}
        .reply-item .reply-author-info img{width:28px;height:28px;border-radius:50%;object-fit:cover;}
        .reply-item .reply-author{color:#a5b4fc;font-weight:600;}
        .reply-item .reply-time{color:rgba(255,255,255,0.3);font-size:0.8rem;margin-left:10px;}
        .reply-item .reply-content{margin:4px 0 0;color:rgba(255,255,255,0.65);}
        .publish-form{display:none;background:rgba(255,255,255,0.04);padding:20px;border-radius:16px;margin-top:12px;border:1px solid rgba(255,255,255,0.06);}
        textarea,input,select{width:100%;padding:10px 14px;border-radius:12px;border:1px solid #444;background:rgba(255,255,255,0.05);color:#e8edf5;font-size:0.95rem;margin-top:6px;font-family:inherit;}

        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:999;}
        .modal.active{display:flex;}
        .modal-box{background:#1a1a2e;padding:30px;border-radius:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}

        .modal-box .close:hover{color:#fff;}
        .modal-tabs{display:flex;gap:8px;border-bottom:1px solid #333;padding-bottom:12px;margin-bottom:20px;}
        .modal-tabs button{flex:1;background:transparent;border:none;color:rgba(255,255,255,0.4);padding:8px 0;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;}

        .auth-form{display:none;flex-direction:column;gap:12px;}
        .auth-form.active{display:flex;}

        .social-btn:hover{transform:scale(1.02);}
        .google-btn{background:#fff;color:#333;}
        .github-btn{background:#24292e;color:#fff;}
        .divider{display:flex;align-items:center;gap:16px;color:rgba(255,255,255,0.3);}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#333;}
        .auth-switch{text-align:center;color:rgba(255,255,255,0.4);}
        .auth-switch a{color:#6d5bff;cursor:pointer;}
        .profile-avatar-preview{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #6d5bff;margin:0 auto 16px;display:block;}
        .profile-upload-btn{position:relative;display:inline-block;}

        .profile-form .form-group{margin-bottom:16px;}
        .profile-form label{display:block;color:rgba(255,255,255,0.6);margin-bottom:4px;font-size:0.9rem;}
        .profile-form .btn{width:100%;margin-top:8px;}
        footer{text-align:center;margin-top:40px;padding:20px;border-top:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.2);font-size:0.85rem;}
        .social-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:8px;}
        .social-links a{color:rgba(255,255,255,0.3);text-decoration:none;}
        .social-links a:hover{color:rgba(255,255,255,0.7);}
        .empty-state{padding:40px 20px;text-align:center;border:2px dashed rgba(255,255,255,0.08);border-radius:16px;margin:20px 0;}
        .empty-state h3{color:rgba(255,255,255,0.4);margin-bottom:8px;}
        .empty-state .btn{margin-top:12px;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;padding:12px 24px;border-radius:8px;border:1px solid #444;z-index:1000;display:none;max-width:90%;}
        .toast.show{display:block;animation:fadeIn 0.3s;}
        .toast.error{border-color:#ef4444;}
        @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
        @media (max-width:820px){.main-layout{flex-direction:column;}.sidebar{width:100%;}.search-box{width:100%;}}
    </style>
</head>
<body>
    <div class="container">
        <header>

    <script>
        // =============================================================
        // 1. 配置（硬编码，无需加载任何库）
        // =============================================================
        const SUPABASE_URL = 'https://bkvsceiezbyexzqpvblj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrdnNjZWllemJ5ZXh6cXB2YmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDk1MzIsImV4cCI6MjA5OTI4NTUzMn0.1h4Yp8YaJdMMOQW8N2zqvJi6QrxHPncBFMK9LjdmZ6E';

        // =============================================================
        // 2. 全局状态
        // =============================================================
        let currentUser = null;
        let userProfile = null;
        let accessToken = null;
        let postsCache = [];
        let topicsCache = [];
        let currentCategory = 'all';
        let isSubmitting = false;
        let isAdmin = false;

        // =============================================================
        // 3. 工具函数（使用 fetch）
        // =============================================================
        function formatDate(d) {
            if (!d) return '';
            return new Date(d).toLocaleDateString('zh-CN');
        }
        function formatTime(d) {
            if (!d) return '';
            return new Date(d).toLocaleString('zh-CN');
        }
        function getAvatarUrl(user) {
            if (user && user.avatar_url) return user.avatar_url;
            const name = user?.username || user?.email || 'U';
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6d5bff&color=fff&size=100`;
        }
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            clearTimeout(t._hide);
            t._hide = setTimeout(() => { t.className = 'toast'; }, 4000);
        }

        function getHeaders(includeAuth = true) {
            const headers = {
                'apikey': SUPABASE_ANON_KEY,
                'Content-Type': 'application/json'
            };
            if (includeAuth && accessToken) {
                headers['Authorization'] = 'Bearer ' + accessToken;
            }
            return headers;
        }

        async function handleResponse(res) {
            const text = await res.text();
            let json = null;
            try { json = JSON.parse(text); } catch(e) {}
            if (!res.ok) {
                console.error('HTTP Error:', res.status, res.statusText);
                console.error('Response body:', text);
                const msg = json?.error_description || json?.message || json?.error || text || '请求失败';
                throw new Error(msg);
            }
            return json || text;
        }

        // =============================================================
        // 4. API 调用（纯 fetch）
        // =============================================================
        async function signIn(email, password) {
            const resp = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
                method: 'POST',
                headers: getHeaders(false),
                body: JSON.stringify({ email, password })
            });
            return await handleResponse(resp);
        }

        async function signUp(email, password, username) {
            const resp = await fetch(SUPABASE_URL + '/auth/v1/signup', {
                method: 'POST',
                headers: getHeaders(false),
                body: JSON.stringify({ email, password, data: { username } })
            });
            return await handleResponse(resp);
        }

        async function getProfile(userId) {
            const resp = await fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId, {
                headers: getHeaders(true)
            });
            if (resp.status === 404) return null;
            const data = await handleResponse(resp);
            return data && data.length > 0 ? data[0] : null;
        }

        async function upsertProfile(data) {
            const resp = await fetch(SUPABASE_URL + '/rest/v1/profiles', {
                method: 'POST',

        // =============================================================
        // 5. 点赞核心（修复版）
        // =============================================================
        async function toggleLike(postId, userId) {
            const numericPostId = parseInt(postId);
            const userIdStr = String(userId);

            try {
                const checkUrl = `${SUPABASE_URL}/rest/v1/likes?post_id=eq.${numericPostId}&user_id=eq.${userIdStr}`;
                const checkResp = await fetch(checkUrl, { headers: getHeaders(true) });
                let existing = [];
                try {
                    existing = await checkResp.json();
                } catch (e) {
                    existing = [];
                }

                if (existing && existing.length > 0) {
                    const deleteUrl = `${SUPABASE_URL}/rest/v1/likes?id=eq.${existing[0].id}`;
                    const deleteResp = await fetch(deleteUrl, { method: 'DELETE', headers: getHeaders(true) });
                    if (deleteResp.ok) {
                        return 'unliked';
                    } else {
                        throw new Error(`取消点赞失败 (HTTP ${deleteResp.status})`);
                    }
                }

                const insertResp = await fetch(`${SUPABASE_URL}/rest/v1/likes`, {
                    method: 'POST',
                    headers: getHeaders(true),
                    body: JSON.stringify({ post_id: numericPostId, user_id: userIdStr })
                });
                if (insertResp.status === 201 || insertResp.status === 200) {
                    return 'liked';
                }
                if (insertResp.status === 409) {
                    console.warn('检测到冲突，执行强制切换...');
                    await fetch(`${SUPABASE_URL}/rest/v1/likes?post_id=eq.${numericPostId}&user_id=eq.${userIdStr}`, {
                        method: 'DELETE',
                        headers: getHeaders(true)
                    });
                    const retryResp = await fetch(`${SUPABASE_URL}/rest/v1/likes`, {
                        method: 'POST',
                        headers: getHeaders(true),
                        body: JSON.stringify({ post_id: numericPostId, user_id: userIdStr })
                    });
                    if (retryResp.status === 201 || retryResp.status === 200) {
                        return 'liked';
                    } else {
                        throw new Error(`强制切换失败 (HTTP ${retryResp.status})`);
                    }
                }
                const text = await insertResp.text();
                throw new Error(`点赞失败: ${insertResp.status} - ${text}`);
            } catch (error) {
                console.error('toggleLike 错误:', error);
                throw error;
            }
        }

        // =============================================================
        // 6. 点赞处理函数
        // =============================================================
        async function handleLike(postId) {
            if (!currentUser) {
                showToast('请先登录', true);
                return;
            }
            try {
                const result = await toggleLike(postId, currentUser.id);
                const numericId = parseInt(postId);
                const post = postsCache.find(p => parseInt(p.id) === numericId);
                if (post) {
                    if (result === 'liked') {
                        post.likes = (post.likes || 0) + 1;
                    } else {
                        post.likes = Math.max((post.likes || 0) - 1, 0);
                    }
                }
                const keyword = document.getElementById('searchInput').value.trim();
                const filtered = getFilteredPosts(currentCategory, keyword);
                renderPosts(filtered);
                renderHotList(postsCache);
                const detailArea = document.getElementById('detailArea');
                if (!detailArea.classList.contains('hidden')) {
                    await showPost(postId);
                }
                showToast(result === 'liked' ? '❤️ 点赞成功！' : '已取消点赞');
            } catch (err) {
                showToast('操作失败：' + err.message, true);
                console.error(err);
            }
        }

        // =============================================================
        // 7. 帖子列表相关
        // =============================================================
        function getFilteredPosts(category, keyword = '') {
            let filtered = postsCache;
            if (category !== 'all') filtered = filtered.filter(p => p.category === category);
            if (keyword) {
                const kw = keyword.toLowerCase();
                filtered = filtered.filter(p =>
                    p.title.toLowerCase().includes(kw) ||
                    (p.excerpt && p.excerpt.toLowerCase().includes(kw)) ||
                    (p.content && p.content.toLowerCase().includes(kw))
                );
            }
            return filtered;
        }

        async function loadPosts(category = 'all', keyword = '') {
            const list = document.getElementById('postList');
            list.innerHTML = '<div class="empty-state">⏳ 加载中...</div>';
            try {
                const data = await fetchPosts();
                postsCache = data || [];
                const filtered = getFilteredPosts(category, keyword);
                renderPosts(filtered);
                renderHotList(postsCache);
                updateStats();
            } catch (err) {
                list.innerHTML = `
                    <div class="empty-state">
                        ❌ ${err.message}
                        <br>
                        <button class="btn" onclick="loadPosts('${category}')">🔄 重试</button>
                    </div>
                `;
                console.error(err);
            }
        }

        function renderPosts(posts) {
            const list = document.getElementById('postList');
            if (!posts || posts.length === 0) {
                list.innerHTML = '<div class="empty-state"><h3>📭 还没有帖子</h3><p style="color:rgba(255,255,255,0.3);">登录后点击「发帖」开始讨论！</p></div>';
                return;
            }
            const catMap = { tech: '科技', life: '生活', career: '职场', '闲聊': '闲聊' };
            list.innerHTML = posts.map(p => {
                const badgeClass = ['tech','life','career','闲聊'].includes(p.category) ? 'badge ' + p.category : 'badge topic';
                const badgeText = catMap[p.category] || p.category || '闲聊';
                const avatar = p.author_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.author_name||'U')}&background=6d5bff&color=fff&size=30`;
                return `
                    <div class="post-card">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;">
                            <span class="post-title" onclick="showPost('${p.id}')">${p.title}</span>
                            <span class="${badgeClass}" style="flex-shrink:0;margin-top:2px;">${badgeText}</span>
                        </div>
                        <div class="post-meta">
                            <img class="author-avatar" src="${avatar}" alt="${p.author_name||'用户'}" />
                            <span class="author">${p.author_name || '匿名'}</span>
                            <span>· ${formatDate(p.created_at)}</span>
                        </div>
                        <div class="post-excerpt">${p.excerpt || (p.content ? p.content.replace(/<[^>]+>/g,'').slice(0,80)+'...' : '')}</div>
                        <div class="post-footer">
                            <span class="like-btn" onclick="handleLike('${p.id}')" id="like-btn-${p.id}">❤️ <span id="like-count-${p.id}">${p.likes || 0}</span></span>
                            <span>💬 ${p.comment_count || 0}</span>
                            <span>👁️ ${p.views || 0}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // =============================================================
        // 8. 热度榜渲染函数（新增）
        // =============================================================
        function renderHotList(posts) {
            const container = document.getElementById('hotContent');
            if (!container) return;
            const sorted = [...posts].sort((a, b) => (b.likes || 0) - (a.likes || 0));
            const top = sorted.slice(0, 5);
            if (!top.length) {
                container.innerHTML = '<p style="color:rgba(255,255,255,0.2);font-size:0.9rem;">暂无帖子</p>';
                return;
            }
            const emojis = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
            container.innerHTML = top.map((p, i) => {
                const emoji = emojis[i] || `#${i+1}`;
                return `
                    <div class="hot-item">
                        <a href="#" onclick="showPost('${p.id}');return false;">
                            <span><span class="hot-num">${emoji}</span> ${p.title}</span>
                            <span>❤️ ${p.likes || 0}</span>
                        </a>
                    </div>
                `;
            }).join('');
        }

                const data = await resp.json();
                document.getElementById('statUsers').textContent = data?.length || 0;
            } catch(e) {}
            document.getElementById('statTopics').textContent = topicsCache.length;
        }
