<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窍某论坛</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0b0e1a;color:#e8edf5;font-family:'Segoe UI',sans-serif;padding:20px;line-height:1.6;}
        .container{max-width:1200px;margin:0 auto;}
        header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
        h1{background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.8rem;margin:0;}
        .nav-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
        .search-box{padding:8px 16px;border-radius:30px;border:1px solid #444;background:rgba(255,255,255,0.05);color:#fff;width:200px;}
        .btn{background:linear-gradient(135deg,#6d5bff,#8b5cf6);color:#fff;border:none;padding:6px 18px;border-radius:30px;cursor:pointer;font-size:0.9rem;}
        .btn-outline{background:transparent;border:1px solid #444;}
        .btn-outline:hover{background:rgba(255,255,255,0.05);}
        .auth-section{display:flex;align-items:center;gap:8px;}
        .user-avatar{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);}
        .user-name{color:rgba(255,255,255,0.6);}
        .logout-btn{background:transparent;border:1px solid #444;color:rgba(255,255,255,0.4);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.75rem;}
        .logout-btn:hover{border-color:#ef4444;color:#ef4444;}

        #adminLink{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;border:1px solid rgba(255,255,255,0.1);padding:4px 12px;border-radius:20px;display:none;}

        /* 论坛布局 */

        .board-nav .board-btn.active{background:#6d5bff;color:#fff;border-color:#6d5bff;}

        /* 帖子卡片（论坛风格） */
        .post-card{background:rgba(255,255,255,0.03);border-radius:12px;padding:16px 20px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.05);transition:0.3s;}

        .post-card .post-title{font-size:1.1rem;font-weight:600;color:#e8edf5;text-decoration:none;cursor:pointer;}
        .post-card .post-title:hover{color:#a5b4fc;}
        .post-card .post-meta{color:rgba(255,255,255,0.35);font-size:0.8rem;margin:4px 0 8px;}
        .post-card .post-meta .author{color:#a5b4fc;}
        .post-card .post-excerpt{color:rgba(255,255,255,0.5);font-size:0.9rem;}
        .post-card .post-footer{display:flex;align-items:center;gap:16px;margin-top:10px;font-size:0.8rem;color:rgba(255,255,255,0.3);}
        .post-card .post-footer .like-btn{cursor:pointer;user-select:none;color:rgba(255,255,255,0.4);}
        .post-card .post-footer .like-btn.liked{color:#ef4444;}
        .post-card .badge{padding:2px 10px;border-radius:30px;font-size:0.65rem;font-weight:600;}
        .post-card .badge.tech{background:rgba(96,165,250,0.15);color:#93bbfc;}
        .post-card .badge.life{background:rgba(52,211,153,0.12);color:#6ee7b7;}
        .post-card .badge.career{background:rgba(251,191,36,0.12);color:#fcd34d;}
        .post-card .badge.topic{background:rgba(251,191,36,0.15);color:#fcd34d;}

        /* 帖子详情 */
        .post-content{background:rgba(255,255,255,0.04);padding:24px;border-radius:20px;border:1px solid rgba(255,255,255,0.06);margin-top:20px;}

        .post-content .post-author{color:#a5b4fc;font-weight:600;}
        .post-content .post-time{color:rgba(255,255,255,0.3);font-size:0.85rem;margin-left:12px;}

        /* 回复列表 */

        .reply-item .reply-author{color:#a5b4fc;font-weight:600;}
        .reply-item .reply-time{color:rgba(255,255,255,0.3);font-size:0.8rem;margin-left:10px;}
        .reply-item .reply-content{margin:4px 0 0;color:rgba(255,255,255,0.65);}

        /* 发帖表单 */

        textarea:focus,input:focus,select:focus{outline:none;border-color:#6d5bff;}

        /* 侧边栏热门 */

        .hot-item a{color:rgba(255,255,255,0.7);text-decoration:none;display:flex;justify-content:space-between;font-size:0.9rem;}
        .hot-item a:hover{color:#fff;}
        .hot-item .hot-num{color:#fcd34d;font-weight:700;margin-right:6px;}

        /* 模态框 */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:999;}
        .modal.active{display:flex;}
        .modal-box{background:#1a1a2e;padding:30px;border-radius:20px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
        .modal-box .close{position:absolute;top:12px;right:20px;font-size:1.8rem;cursor:pointer;color:rgba(255,255,255,0.4);}
        .modal-box .close:hover{color:#fff;}
        .modal-tabs{display:flex;gap:8px;border-bottom:1px solid #333;padding-bottom:12px;margin-bottom:20px;}
        .modal-tabs button{flex:1;background:transparent;border:none;color:rgba(255,255,255,0.4);padding:8px 0;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;}
        .modal-tabs button.active{color:#fff;border-bottom-color:#6d5bff;}
        .auth-form{display:none;flex-direction:column;gap:12px;}
        .auth-form.active{display:flex;}
        .social-btn{padding:10px;border-radius:12px;border:none;font-weight:600;cursor:pointer;text-align:center;}
        .google-btn{background:#fff;color:#333;}
        .github-btn{background:#24292e;color:#fff;}
        .divider{display:flex;align-items:center;gap:16px;color:rgba(255,255,255,0.3);}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#333;}
        .auth-switch{text-align:center;color:rgba(255,255,255,0.4);}
        .auth-switch a{color:#6d5bff;cursor:pointer;}

        footer{text-align:center;margin-top:40px;padding:20px;border-top:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.2);font-size:0.85rem;}
        .social-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:8px;}
        .social-links a{color:rgba(255,255,255,0.3);text-decoration:none;}
        .social-links a:hover{color:rgba(255,255,255,0.7);}
        .empty-state{padding:40px 20px;text-align:center;border:2px dashed rgba(255,255,255,0.08);border-radius:16px;margin:20px 0;}
        .empty-state h3{color:rgba(255,255,255,0.4);margin-bottom:8px;}

        @media (max-width:820px){.main-layout{flex-direction:column;}.sidebar{width:100%;}.search-box{width:100%;}nav{flex-direction:column;align-items:stretch;}.nav-controls{flex-wrap:wrap;justify-content:center;}}
    </style>
</head>

<!-- 新建版块模态框 -->
<div class="modal" id="topicModal">
    <div class="modal-box">
        <span class="close" onclick="closeTopicModal()">&times;</span>
        <h2>🏷️ 新建版块</h2>
        <p style="color:rgba(255,255,255,0.4);margin-bottom:16px;">输入新版块名称，创建后即可在发帖时选择</p>
        <input type="text" id="newTopicName" maxlength="30" placeholder="版块名称（限30字符）" />
        <button class="btn" onclick="createTopic()" style="margin-top:12px;width:100%;">创建版块</button>
        <div id="topicMsg" style="margin-top:8px;"></div>
    </div>

<script>
// =============================================================
// 🔥 Firebase 配置
// =============================================================
const firebaseConfig = {
    apiKey: "AIzaSyB8ZalWGiP8at0EUIfKN46CbwQ3eH4iM8E",
    authDomain: "project-170416828695178494.firebaseapp.com",
    projectId: "project-170416828695178494",
    storageBucket: "project-170416828695178494.firebasestorage.app",
    messagingSenderId: "1096326612519",
    appId: "1:1096326612519:web:8208916652738ce870f002",
    measurementId: "G-3K0YDFV3J5"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// =============================================================
// 状态
// =============================================================
let postsCache = [];
let currentCategory = 'all';
let currentUser = null;
let isPopupOpen = false;
let isSubmitting = false;
let lastSubmitTime = 0;
let topicsCache = [];

// =============================================================
// 格式化
// =============================================================
function formatDate(date) {
    if (!date) return '';
    if (date.seconds) return new Date(date.seconds * 1000).toLocaleDateString('zh-CN');
    if (date instanceof Date) return date.toLocaleDateString('zh-CN');
    return new Date(date).toLocaleDateString('zh-CN');
}
function formatTime(date) {
    if (!date) return '';
    if (date.seconds) return new Date(date.seconds * 1000).toLocaleString('zh-CN');
    if (date instanceof Date) return date.toLocaleString('zh-CN');
    return new Date(date).toLocaleString('zh-CN');
}

// =============================================================
// 话题/版块管理
// =============================================================
async function loadTopics() {
    try {
        const snapshot = await db.collection('topics').orderBy('name').get();
        topicsCache = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            data.id = doc.id;
            topicsCache.push(data);
        });
        updateBoardNav();
        updateCategorySelect();
        updateStats();
    } catch (e) { console.warn(e); }
}

function updateBoardNav() {
    const container = document.getElementById('dynamicBoards');
    if (!container) return;
    let html = '';
    topicsCache.forEach(t => {
        const name = t.name;
        html += `<button class="board-btn" data-cat="${encodeURIComponent(name)}" onclick="setCategory('${encodeURIComponent(name)}')">🏷️ ${name}</button>`;
    });
    container.innerHTML = html;
    // 重新绑定点击事件（已通过 onclick 属性绑定）
}

function updateCategorySelect() {
    const select = document.getElementById('newCategory');
    const fixed = ['tech','life','career'];
    const opts = select.querySelectorAll('option');
    opts.forEach(o => { if(!fixed.includes(o.value)) o.remove(); });
    topicsCache.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.name;
        opt.textContent = '🏷️ ' + t.name;
        select.appendChild(opt);
    });
}

function updateStats() {
    document.getElementById('statPosts').textContent = postsCache.length;
    document.getElementById('statTopics').textContent = topicsCache.length;
    // 其他统计在 loadPosts 和 loadComments 中更新
}

function openNewTopic() {
    document.getElementById('topicModal').classList.add('active');
    document.getElementById('newTopicName').value = '';
    document.getElementById('topicMsg').innerHTML = '';
}
function closeTopicModal() { document.getElementById('topicModal').classList.remove('active'); }

async function createTopic() {
    const name = document.getElementById('newTopicName').value.trim();
    const msg = document.getElementById('topicMsg');
    if (!name) { msg.innerHTML = '<p style="color:#ef4444;">请输入版块名称</p>'; return; }
    if (name.length > 30) { msg.innerHTML = '<p style="color:#ef4444;">名称不能超过30字符</p>'; return; }
    if (topicsCache.some(t => t.name === name)) { msg.innerHTML = '<p style="color:#ef4444;">该版块已存在</p>'; return; }
    try {
        await db.collection('topics').add({ name, created_at: firebase.firestore.FieldValue.serverTimestamp() });
        msg.innerHTML = '<p style="color:#6ee7b7;">✅ 版块创建成功！</p>';
        await loadTopics();
        document.getElementById('newTopicName').value = '';
        setTimeout(closeTopicModal, 1000);
    } catch(e) { msg.innerHTML = '<p style="color:#ef4444;">创建失败：'+e.message+'</p>'; }
}

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.board-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === cat || b.dataset.cat === decodeURIComponent(cat));
    });
    const keyword = document.getElementById('searchInput').value.trim();
    loadPosts(cat, keyword);
}

// =============================================================
// 加载帖子
// =============================================================
async function loadPosts(category = 'all', keyword = '') {
    try {
        let query = db.collection('posts').orderBy('created_at', 'desc');
        if (category !== 'all') {
            query = query.where('category', '==', category);
        }
        const snapshot = await query.get();
        postsCache = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            data.id = doc.id;
            postsCache.push(data);
        });
    } catch(e) { console.error(e); postsCache = []; }

    let filtered = postsCache;
    if (category !== 'all') {
        filtered = filtered.filter(p => p.category === category);
    }
    if (keyword) {
        const kw = keyword.toLowerCase();
        filtered = filtered.filter(p =>
            p.title.toLowerCase().includes(kw) ||
            (p.excerpt && p.excerpt.toLowerCase().includes(kw)) ||
            (p.content && p.content.toLowerCase().includes(kw))
        );
    }
    renderPostList(filtered);
    renderHotList();
    updateStats();
    setTimeout(updateAllLikes, 100);
}

// =============================================================
// 渲染帖子列表
// =============================================================
function renderPostList(posts) {
    const list = document.getElementById('postList');
    if (!posts || posts.length === 0) {
        list.innerHTML = `<div class="empty-state"><h3>📭 还没有帖子</h3><p style="color:rgba(255,255,255,0.3);">登录后点击「发帖」开始讨论！</p></div>`;
        return;
    }
    const catMap = { tech:'科技', life:'生活', career:'职场' };
    list.innerHTML = posts.map(p => {
        const badgeClass = ['tech','life','career'].includes(p.category) ? `badge ${p.category}` : 'badge topic';
        const badgeText = catMap[p.category] || p.category;
        return `
            <div class="post-card">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;">
                    <span class="post-title" onclick="showPost('${p.id}')">${p.title}</span>
                    <span class="badge ${badgeClass}" style="flex-shrink:0;margin-top:2px;">${badgeText}</span>
                </div>
                <div class="post-meta">
                    <span class="author">${p.author_name || '匿名'}</span>
                    <span> · ${formatDate(p.created_at)}</span>
                </div>
                <div class="post-excerpt">${p.excerpt || (p.content ? p.content.replace(/<[^>]+>/g,'').slice(0,80)+'...' : '')}</div>
                <div class="post-footer">
                    <span class="like-btn" onclick="toggleLike('${p.id}')" id="like-btn-${p.id}">❤️ <span id="like-count-${p.id}">${p.likes || 0}</span></span>
                    <span>💬 ${p.commentCount || 0}</span>
                    <span>👁️ ${p.views || 0}</span>
                </div>
            </div>
        `;
    }).join('');
    // 更新评论数（异步加载）
    updateCommentCounts();
}

// =============================================================
// 更新评论数
// =============================================================
async function updateCommentCounts() {
    for (const post of postsCache) {
        try {
            const snap = await db.collection('comments').where('post_id', '==', post.id).get();
            post.commentCount = snap.size;
        } catch(e) {}
    }
    // 重新渲染列表（只更新评论数）
    // 简单起见，已在内联中显示，但每次加载都会重新获取
}

// =============================================================
// 热门帖子
// =============================================================
function renderHotList() {
    const container = document.getElementById('hotContent');
    if (!container) return;
    const sorted = [...postsCache].sort((a,b) => (b.likes||0) - (a.likes||0));
    const top = sorted.slice(0,5);
    if (!top.length) { container.innerHTML = '<p style="color:rgba(255,255,255,0.2);font-size:0.9rem;">暂无帖子</p>'; return; }
    let html = '';
    top.forEach((p, i) => {
        const emoji = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
        html += `<div class="hot-item"><a href="#" onclick="showPost('${p.id}');return false;"><span><span class="hot-num">${emoji}</span> ${p.title}</span><span>❤️ ${p.likes||0}</span></a></div>`;
    });
    container.innerHTML = html;
}

// =============================================================
// 显示帖子详情
// =============================================================
async function showPost(postId) {
    const post = postsCache.find(p => p.id === postId);
    if (!post) { alert('帖子不存在'); return; }

    document.getElementById('postList').style.display = 'none';
    const area = document.getElementById('detailArea');
    area.classList.remove('hidden');

    area.innerHTML = `
        <div class="post-content">
            <button class="back-btn" onclick="backToList()">← 返回列表</button>
            <h1 style="font-size:1.6rem;">${post.title}</h1>
            <div style="color:rgba(255,255,255,0.4);font-size:0.9rem;">
                <span class="post-author">${post.author_name || '匿名'}</span>
                <span class="post-time">${formatTime(post.created_at)}</span>
                <span style="margin-left:12px;">👁️ ${post.views || 0}</span>
            </div>
            <div class="post-body">${post.content}</div>
            <div class="post-actions">
                <span class="like-btn" onclick="toggleLike('${postId}')" id="like-btn-detail-${postId}">❤️ <span id="like-count-detail-${postId}">${post.likes || 0}</span></span>
                <span>💬 回复 <span id="reply-count">0</span></span>
            </div>
            <hr style="border-color:#333;margin:16px 0;" />
            <h3 style="margin-bottom:12px;">💬 全部回复</h3>
            <div id="commentsArea"><p style="color:rgba(255,255,255,0.3);">加载中...</p></div>
            ${currentUser ? `
                <div style="margin-top:16px;">
                    <textarea id="commentInput" rows="3" maxlength="2000" placeholder="写下你的回复..."></textarea>
                    <button class="btn" onclick="publishComment('${postId}')" id="commentSubmitBtn" style="margin-top:8px;">发表回复</button>
                </div>
            ` : '<p style="color:rgba(255,255,255,0.3);margin-top:12px;">登录后即可回复</p>'}
        </div>
    `;

    // 加载回复
    try {
        const snap = await db.collection('comments').where('post_id','==',postId).orderBy('created_at','asc').get();
        const areaC = document.getElementById('commentsArea');
        const replyCount = document.getElementById('reply-count');
        if (snap.empty) {
            areaC.innerHTML = '<p style="color:rgba(255,255,255,0.3);">还没有回复，来抢沙发！</p>';
            if (replyCount) replyCount.textContent = '0';
        } else {
            let html = '';
            snap.forEach(doc => {
                const d = doc.data();
                const t = d.created_at && d.created_at.toDate ? d.created_at.toDate().toLocaleString() : '';
                html += `<div class="reply-item"><span class="reply-author">${d.username || '用户'}</span><span class="reply-time">${t}</span><div class="reply-content">${d.content}</div></div>`;
            });
            areaC.innerHTML = html;
            if (replyCount) replyCount.textContent = snap.size;
        }
    } catch(e) { console.error(e); }

    // 增加浏览量
    try {
        await db.collection('posts').doc(postId).update({ views: firebase.firestore.FieldValue.increment(1) });
        post.views = (post.views || 0) + 1;
    } catch(e) {}
    await updateLikeUI(postId);
    window.scrollTo({ top: 0 });
}

// =============================================================
// 回复功能
// =============================================================
async function publishComment(postId) {
    if (isSubmitting) { alert('请勿重复提交'); return; }
    const now = Date.now();
    if (now - lastSubmitTime < 5000) { alert('操作频繁，请等待5秒'); return; }
    const input = document.getElementById('commentInput');
    if (!input) return;
    const content = input.value.trim();
    if (!content) { alert('请输入回复内容'); return; }
    if (content.length > 2000) { alert('回复不能超过2000字符'); return; }
    if (!currentUser) { alert('请先登录'); return; }

    isSubmitting = true; lastSubmitTime = now;
    const btn = document.getElementById('commentSubmitBtn');
    if (btn) btn.disabled = true;

    try {
        await db.collection('comments').add({
            post_id: postId,
            user_id: currentUser.uid,
            username: currentUser.displayName || currentUser.email,
            content: content,
            created_at: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = '';
        showPost(postId); // 刷新
        alert('回复成功！');
    } catch(e) { alert('回复失败：'+e.message); }
    finally { isSubmitting = false; if(btn) btn.disabled = false; }
}

function backToList() {
    document.getElementById('postList').style.display = 'block';
    document.getElementById('detailArea').classList.add('hidden');
    document.getElementById('detailArea').innerHTML = '';
    loadPosts(currentCategory);
}

// =============================================================
// 点赞
// =============================================================
async function toggleLike(postId) {
    if (!currentUser) { alert('请先登录'); return; }
    const likeRef = db.collection('likes').doc(`${currentUser.uid}_${postId}`);
    const postRef = db.collection('posts').doc(postId);
    try {
        const doc = await likeRef.get();
        if (doc.exists) {
            await likeRef.delete();
            await postRef.update({ likes: firebase.firestore.FieldValue.increment(-1) });
            const p = postsCache.find(p => p.id === postId);
            if (p) p.likes = Math.max((p.likes||0)-1,0);
        } else {
            await likeRef.set({ userId: currentUser.uid, postId, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            await postRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
            const p = postsCache.find(p => p.id === postId);
            if (p) p.likes = (p.likes||0)+1;
        }
        await updateLikeUI(postId);
        renderHotList();
    } catch(e) { console.error(e); alert('操作失败'); }
}

async function updateLikeUI(postId) {
    const p = postsCache.find(p => p.id === postId);
    if (!p) return;
    ['','-detail'].forEach(suffix => {
        const el = document.getElementById(`like-count${suffix}-${postId}`);
        if (el) el.textContent = p.likes || 0;
    });
    if (currentUser) {
        const likeRef = db.collection('likes').doc(`${currentUser.uid}_${postId}`);
        const doc = await likeRef.get();
        document.querySelectorAll(`#like-btn${suffix}-${postId}`).forEach(el => {
            el.style.color = doc.exists ? '#ef4444' : '';
        });
    }
}
async function updateAllLikes() {
    if (!currentUser) return;
    for (const p of postsCache) {
        const likeRef = db.collection('likes').doc(`${currentUser.uid}_${p.id}`);
        const doc = await likeRef.get();
        document.querySelectorAll(`#like-btn-${p.id}, #like-btn-detail-${p.id}`).forEach(el => {
            el.style.color = doc.exists ? '#ef4444' : '';
        });
    }
}

function togglePublish() {
    const form = document.getElementById('publishForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function publishPost() {
    if (isSubmitting) { alert('请勿重复提交'); return; }
    const now = Date.now();
    if (now - lastSubmitTime < 10000) { alert('操作频繁，请等待10秒'); return; }
    if (!currentUser) { alert('请先登录'); return; }
    const title = document.getElementById('newTitle').value.trim();
    const content = document.getElementById('newContent').value.trim();
    const excerpt = document.getElementById('newExcerpt').value.trim();
    const category = document.getElementById('newCategory').value;
    if (!title) { alert('请输入标题'); return; }
    if (title.length > 100) { alert('标题不能超过100字符'); return; }
    if (!content) { alert('请输入正文'); return; }
    if (content.length > 50000) { alert('正文过长'); return; }
    if (excerpt.length > 300) { alert('摘要过长'); return; }

    isSubmitting = true; lastSubmitTime = now;
    const btn = document.getElementById('publishBtn');
    if (btn) btn.disabled = true;

    try {
        await db.collection('posts').add({
            title, content, excerpt, category,
            cover_image: 'https://picsum.photos/seed/'+Date.now()+'/800/400',
            author_name: currentUser.displayName || currentUser.email,
            views: 0, likes: 0,
            created_at: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('发帖成功！🎉');
        document.getElementById('newTitle').value = '';
        document.getElementById('newContent').value = '';
        document.getElementById('newExcerpt').value = '';
        loadPosts(currentCategory);
    } catch(e) { alert('发帖失败：'+e.message); }
    finally { isSubmitting = false; if(btn) btn.disabled = false; }
}

function openModal(){document.getElementById('authModal').classList.add('active');}
function closeModal(){document.getElementById('authModal').classList.remove('active');}
document.getElementById('authModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

function switchTab(tab){
    document.querySelectorAll('.modal-tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
    document.getElementById('loginForm').classList.toggle('active',tab==='login');
    document.getElementById('registerForm').classList.toggle('active',tab==='register');
    document.getElementById('modalTitle').textContent=tab==='login'?'欢迎回来':'创建账号';
    document.getElementById('modalSub').textContent=tab==='login'?'登录你的账号':'加入窍某论坛';
}

async function handleLogin(e){
    e.preventDefault();
    const email=document.getElementById('loginEmail').value.trim();
    const pass=document.getElementById('loginPassword').value.trim();
    if(!email||!pass){alert('请填写完整');return;}
    try{await auth.signInWithEmailAndPassword(email,pass);closeModal();loadPosts(currentCategory);}
    catch(err){alert(err.message);}
}
async function handleRegister(e){
    e.preventDefault();
    const name=document.getElementById('regName').value.trim();
    const email=document.getElementById('regEmail').value.trim();
    const pass=document.getElementById('regPassword').value;
    const confirm=document.getElementById('regConfirm').value;
    if(!name||!email||!pass||!confirm){alert('请填写完整');return;}
    if(pass!==confirm){alert('密码不一致');return;}
    if(pass.length<6){alert('密码至少6位');return;}
    if(name.length>30){alert('昵称过长');return;}
    try{
        const cred=await auth.createUserWithEmailAndPassword(email,pass);
        await cred.user.updateProfile({displayName:name});
        closeModal();alert('注册成功！');loadPosts(currentCategory);
    }catch(err){alert(err.message);}
}
async function handleSocialLogin(provider){
    if(isPopupOpen)return;
    isPopupOpen=true;
    let prov=provider==='google'?new firebase.auth.GoogleAuthProvider():provider==='github'?new firebase.auth.GithubAuthProvider():null;
    if(!prov)return;
    try{
        const result=await auth.signInWithPopup(prov);
        const user=result.user;
        const userRef=db.collection('users').doc(user.uid);
        const doc=await userRef.get();
        if(!doc.exists){
            await userRef.set({
                username:user.displayName||(provider==='google'?'Google用户':'GitHub用户'),
                email:user.email,
                avatar_url:user.photoURL||null,
                created_at:firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        closeModal();loadPosts(currentCategory);
    }catch(err){if(err.code!=='auth/cancelled-popup-request')alert('登录失败：'+err.message);}
    finally{isPopupOpen=false;}
}
async function logout(){await auth.signOut();loadPosts(currentCategory);}

function toggleTheme(){
    const body=document.body;
    const btn=document.getElementById('themeToggle');
    if(body.style.background==='#f0f2f8'){
        body.style.background='#0b0e1a';body.style.color='#e8edf5';btn.textContent='🌙';
        document.querySelectorAll('.post-card,.publish-form,.post-content,.modal-box').forEach(el=>el.style.background='rgba(255,255,255,0.04)');
    }else{
        body.style.background='#f0f2f8';body.style.color='#1a1a2e';btn.textContent='☀️';
        document.querySelectorAll('.post-card,.publish-form,.post-content,.modal-box').forEach(el=>el.style.background='rgba(255,255,255,0.7)');
    }
}
