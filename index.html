            align-items: center;

<body>
<div class="container">
    <header>
        <h1>✦ 窍某博客网</h1>
        <div class="nav-controls">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索文章..." onkeyup="searchPosts()" />
            <button class="btn btn-outline" onclick="toggleTheme()" id="themeToggle">🌙</button>
            <div class="auth-section">
                <button class="btn" id="loginBtn" onclick="openModal()">登录</button>
                <img id="userAvatar" class="user-avatar hidden" alt="头像" />
                <span id="userName" class="user-name hidden"></span>
                <button class="logout-btn hidden" id="logoutBtn" onclick="logout()">退出</button>
                <a id="adminLink" href="admin.html">⚙️ 管理</a>
            </div>
        </div>
        <div>
            <button class="btn btn-outline cat-btn active" data-cat="all">全部</button>
            <button class="btn btn-outline cat-btn" data-cat="tech">科技</button>
            <button class="btn btn-outline cat-btn" data-cat="life">生活</button>
            <button class="btn btn-outline cat-btn" data-cat="career">职场</button>
        </div>
    </header>

    <button class="btn" onclick="togglePublish()">📝 发布新文章</button>
    <div class="publish-form" id="publishForm">
        <h3>发布新文章</h3>
        <input type="text" id="newTitle" placeholder="标题" />
        <input type="text" id="newExcerpt" placeholder="摘要（可选）" />
        <select id="newCategory">
            <option value="tech">科技</option>
            <option value="life">生活</option>
            <option value="career">职场</option>
        </select>
        <textarea id="newContent" rows="6" placeholder="正文内容"></textarea>
        <button class="btn" onclick="publishPost()">提交文章</button>
    </div>

    <hr style="border-color:#333;margin:20px 0;" />
    <h2>📖 最新文章</h2>
    <div id="postList"></div>
    <div id="detailArea" class="hidden"></div>
</div>

<footer>

    <p>© 2026 窍某博客网</p>
</footer>

<!-- 登录模态框 -->
<div class="modal" id="authModal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">欢迎回来</h2>
        <p class="sub" id="modalSub">登录你的账号</p>
        <div class="modal-tabs">
            <button class="active" data-tab="login" onclick="switchTab('login')">登录</button>
            <button data-tab="register" onclick="switchTab('register')">注册</button>
        </div>
        <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
            <label for="loginEmail">邮箱地址</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required />
            <label for="loginPassword">密码</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
            <button type="submit" class="btn">登录</button>
            <div class="divider">或</div>
            <button type="button" class="social-btn google-btn" onclick="handleSocialLogin('google')">🔵 Google</button>
            <button type="button" class="social-btn github-btn" onclick="handleSocialLogin('github')">🐙 GitHub</button>
            <div class="auth-switch">还没有账号？ <a onclick="switchTab('register')">立即注册</a></div>
        </form>
        <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
            <label for="regName">昵称</label>
            <input type="text" id="regName" placeholder="你的昵称" required />
            <label for="regEmail">邮箱地址</label>
            <input type="email" id="regEmail" placeholder="your@email.com" required />
            <label for="regPassword">密码</label>
            <input type="password" id="regPassword" placeholder="至少6位" minlength="6" required />
            <label for="regConfirm">确认密码</label>
            <input type="password" id="regConfirm" placeholder="再次输入" required />
            <button type="submit" class="btn">注册</button>
            <div class="divider">或</div>
            <button type="button" class="social-btn google-btn" onclick="handleSocialLogin('google')">🔵 Google</button>
            <button type="button" class="social-btn github-btn" onclick="handleSocialLogin('github')">🐙 GitHub</button>
            <div class="auth-switch">已有账号？ <a onclick="switchTab('login')">去登录</a></div>
        </form>
    </div>
</div>
