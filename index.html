// ========== 关键修复：合并内置文章 + Firebase 文章 ==========
async function loadPosts(category = 'all', keyword = '') {
    try {
        let query = db.collection('posts').orderBy('created_at', 'desc');
        if (category !== 'all') {
            query = query.where('category', '==', category);
        }
        const snapshot = await query.get();
        const fbPosts = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            data.id = doc.id;
            if (data.created_at && data.created_at.toDate) {
                data.created_at = data.created_at.toDate();
            }
            fbPosts.push(data);
        });

        // 合并内置文章 + Firebase 文章
        const allPosts = [...builtInPosts, ...fbPosts];
        // 按时间排序（最新的在前）
        allPosts.sort((a, b) => {
            const dateA = a.created_at instanceof Date ? a.created_at : new Date(a.created_at);
            const dateB = b.created_at instanceof Date ? b.created_at : new Date(b.created_at);
            return dateB - dateA;
        });
        // 去重
        const seen = new Set();
        const uniquePosts = allPosts.filter(p => {
            const key = p.id;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });

        postsCache = uniquePosts;
        renderPostList(filterPosts(postsCache, category, keyword));
    } catch (err) {
        postsCache = [...builtInPosts];
        renderPostList(filterPosts(postsCache, category, keyword));
    }
}

function filterPosts(posts, category, keyword) {
    let filtered = posts;
    if (category !== 'all') {
        filtered = filtered.filter(p => p.category === category);
    }
    if (keyword) {
        const kw = keyword.toLowerCase();
        filtered = filtered.filter(p =>
            p.title.toLowerCase().includes(kw) ||
            (p.excerpt && p.excerpt.toLowerCase().includes(kw)) ||
            (p.content && p.content.toLowerCase().includes(kw))
        );
    }
    return filtered;
}

function renderPostList(posts) {
    const list = document.getElementById('postList');
    if (!posts.length) {
        list.innerHTML = '<div class="no-result">😕 暂无文章</div>';
        return;
    }
    const catMap = { tech: '科技', life: '生活', career: '职场' };
    list.innerHTML = posts.map(post => {
        const dateStr = post.created_at instanceof Date ?
            post.created_at.toLocaleDateString() :
            (post.created_at ? new Date(post.created_at).toLocaleDateString() : '');
        return `
            <div class="post-card">
                <img src="${post.cover_image || 'https://picsum.photos/seed/'+post.id+'/800/400'}" alt="${post.title}" style="width:100%;height:200px;object-fit:cover;border-radius:12px;margin-bottom:12px;" />
                <h3>${post.title}</h3>
                <div class="meta">${dateStr} · <span class="badge ${post.category}">${catMap[post.category] || post.category}</span></div>
                <p>${post.excerpt || (post.content ? post.content.replace(/<[^>]+>/g,'').slice(0,80)+'...' : '')}</p>
                <button class="btn-read" onclick="showPost('${post.id}')">阅读全文 →</button>
            </div>
        `;
    }).join('');
}
